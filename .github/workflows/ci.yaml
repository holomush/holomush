name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint v2
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.3/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3

      - name: Install tools
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.10
          go install github.com/google/yamlfmt/cmd/yamlfmt@v0.21.0
          RUMDL_VERSION="v0.1.15"
          RUMDL_TARBALL="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          RUMDL_URL="https://github.com/rvben/rumdl/releases/download/${RUMDL_VERSION}/${RUMDL_TARBALL}"
          RUMDL_SHA256="b1c9fc9174f1b27bbd33de17c6e84105d8393598f7f24f564cc109ecb4ac23d8"
          curl -LsSfO "${RUMDL_URL}"
          echo "${RUMDL_SHA256}  ${RUMDL_TARBALL}" | sha256sum -c -
          sudo tar xzf "${RUMDL_TARBALL}" --overwrite -C /usr/local/bin
          rm "${RUMDL_TARBALL}"
          DPRINT_VERSION="0.51.1"
          DPRINT_ZIP="dprint-x86_64-unknown-linux-gnu.zip"
          DPRINT_URL="https://github.com/dprint/dprint/releases/download/${DPRINT_VERSION}/${DPRINT_ZIP}"
          DPRINT_SHA256="674c1f9fcdf8a564c26cc027e080d0c4758a40a566e04a776fc83c875ad51d45"
          curl -LsSfO "${DPRINT_URL}"
          echo "${DPRINT_SHA256}  ${DPRINT_ZIP}" | sha256sum -c -
          sudo unzip -oq "${DPRINT_ZIP}" -d /usr/local/bin
          rm "${DPRINT_ZIP}"

      - name: Verify schema is current
        run: |
          task generate:schema
          if ! git diff --exit-code schemas/plugin.schema.json; then
            echo "::error::Schema out of sync with Go types. Run 'task generate:schema' and commit."
            exit 1
          fi

      - name: Check license headers
        run: task license:check

      - name: Check access control migration
        run: task lint:access-migration

      - name: Lint
        run: task lint

      - name: Check formatting
        run: task fmt:check

  test:
    name: Test
    runs-on: namespace-profile-linux-amd64-4x8
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: holomush
          POSTGRES_PASSWORD: holomush
          POSTGRES_DB: holomush_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: task test:coverage
        env:
          DATABASE_URL: postgres://holomush:holomush@localhost:5432/holomush_test?sslmode=disable

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  integration:
    name: Integration Test
    runs-on: namespace-profile-linux-amd64-4x8
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: task test:integration

  build:
    name: Build
    runs-on: namespace-profile-linux-amd64-4x8
    needs: [lint, test, integration]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: holomush
          path: holomush
