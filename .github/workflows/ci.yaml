name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint v2
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.4/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4

      - name: Install tools
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.10
          go install github.com/google/yamlfmt/cmd/yamlfmt@v0.21.0
          RUMDL_VERSION="v0.1.62"
          RUMDL_TARBALL="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          RUMDL_URL="https://github.com/rvben/rumdl/releases/download/${RUMDL_VERSION}/${RUMDL_TARBALL}"
          RUMDL_SHA256="a25d9bab27ac9f17589e25cde32ce580c81dfd7bcc4a21e6dbfcd65bc7c1353c"
          curl -LsSfO "${RUMDL_URL}"
          echo "${RUMDL_SHA256}  ${RUMDL_TARBALL}" | sha256sum -c -
          sudo tar xzf "${RUMDL_TARBALL}" --overwrite -C /usr/local/bin
          rm "${RUMDL_TARBALL}"
          DPRINT_VERSION="0.51.1"
          DPRINT_ZIP="dprint-x86_64-unknown-linux-gnu.zip"
          DPRINT_URL="https://github.com/dprint/dprint/releases/download/${DPRINT_VERSION}/${DPRINT_ZIP}"
          DPRINT_SHA256="674c1f9fcdf8a564c26cc027e080d0c4758a40a566e04a776fc83c875ad51d45"
          curl -LsSfO "${DPRINT_URL}"
          echo "${DPRINT_SHA256}  ${DPRINT_ZIP}" | sha256sum -c -
          sudo unzip -oq "${DPRINT_ZIP}" -d /usr/local/bin
          rm "${DPRINT_ZIP}"
          BUF_VERSION="1.67.0"
          BUF_BIN="buf-Linux-x86_64"
          BUF_URL="https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/${BUF_BIN}"
          BUF_SHA256="590b67b0cbde29b287e9772a71f46b569c2204e09a42c1c50dc425237a485e2a"
          curl -LsSfo /tmp/buf "${BUF_URL}"
          echo "${BUF_SHA256}  /tmp/buf" | sha256sum -c -
          sudo install -m 0755 /tmp/buf /usr/local/bin/buf
          rm /tmp/buf

      - name: Verify schema is current
        run: |
          BEFORE=$(sha256sum schemas/plugin.schema.json | cut -d' ' -f1)
          task generate:schema
          AFTER=$(sha256sum schemas/plugin.schema.json | cut -d' ' -f1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "::error::Schema out of sync with Go types. Run 'task generate:schema' and commit."
            exit 1
          fi

      - name: Check license headers
        run: task license:check

      - name: Check access control migration
        run: task lint:access-migration

      - name: Lint
        run: task lint

      - name: Check formatting
        run: task fmt:check

  test:
    name: Test
    runs-on: namespace-profile-linux-amd64-4x8
    services:
      postgres:
        image: postgres:18@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
        env:
          POSTGRES_USER: holomush
          POSTGRES_PASSWORD: holomush
          POSTGRES_DB: holomush_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run tests
        run: task test:cover
        env:
          DATABASE_URL: postgres://holomush:holomush@localhost:5432/holomush_test?sslmode=disable

      - name: Upload coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  integration:
    name: Integration Test
    runs-on: namespace-profile-linux-amd64-4x8
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run integration tests
        run: task test:int

      - name: Upload integration coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-int.out
          flags: integration
          fail_ci_if_error: false

  e2e:
    name: E2E Test
    runs-on: namespace-profile-linux-amd64-4x8
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E tests with coverage
        run: task test:e2e:cover

      - name: Upload E2E coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-e2e.out
          flags: e2e
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: namespace-profile-linux-amd64-4x8
    needs: [lint, test, integration, e2e]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: holomush
          path: holomush
