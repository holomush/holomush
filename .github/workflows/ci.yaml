name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - site/**
      - docs/**
      - "**/*.md"
      - .claude/agents/**
      - .claude/commands/**
      - .claude/rules/**
      - .claude/agent-memory/**
      - LICENSE
      - LICENSE_HEADER
  pull_request:
    branches: [main]
    paths-ignore:
      - site/**
      - docs/**
      - "**/*.md"
      - .claude/agents/**
      - .claude/commands/**
      - .claude/rules/**
      - .claude/agent-memory/**
      - LICENSE
      - LICENSE_HEADER
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: namespace-profile-linux-amd64-2x4
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Install formatters
        # ripgrep + rumdl + dprint — the tool set shared with the Bats job
        # (scripts-tests.yaml). SHA-pinned versions live in the composite.
        uses: ./.github/actions/install-formatters

      # golangci-lint, actionlint, and yamlfmt are pinned in go.tool-lint.mod
      # and built on demand by the Taskfile (`go tool`) — no separate install.
      # license-eye self-installs via `task license:check` at Taskfile's
      # LICENSE_EYE_VERSION (the single version source) — no pin duplicated here.

      - name: Install buf
        run: |
          BUF_VERSION="1.67.0"
          BUF_BIN="buf-Linux-x86_64"
          BUF_URL="https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/${BUF_BIN}"
          BUF_SHA256="590b67b0cbde29b287e9772a71f46b569c2204e09a42c1c50dc425237a485e2a"
          curl -LsSfo /tmp/buf "${BUF_URL}"
          echo "${BUF_SHA256}  /tmp/buf" | sha256sum -c -
          sudo install -m 0755 /tmp/buf /usr/local/bin/buf
          rm /tmp/buf

      - name: Verify schema is current
        run: |
          BEFORE=$(sha256sum schemas/plugin.schema.json | cut -d' ' -f1)
          task generate:schema
          AFTER=$(sha256sum schemas/plugin.schema.json | cut -d' ' -f1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "::error::Schema out of sync with Go types. Run 'task generate:schema' and commit."
            exit 1
          fi

      - name: Verify EBNF is current
        run: task generate:ebnf:check

      - name: Check license headers
        run: task license:check

      - name: Lint
        run: task lint

      - name: Check formatting
        run: task fmt:check

  test:
    name: Test
    runs-on: namespace-profile-linux-amd64-4x8
    services:
      postgres:
        image: postgres:18@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
        env:
          POSTGRES_USER: holomush
          POSTGRES_PASSWORD: holomush
          POSTGRES_DB: holomush_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Testcontainers Cloud Client
        uses: atomicjar/testcontainers-cloud-setup-action@7d1bab3fdfe0027c91936deca6b924d8a8a7a04d # v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Run tests
        run: task test:cover
        env:
          DATABASE_URL: postgres://holomush:holomush@localhost:5432/holomush_test?sslmode=disable

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  integration:
    name: Integration Test
    runs-on: namespace-profile-linux-amd64-4x8
    # No `needs:` — integration consumes no artifact from `test`; it builds its
    # own plugins and stands up its own testcontainers. Running it in parallel
    # with `test` (instead of after it) removes the unit job's wall-clock from
    # the critical path. `build` still joins on all of [lint, test, integration,
    # e2e], so a unit-test failure still blocks the build artifact. Trade: a
    # broken commit spends runner minutes on integration too — acceptable on
    # cloud runners for the wall-clock win.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Testcontainers Cloud Client
        uses: atomicjar/testcontainers-cloud-setup-action@7d1bab3fdfe0027c91936deca6b924d8a8a7a04d # v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Run integration tests
        run: task test:int

      - name: Upload integration coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-int.out
          flags: integration
          fail_ci_if_error: false

  e2e:
    name: E2E Test
    runs-on: namespace-profile-linux-amd64-4x8
    # No `needs:` — see the Integration Test job. E2E builds its own image and
    # stack; running it in parallel with `test` keeps the unit job off its
    # critical path. `build` still joins on all four jobs.
    # web:generate (via docker:build:cover) runs `buf generate`, which pulls
    # the remote BSR plugins (buf.build/bufbuild/es, buf.build/connectrpc/es).
    # Authenticate so it uses the token's BSR rate limit, not the anonymous one
    # that was failing with resource_exhausted (holomush-k1kb).
    env:
      BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Testcontainers Cloud Client
        uses: atomicjar/testcontainers-cloud-setup-action@7d1bab3fdfe0027c91936deca6b924d8a8a7a04d # v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.0.3 --activate

      - name: Cache pnpm store
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          # MUST run after `Install pnpm`: nscloud-cache-action plans the pnpm
          # cache by exec'ing `pnpm --version`, so pnpm must be on PATH (the
          # earlier go-cache step runs before pnpm exists). web:install
          # (`pnpm install`) store is the e2e/build hot path.
          cache: pnpm

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Run E2E tests with coverage
        run: task test:e2e:cover -- --grep-invert @quarantine

      - name: Upload E2E coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-e2e.out
          flags: e2e
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: namespace-profile-linux-amd64-2x4
    needs: [lint, test, integration, e2e]
    # `task build` embeds the web client (web:generate → `buf generate`), which
    # pulls remote BSR plugins; authenticate to avoid the anonymous rate limit
    # (holomush-k1kb).
    env:
      BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Testcontainers Cloud Client
        uses: atomicjar/testcontainers-cloud-setup-action@7d1bab3fdfe0027c91936deca6b924d8a8a7a04d # v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.0.3 --activate

      - name: Cache pnpm store
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          # MUST run after `Install pnpm`: nscloud-cache-action plans the pnpm
          # cache by exec'ing `pnpm --version`, so pnpm must be on PATH (the
          # earlier go-cache step runs before pnpm exists). web:install
          # (`pnpm install`) store is the e2e/build hot path.
          cache: pnpm

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Build
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: holomush
          path: holomush
