name: Deploy Sandbox

# Dispatch-only: deploy is a separate human gate from cutting a release
# (spec INV-4). A release (v* tag + GHCR image + GH Release) must already exist
# for the chosen tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-sandbox:
    name: Deploy Sandbox
    runs-on: namespace-profile-linux-amd64-2x4
    # The `prod` GitHub Environment is deliberate (not a sandbox/prod mismatch):
    # game.holomush.dev is the live deployment target, and joining `prod` gives
    # deployment tracking/history in the Environments UI and is the hook for a
    # required-reviewer approval rule. Deploy secrets are bound to this environment.
    environment:
      name: prod
      url: https://game.holomush.dev
    if: vars.SANDBOX_DEPLOY_ENABLED == 'true'
    concurrency:
      group: deploy-sandbox
      cancel-in-progress: false
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$(doctl compute droplet get holomush-sandbox-game --format PublicIPv4 --no-header)" >> ~/.ssh/known_hosts

      - name: Resolve droplet IP
        id: droplet
        run: |
          IP=$(doctl compute droplet get holomush-sandbox-game --format PublicIPv4 --no-header)
          echo "ip=${IP}" >> "$GITHUB_OUTPUT"

      - name: Pre-deploy Postgres safety snapshot
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          VERSION="$DISPATCH_TAG"
          ssh -o StrictHostKeyChecking=yes "holomush@${DROPLET_IP}" \
            bash -s -- "${VERSION}" <<'EOF'
            set -euo pipefail
            VERSION="$1"
            cd /opt/holomush
            docker compose --profile tunnel --profile backups exec -T backup \
              /usr/local/bin/backup.sh --tag="pre-deploy:${VERSION}" </dev/null
          EOF

      - name: Pull + migrate + restart
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          VERSION="$DISPATCH_TAG"
          ssh -o StrictHostKeyChecking=yes "holomush@${DROPLET_IP}" bash -s -- "${VERSION}" <<'EOF'
            set -euo pipefail
            VERSION="$1"
            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq git
            fi
            rm -rf /tmp/holomush-release
            git clone --depth 1 --branch "${VERSION}" \
              https://github.com/holomush/holomush.git /tmp/holomush-release
            cp /tmp/holomush-release/compose.prod.yaml /opt/holomush/compose.yaml
            rm -rf /opt/holomush/docker /opt/holomush/deploy
            cp -r /tmp/holomush-release/docker /opt/holomush/docker
            cp -r /tmp/holomush-release/deploy /opt/holomush/deploy
            rm -rf /tmp/holomush-release

            cd /opt/holomush
            IMAGE_VERSION="${VERSION#v}"
            sed -i "s/^HOLOMUSH_VERSION=.*/HOLOMUSH_VERSION=${IMAGE_VERSION}/" .env
            docker compose --profile tunnel --profile backups pull core gateway cloudflared
            docker compose --profile tunnel --profile backups build backup
            docker compose --profile tunnel --profile backups up -d --no-recreate postgres

            # ── Deploy choreography for migration 000052 (06-01/06-02; round-4
            # HIGH + round-5 H1/M4) ────────────────────────────────────────────
            # 000052 makes the OLD core's audit INSERT incompatible (event_ms
            # NOT NULL + dropped id-alone unique index — projection.go:414), so
            # the old core MUST NOT be writing audit rows while `core migrate`
            # runs. We STOP the entire player-traffic path (cloudflared → gateway
            # → core) BEFORE migrate, migrate with no old core writing, start ONLY
            # the new core gated on its readiness (which incorporates 06-02's
            # synchronous audit Backfill + EnsurePartitions boot gate), then
            # restore player traffic (gateway + cloudflared) LAST. The brief
            # audit-write outage is a deliberate, bounded single-node risk; the
            # readiness gate is the compensating control that aborts the deploy
            # before traffic is restored if the backfill fails. NOT expand/contract
            # — 000052 is unchanged (operator chose deploy choreography).
            #
            # Pre-migrate backfill-budget probe (round-5 M4): the new core's
            # synchronous Backfill runs BEFORE whole-process readiness, so a large
            # events_audit_unpartitioned can push startup past the core health
            # budget (compose.prod.yaml core: start_period 15s + retries 15 ×
            # interval 5s ≈ 90s) → Docker marks it unhealthy → `restart:
            # unless-stopped` thrashes while `up -d --wait` is pending. Warn (non-
            # fatal) above a conservative threshold so the operator can run an
            # ahead-of-deploy backfill or temporarily raise the core start_period.
            ROWS=$(docker compose --profile tunnel --profile backups exec -T postgres \
              psql -U holomush -d holomush -tAc "SELECT count(*) FROM events_audit" </dev/null 2>/dev/null | tr -d '[:space:]' || true)
            echo "pre-migrate events_audit row count: ${ROWS:-unknown} (core health budget ~90s: start_period 15s + retries 15 × interval 5s)"
            if [ "${ROWS:-0}" -gt 500000 ]; then
              echo "::warning::events_audit has ${ROWS} rows; the new core's synchronous audit Backfill runs before readiness and may exceed the ~90s core health budget. Run an ahead-of-deploy backfill or temporarily raise the core start_period in compose before proceeding."
            fi

            # Sever the whole player-traffic path AND the old core before migrate.
            # Stopping cloudflared + gateway guarantees no player request can reach
            # the new core before the readiness gate — even though core's gRPC
            # begins serving before whole-process readiness and does not DependsOn
            # SubsystemAuditProjection (sub_grpc.go:166,771).
            docker compose --profile tunnel --profile backups stop cloudflared gateway core

            # `</dev/null` is load-bearing: this script is fed to `ssh ... bash -s
            # <<'EOF'`, so stdin IS the heredoc. A foreground `compose run`/`exec`
            # attaches stdin by default and drains the remaining heredoc lines into
            # the container as its stdin (holomush-aocap). `-T` documents intent,
            # `</dev/null` enforces it. migrate now runs with NO old core writing.
            docker compose --profile tunnel --profile backups run --rm -T core migrate </dev/null

            # Start ONLY the new core and GATE on its readiness before restoring
            # traffic. `--wait` blocks until the core healthcheck passes, which only
            # happens after the synchronous audit Backfill + EnsurePartitions boot
            # gate succeeds. `--no-deps` keeps gateway/cloudflared DOWN here. If the
            # gate fails, `up -d --wait` exits non-zero and `set -euo pipefail`
            # ABORTS the deploy BEFORE traffic is restored (the compensating control).
            docker compose --profile tunnel --profile backups up -d --wait --no-deps core

            # Restore player traffic (gateway + cloudflared) only after core is ready.
            docker compose --profile tunnel --profile backups up -d
          EOF

      - name: Verify deployed version + health
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |-
          VERSION="$DISPATCH_TAG"
          IMAGE_VERSION="${VERSION#v}"
          ssh -o StrictHostKeyChecking=yes "holomush@${DROPLET_IP}" bash -s -- "${IMAGE_VERSION}" <<'EOF'
            set -euo pipefail
            IMAGE_VERSION="$1"
            EXPECTED="ghcr.io/holomush/holomush:${IMAGE_VERSION}"
            cd /opt/holomush
            # Assert core+gateway actually run the deployed image. A recreate
            # failure leaves a stale container that still passes readiness, so
            # readiness alone masks a bad deploy (holomush-aocap). Foreground
            # `compose exec` here gets `-T` (no TTY) AND `</dev/null` so it can't
            # drain the heredoc that is this script's stdin (see deploy step).
            for svc in core gateway; do
              running="$(docker compose -f compose.yaml ps --format '{{.Image}}' "$svc")"
              if [ "$running" != "$EXPECTED" ]; then
                echo "::error::$svc is running '$running' but expected '$EXPECTED' — deploy did not recreate to the target version"
                exit 1
              fi
            done
            echo "✓ core + gateway on ${EXPECTED}"
            # core/gateway are freshly recreated each deploy, so poll readiness
            # rather than racing the first probe against container startup
            # (a single immediate probe can hit a still-starting container).
            for attempt in $(seq 1 30); do
              if docker compose -f compose.yaml exec -T gateway \
                   wget -q --spider http://localhost:9101/healthz/readiness </dev/null; then
                echo "✓ gateway ready"
                exit 0
              fi
              echo "gateway not ready (attempt ${attempt}/30); retrying in 5s..."
              sleep 5
            done
            echo "::error::gateway did not become ready within ~150s"
            exit 1
          EOF
