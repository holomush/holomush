name: Benchmark Regression Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark Regression Check
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run benchmark regression check
        run: bash scripts/check-benchmark-regression.sh
