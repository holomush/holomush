name: Buf Proto CI

on:
  pull_request:
    branches: [main]
    paths:
      - "api/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "buf.lock"
  push:
    branches: [main]
    paths:
      - "api/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "buf.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Buf Lint
    runs-on: namespace-profile-linux-amd64-2x4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: true
          format: true
          breaking: false
          push: false

  push:
    name: Buf Push to BSR
    runs-on: namespace-profile-linux-amd64-2x4
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: false
          format: false
          breaking: false
          push: true
