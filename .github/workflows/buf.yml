name: Buf Proto CI

on:
  pull_request:
    branches: [main]
    paths:
      - "api/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "buf.lock"
  push:
    branches: [main]
    paths:
      - "api/proto/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "buf.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Buf Lint
    runs-on: namespace-profile-linux-amd64-4x8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: bufbuild/buf-action@b46cbc051dd8fd10a3c2213e784498790d3fe388 # v1.0.3
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: true
          format: true
          breaking: false
          push: false

  push:
    name: Buf Push to BSR
    runs-on: namespace-profile-linux-amd64-4x8
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: bufbuild/buf-action@b46cbc051dd8fd10a3c2213e784498790d3fe388 # v1.0.3
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: false
          format: false
          breaking: false
          push: true
