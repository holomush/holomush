name: Deploy Site

on:
  push:
    branches: [main]
    paths: ["site/**"]
  pull_request:
    paths: ["site/**"]

jobs:
  build:
    permissions:
      contents: read
    runs-on: namespace-profile-linux-amd64-2x4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Astro 6 requires Node >= 22.12; the runner defaults to Node 20, so set
      # the version explicitly (node 24, matching ci.yaml) before the build.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: site/.bun-version

      - name: Build site
        working-directory: site
        run: bun install --frozen-lockfile && bunx astro build

      - name: Check internal links
        working-directory: site
        run: bunx linkinator dist/index.html --recurse --silent --skip "^https?://(?!127\.0\.0\.1|localhost)"

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=holomush-site
