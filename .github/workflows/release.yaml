name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write # Required for Cosign keyless signing
  attestations: write # Required for provenance attestations

jobs:
  release-please:
    name: Release Please
    runs-on: namespace-profile-linux-amd64-2x4
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          release-type: go

  goreleaser:
    name: Build, Sign, and Release
    runs-on: namespace-profile-linux-amd64-8x16
    needs: release-please
    if: needs.release-please.outputs.release_created || startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      # internal/web/dist/ is gitignored; the SvelteKit bundle must be built
      # fresh on the release runner so the -tags realweb build configured in
      # .goreleaser.yaml can embed it. See internal/web/static.go.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.0.3 --activate

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web bundle into internal/web/dist/
        run: task web:embed

      # GoReleaser handles building, signing, and releasing atomically.
      # Signing happens BEFORE artifacts are published - releases are never
      # published with unsigned artifacts.
      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Verify signing artifacts were created (defense-in-depth)
      - name: Verify signing artifacts exist
        run: |
          set -euo pipefail
          echo "Verifying signing artifacts..."

          # Check that checksums signature and certificate exist
          if [[ ! -f dist/checksums.txt.sig ]]; then
            echo "ERROR: checksums.txt.sig not found - signing may have failed"
            ls -la dist/
            exit 1
          fi

          if [[ ! -f dist/checksums.txt.sig.cert ]]; then
            echo "ERROR: checksums.txt.sig.cert not found - signing may have failed"
            ls -la dist/
            exit 1
          fi

          echo "✓ Signing artifacts verified:"
          ls -la dist/checksums.txt.sig*

      # Upload artifacts for provenance attestation
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts
          path: dist/*.tar.gz
          retention-days: 1
          if-no-files-found: error

  # Provenance attestation runs after goreleaser completes.
  # This adds SLSA provenance to the already-signed artifacts.
  attest-provenance:
    name: Attest Provenance
    runs-on: namespace-profile-linux-amd64-2x4
    needs: goreleaser
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-artifacts
          path: dist

      - name: Verify artifacts exist
        run: |
          set -euo pipefail
          count=$(find dist -name '*.tar.gz' -type f | wc -l)
          if [[ $count -eq 0 ]]; then
            echo "ERROR: No release artifacts found"
            exit 1
          fi
          echo "Found ${count} artifacts to attest"
          ls -la dist/

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "dist/*.tar.gz"

  # Attest container images for provenance
  attest-containers:
    name: Attest Container Provenance
    runs-on: namespace-profile-linux-amd64-2x4
    needs: goreleaser
    permissions:
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image digest
        id: digest
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.version }}"
          IMAGE="ghcr.io/holomush/holomush:${VERSION}"

          echo "Fetching digest for ${IMAGE}"
          MANIFEST_STDERR=$(mktemp)
          if ! docker manifest inspect "${IMAGE}" --verbose > /tmp/manifest.json 2> "${MANIFEST_STDERR}"; then
            echo "ERROR: Failed to inspect manifest for ${IMAGE}"
            echo "Docker manifest inspect stderr:"
            cat "${MANIFEST_STDERR}"
            exit 1
          fi

          DIGEST=$(jq -r '.Descriptor.digest // .digest' /tmp/manifest.json | head -1)

          if [[ -z "${DIGEST}" || "${DIGEST}" == "null" ]]; then
            echo "ERROR: Could not extract digest from manifest"
            echo "Manifest output:"
            cat /tmp/manifest.json
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"

      - name: Attest container provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/holomush/holomush
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  # Final verification step - ensures all signing and attestation succeeded
  verify-release:
    name: Verify Release
    runs-on: namespace-profile-linux-amd64-2x4
    needs: [goreleaser, attest-provenance, attest-containers]
    permissions:
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Verify checksums signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.version }}"

          echo "Verifying release ${VERSION}..."

          # Wait for release to be available (handles propagation delay)
          for i in {1..5}; do
            if gh release view "${VERSION}" -R holomush/holomush > /dev/null 2>&1; then
              break
            fi
            echo "Release not yet available, waiting... (attempt $i/5)"
            sleep 10
          done

          # Download checksums and signature
          mkdir -p dist
          if ! gh release download "${VERSION}" -R holomush/holomush -D dist \
            -p 'checksums.txt' -p 'checksums.txt.sig' -p 'checksums.txt.sig.cert'; then
            echo "ERROR: Failed to download release artifacts"
            echo "This may indicate the release was not published or signing failed"
            gh release view "${VERSION}" -R holomush/holomush --json assets || true
            exit 1
          fi

          # Verify signature
          cosign verify-blob \
            --certificate dist/checksums.txt.sig.cert \
            --signature dist/checksums.txt.sig \
            --certificate-identity-regexp "https://github.com/holomush/holomush/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/checksums.txt

          echo "✓ Checksums signature verified"

      - name: Verify container signature
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.version }}"

          cosign verify \
            --certificate-identity-regexp "https://github.com/holomush/holomush/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "ghcr.io/holomush/holomush:${VERSION}"

          echo "✓ Container signature verified"

      - name: Release verification complete
        run: |-
          echo "✓ All release artifacts are properly signed and attested"
          echo "  - Binary checksums: signed with Cosign"
          echo "  - Container images: signed with Cosign"
          echo "  - Binary provenance: attested"
          echo "  - Container provenance: attested"

  deploy-sandbox:
    name: Deploy Sandbox
    runs-on: namespace-profile-linux-amd64-2x4
    needs: [verify-release]
    # On tag push: wait for verify-release to succeed. On workflow_dispatch
    # (redeploy an existing release): run independently since goreleaser +
    # verify-release are skipped on dispatch and the image already exists in
    # GHCR. `always()` lets this job start regardless of upstream skip state.
    if: |
      always() && (
        (startsWith(github.ref, 'refs/tags/') && needs.verify-release.result == 'success') ||
        github.event_name == 'workflow_dispatch'
      )
    concurrency:
      group: deploy-sandbox
      cancel-in-progress: false
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$(doctl compute droplet get holomush-sandbox-game --format PublicIPv4 --no-header)" >> ~/.ssh/known_hosts

      - name: Resolve droplet IP
        id: droplet
        run: |
          IP=$(doctl compute droplet get holomush-sandbox-game --format PublicIPv4 --no-header)
          echo "ip=${IP}" >> "$GITHUB_OUTPUT"

      - name: Pre-deploy Postgres safety snapshot
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DISPATCH_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_TAG"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          # Pass VERSION through an SSH positional arg + single-quoted heredoc
          # so workflow_dispatch's user-supplied `tag` input cannot inject
          # shell commands into the remote execution (CodeRabbit review).
          ssh -o StrictHostKeyChecking=yes "holomush@${DROPLET_IP}" \
            bash -s -- "${VERSION}" <<'EOF'
            set -euo pipefail
            VERSION="$1"
            cd /opt/holomush
            # Run the backup service's script with --tag=pre-deploy:<version>.
            # The --tag triggers pin mode in backup.sh so the retention policy
            # never expires this snapshot.
            docker compose --profile tunnel --profile backups exec -T backup \
              /usr/local/bin/backup.sh --tag="pre-deploy:${VERSION}"
          EOF

      - name: Pull + migrate + restart
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
          DISPATCH_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_TAG"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          ssh "holomush@${DROPLET_IP}" bash -s -- "${VERSION}" <<'EOF'
            set -euo pipefail
            VERSION="$1"

            # Sync release assets from the tag into /opt/holomush so compose
            # changes (new services, profiles, env wiring) and the
            # postgres-backup build context are up-to-date with this release.
            # Without this step, cloud-init-era files persist forever and
            # release changes to compose / Dockerfiles / scripts never reach
            # the running sandbox.
            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq git
            fi
            rm -rf /tmp/holomush-release
            git clone --depth 1 --branch "${VERSION}" \
              https://github.com/holomush/holomush.git /tmp/holomush-release
            cp /tmp/holomush-release/compose.prod.yaml /opt/holomush/compose.yaml
            rm -rf /opt/holomush/docker /opt/holomush/deploy
            cp -r /tmp/holomush-release/docker /opt/holomush/docker
            cp -r /tmp/holomush-release/deploy /opt/holomush/deploy
            rm -rf /tmp/holomush-release

            cd /opt/holomush
            sed -i "s/^HOLOMUSH_VERSION=.*/HOLOMUSH_VERSION=${VERSION}/" .env
            docker compose --profile tunnel --profile backups pull core gateway cloudflared
            docker compose --profile tunnel --profile backups build backup
            docker compose --profile tunnel --profile backups up -d --no-recreate postgres
            docker compose --profile tunnel --profile backups run --rm core migrate
            docker compose --profile tunnel --profile backups up -d
          EOF

      - name: Health probe
        env:
          DROPLET_IP: ${{ steps.droplet.outputs.ip }}
        run: |-
          ssh "holomush@${DROPLET_IP}" \
            "docker compose -f /opt/holomush/compose.yaml exec -T gateway \
               wget -q --spider http://localhost:9101/healthz/readiness"
