name: Release

on:
  # Dispatch-only. A v* tag pushed with the release App token would re-fire
  # this workflow (App-token pushes are exempt from the GITHUB_TOKEN
  # recursion guard), producing a duplicate run that fails on already-existing
  # release assets. `task release:cut` always uses this dispatch entry point.
  workflow_dispatch:
    inputs:
      expected_increment:
        description: "Guard: fail if cog computes a different bump (auto = no guard)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

# Least-privilege default: read-only at the workflow level. Each job that needs
# write scopes requests them explicitly (goreleaser below; attest-* / verify-release
# have their own blocks). pull-requests:write dropped with the old release-PR tool.
permissions:
  contents: read

jobs:
  goreleaser:
    name: Build, Sign, and Release
    runs-on: namespace-profile-linux-amd64-8x16
    permissions:
      contents: write # create the GitHub Release + remote tag
      packages: write # push container images to GHCR
      id-token: write # Cosign keyless signing (OIDC)
      attestations: write # SLSA provenance attestations
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # No pushes use the persisted checkout credential: cog creates a LOCAL
          # tag and goreleaser creates the remote tag/Release via the App token.
          persist-credentials: false

      # ── Derive version + create the v* tag inline from the checked-out HEAD ──
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          # Scope the minted token to only what GoReleaser uses it for (creating
          # the Release + remote tag, and GHCR package ops) rather than inheriting
          # the App installation's full permission set.
          permission-contents: write
          permission-packages: write

      - name: Install cog
        uses: ./.github/actions/install-cog

      - name: Configure git identity for tagging
        run: |
          git config user.name "holomush-release[bot]"
          git config user.email "holomush-release[bot]@users.noreply.github.com"

      - name: Preview + guard version bump
        env:
          EXPECTED: ${{ inputs.expected_increment }}
        run: |
          set -euo pipefail
          echo "Computed next version (dry-run):"
          cog bump --auto --dry-run
          if [ "${EXPECTED}" != "auto" ]; then
            # `|| true`: under set -euo pipefail a grep/describe no-match would
            # fail the assignment and skip the guard below — neutralize the exit
            # so CURRENT/TARGET can be empty and the guard can report it.
            CURRENT="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || true)"
            TARGET="$(cog bump --auto --dry-run 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -n1 || true)"
            # Fail loudly rather than feed empty values into the arithmetic below
            # (which would abort with a cryptic "integer expression expected").
            if [ -z "${CURRENT}" ] || [ -z "${TARGET}" ]; then
              echo "::error::could not determine version (current='${CURRENT}' target='${TARGET}') from cog dry-run; cannot validate expected_increment=${EXPECTED}"
              exit 1
            fi
            IFS=. read -r cmaj cmin cpat <<< "${CURRENT}"
            IFS=. read -r tmaj tmin tpat <<< "${TARGET}"
            if   [ "${tmaj}" -gt "${cmaj}" ]; then KIND="major"
            elif [ "${tmin}" -gt "${cmin}" ]; then KIND="minor"
            elif [ "${tpat}" -gt "${cpat}" ]; then KIND="patch"
            else KIND="none"; fi
            if [ "${KIND}" != "${EXPECTED}" ]; then
              echo "::error::expected ${EXPECTED} bump but cog computed ${KIND} (${CURRENT} -> ${TARGET})"
              exit 1
            fi
          fi

      - name: Cut tag (cog bump, tag-only)
        run: |
          set -euo pipefail
          # Creates a LOCAL v* tag from conventional commits. No bump commit
          # (--disable-bump-commit) and no CHANGELOG.md (disable_changelog in
          # cog.toml). The remote tag is created by goreleaser via target_commitish.
          cog bump --auto --disable-bump-commit
          git describe --tags --abbrev=0

      - name: Get version
        id: version
        run: |
          set -euo pipefail
          TAG="$(git describe --tags --abbrev=0)"   # the cog-created local tag
          if ! printf '%s' "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::resolved tag '${TAG}' is not a v-prefixed semver; refusing to build a malformed release"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${TAG#v}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      # internal/web/dist/ is gitignored; the SvelteKit bundle must be built
      # fresh on the release runner so the -tags realweb build configured in
      # .goreleaser.yaml can embed it. See internal/web/static.go.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.0.3 --activate

      - name: Install Task
        uses: ./.github/actions/install-task

      # web:embed → web:build → web:generate runs `buf generate` to produce
      # the ConnectRPC TS clients before the SvelteKit build. buf is not a
      # `go tool` binary, so it needs its own install here (mirrors ci.yaml).
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web bundle into internal/web/dist/
        # PUBLIC_* are baked into the SvelteKit static bundle at BUILD time —
        # adapter-static emits frozen HTML embedded into the Go binary via
        # go:embed, so there is no runtime server to inject $env/dynamic/public.
        # Each var below is a no-op when unset/empty (browser SDK/tracer init
        # returns early), so this is safe before the var/secret is populated.
        #
        # PUBLIC_OTEL_ENDPOINT gates the OTel-native browser tracer
        # (web/src/lib/telemetry.ts) — the project's primary, vendor-neutral
        # telemetry path. The same-origin gateway OTLP relay now exists
        # (/api/otlp/v1/traces, internal/web/otlp_relay.go, mirroring
        # /api/sentry-relay), so set PUBLIC_OTEL_ENDPOINT to "/api/otlp" (the
        # tracer appends /v1/traces). The relay forwards to the collector,
        # which fans out to Sentry/Tempo via its own exporters — dodging the
        # ad-blocker/CORS failures that block direct browser POSTs to an
        # external ingest origin. The gateway must have OTLP_RELAY_ENDPOINT set
        # to the collector's OTLP/HTTP base URL (e.g. http://otel-collector:4318)
        # for the relay to register. See holomush-2uogn / holomush-yak8r.
        env:
          PUBLIC_OTEL_ENDPOINT: ${{ vars.PUBLIC_OTEL_ENDPOINT }}
          PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
          PUBLIC_SENTRY_ENVIRONMENT: prod
          PUBLIC_SENTRY_RELEASE: ${{ steps.version.outputs.version }}
          PUBLIC_SENTRY_TRACES_SAMPLE_RATE: "0.1"
        run: task web:embed

      # GoReleaser handles building, signing, and releasing atomically.
      # Signing happens BEFORE artifacts are published - releases are never
      # published with unsigned artifacts.
      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # App token creates the remote tag via target_commitish and bypasses
          # any v* tag-protection.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Verify signing artifacts were created (defense-in-depth)
      - name: Verify signing artifacts exist
        run: |
          set -euo pipefail
          echo "Verifying signing artifacts..."

          # cosign v3 emits a single sigstore bundle (.sigstore.json) instead of
          # the separate .sig + .sig.cert files. See https://goreleaser.com/blog/cosign-v3.
          if [[ ! -f dist/checksums.txt.sigstore.json ]]; then
            echo "ERROR: checksums.txt.sigstore.json not found - signing may have failed"
            ls -la dist/
            exit 1
          fi

          echo "✓ Signing artifacts verified:"
          ls -la dist/checksums.txt.sigstore.json

      # Upload artifacts for provenance attestation
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts
          path: dist/*.tar.gz
          retention-days: 1
          if-no-files-found: error

      # ── Publish the Sentry release object (commit association + finalize) ──
      # Tag-time release creation so Sentry issues get commit association
      # (suspect commits) and regression / resolved-in-next-release tracking,
      # not just the bare auto-stub Sentry derives from the event `release` tag.
      #
      # `release` MUST be the bare semver (steps.version.outputs.version, e.g.
      # 0.5.0) to match the RUNTIME event tag: prod sets SENTRY_RELEASE to the
      # bare ${HOLOMUSH_VERSION} (scripts/cloud-init.sh; deploy.yaml strips the
      # leading v). A v-prefixed or holomush@-prefixed name here would leave the
      # release object and its events uncorrelated.
      #
      # The guard requires BOTH the token AND the org (and project): the action
      # hard-fails on a missing SENTRY_ORG, so a partial config must SKIP rather
      # than red the release. continue-on-error then keeps any Sentry-side hiccup
      # (5xx, rate limit) from failing an already-published, already-signed
      # release and the attestation jobs that depend on this one — the release
      # object is best-effort observability metadata, recoverable out of band.
      - name: Check Sentry configured
        id: sentry_check
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          if [ -n "${SENTRY_AUTH_TOKEN:-}" ] && [ -n "${SENTRY_ORG:-}" ] && [ -n "${SENTRY_PROJECT:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sentry not fully configured (need SENTRY_AUTH_TOKEN + SENTRY_ORG + SENTRY_PROJECT); skipping release publish."
          fi

      - name: Publish Sentry release
        if: ${{ steps.sentry_check.outputs.enabled == 'true' }}
        continue-on-error: true
        uses: getsentry/action-release@f71adb49d4b2aeeda98052d3de234bbb0f3e03ab # v3.6.1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: ${{ steps.version.outputs.version }}
          set_commits: auto
          # First release on a fresh Sentry project has no previous-release SHA
          # to diff against; ignore_missing keeps that from hard-failing.
          ignore_missing: true
          finalize: true

  # Provenance attestation runs after goreleaser completes.
  # This adds SLSA provenance to the already-signed artifacts.
  attest-provenance:
    name: Attest Provenance
    runs-on: namespace-profile-linux-amd64-2x4
    needs: goreleaser
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-artifacts
          path: dist

      - name: Verify artifacts exist
        run: |
          set -euo pipefail
          count=$(find dist -name '*.tar.gz' -type f | wc -l)
          if [[ $count -eq 0 ]]; then
            echo "ERROR: No release artifacts found"
            exit 1
          fi
          echo "Found ${count} artifacts to attest"
          ls -la dist/

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: "dist/*.tar.gz"

  # Attest container images for provenance
  attest-containers:
    name: Attest Container Provenance
    runs-on: namespace-profile-linux-amd64-2x4
    needs: goreleaser
    permissions:
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image digest
        id: digest
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.version }}"
          IMAGE="ghcr.io/holomush/holomush:${VERSION}"

          # Resolve the multi-arch image INDEX digest — the correct attestation
          # subject for a manifest list. The Go-template form
          # (`--format '{{.Manifest.Digest}}'`) silently prints the default
          # human output in this buildx version, so use the structured JSON
          # dump (`--format '{{json .}}'`) and pull `.manifest.digest` with jq.
          # Validated against ghcr.io/holomush/holomush:0.1.5.
          echo "Fetching index digest for ${IMAGE}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .}}' | jq -r '.manifest.digest')

          if [[ "${DIGEST}" != sha256:* ]]; then
            echo "ERROR: Could not resolve index digest for ${IMAGE} (got: '${DIGEST}')"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"

      - name: Attest container provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/holomush/holomush
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  # Final verification step - ensures all signing and attestation succeeded
  verify-release:
    name: Verify Release
    runs-on: namespace-profile-linux-amd64-2x4
    needs: [goreleaser, attest-provenance, attest-containers]
    permissions:
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify checksums signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.version }}"
          # goreleaser's version output is un-prefixed (matches the image tag
          # ghcr.io/...:0.1.6), but the GitHub release/tag is v-prefixed
          # (v0.1.6). Use the v-prefixed tag for gh release lookups.
          RELEASE_TAG="v${VERSION}"

          echo "Verifying release ${RELEASE_TAG}..."

          # Wait for release to be available (handles propagation delay)
          for i in {1..5}; do
            if gh release view "${RELEASE_TAG}" -R holomush/holomush > /dev/null 2>&1; then
              break
            fi
            echo "Release not yet available, waiting... (attempt $i/5)"
            sleep 10
          done

          # Download checksums and the cosign v3 sigstore bundle.
          mkdir -p dist
          if ! gh release download "${RELEASE_TAG}" -R holomush/holomush -D dist \
            -p 'checksums.txt' -p 'checksums.txt.sigstore.json'; then
            echo "ERROR: Failed to download release artifacts"
            echo "This may indicate the release was not published or signing failed"
            gh release view "${RELEASE_TAG}" -R holomush/holomush --json assets || true
            exit 1
          fi

          # Verify signature against the bundle (cosign v3). The bundle carries
          # both the signature and the signing certificate, so no separate
          # --certificate / --signature flags are needed.
          cosign verify-blob \
            --bundle dist/checksums.txt.sigstore.json \
            --certificate-identity-regexp "https://github.com/holomush/holomush/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/checksums.txt

          echo "✓ Checksums signature verified"

      - name: Verify container signature
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.version }}"

          cosign verify \
            --certificate-identity-regexp "https://github.com/holomush/holomush/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "ghcr.io/holomush/holomush:${VERSION}"

          echo "✓ Container signature verified"

      - name: Release verification complete
        run: |-
          echo "✓ All release artifacts are properly signed and attested"
          echo "  - Binary checksums: signed with Cosign"
          echo "  - Container images: signed with Cosign"
          echo "  - Binary provenance: attested"
          echo "  - Container provenance: attested"
