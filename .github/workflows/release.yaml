name: Release

on:
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    permissions:
      contents: write
    runs-on: namespace-profile-linux-amd64-4x8
    outputs:
      new_tag: ${{ steps.push.outputs.new_tag || steps.check.outputs.new_tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate release app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          args: --bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: CHANGELOG.md

      - name: Check if version bumped
        id: check
        run: |
          TAG="${{ steps.cliff.outputs.version }}"
          if [ -z "$TAG" ]; then
            echo "No releasable commits since last tag. Exiting."
            echo "new_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${TAG#v}"
          echo "new_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit changelog and push
        id: push
        if: steps.check.outputs.new_tag != ''
        run: |
          # Override the remote URL to use the app token for authentication.
          # actions/checkout bakes the default GITHUB_TOKEN into git credentials;
          # we must replace it with the app token to bypass branch protection.
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "holomush-release-bot[bot]"
          git config user.email "holomush-release-bot[bot]@users.noreply.github.com"
          git add CHANGELOG.md

          CHANGED=false

          # Commit only if changelog actually changed.
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${TAG}"
            git push
            CHANGED=true
          fi

          # Create tag if it doesn't already exist.
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
            CHANGED=true
          fi

          # If nothing changed, this is a no-op re-run. Clear the tag so
          # downstream steps (release creation, goreleaser) are skipped.
          if [ "$CHANGED" = "false" ]; then
            echo "Tag ${TAG} and changelog already exist. Nothing to do."
            echo "new_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "new_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.check.outputs.new_tag }}

      - name: Create GitHub release
        if: steps.push.outputs.new_tag != ''
        run: |
          # Create release if it doesn't already exist (idempotent).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --verify-tag \
              --draft
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.push.outputs.new_tag }}
          NOTES: ${{ steps.cliff.outputs.content }}

  goreleaser:
    name: Build, Sign, and Release
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: namespace-profile-linux-amd64-4x8
    outputs:
      version: ${{ needs.release.outputs.version }}
      new_tag: ${{ needs.release.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signing artifacts exist
        run: |
          set -euo pipefail
          echo "Verifying signing artifacts..."

          if [[ ! -f dist/checksums.txt.sig ]]; then
            echo "ERROR: checksums.txt.sig not found - signing may have failed"
            ls -la dist/
            exit 1
          fi

          if [[ ! -f dist/checksums.txt.sig.cert ]]; then
            echo "ERROR: checksums.txt.sig.cert not found - signing may have failed"
            ls -la dist/
            exit 1
          fi

          echo "Signing artifacts verified:"
          ls -la dist/checksums.txt.sig*

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "ghcr.io/holomush/holomush:${{ needs.release.outputs.version }}"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*.tar.gz"

      - name: Get container image digest
        id: digest
        run: |
          set -euo pipefail
          VERSION="${{ needs.release.outputs.version }}"
          IMAGE="ghcr.io/holomush/holomush:${VERSION}"

          echo "Fetching digest for ${IMAGE}"
          MANIFEST_STDERR=$(mktemp)
          if ! docker manifest inspect "${IMAGE}" --verbose > /tmp/manifest.json 2> "${MANIFEST_STDERR}"; then
            echo "ERROR: Failed to inspect manifest for ${IMAGE}"
            cat "${MANIFEST_STDERR}"
            exit 1
          fi

          DIGEST=$(jq -r '.Descriptor.digest // .digest' /tmp/manifest.json | head -1)

          if [[ -z "${DIGEST}" || "${DIGEST}" == "null" ]]; then
            echo "ERROR: Could not extract digest from manifest"
            cat /tmp/manifest.json
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"

      - name: Attest container provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/holomush/holomush
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Publish release
        run: gh release edit "$TAG" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.new_tag }}

  verify-release:
    name: Verify Release
    runs-on: namespace-profile-linux-amd64-4x8
    needs: [goreleaser]
    permissions:
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify checksums signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.new_tag }}"

          echo "Verifying release ${VERSION}..."

          # Wait for release to be available (handles propagation delay)
          for i in {1..5}; do
            if gh release view "${VERSION}" -R holomush/holomush > /dev/null 2>&1; then
              break
            fi
            echo "Release not yet available, waiting... (attempt $i/5)"
            sleep 10
          done

          # Download checksums and signature
          mkdir -p dist
          if ! gh release download "${VERSION}" -R holomush/holomush -D dist \
            -p 'checksums.txt' -p 'checksums.txt.sig' -p 'checksums.txt.sig.cert'; then
            echo "ERROR: Failed to download release artifacts"
            gh release view "${VERSION}" -R holomush/holomush --json assets || true
            exit 1
          fi

          # Verify signature
          cosign verify-blob \
            --certificate dist/checksums.txt.sig.cert \
            --signature dist/checksums.txt.sig \
            --certificate-identity-regexp "https://github.com/holomush/holomush/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/checksums.txt

          echo "Checksums signature verified"

      - name: Verify container signature
        run: |
          set -euo pipefail
          VERSION="${{ needs.goreleaser.outputs.new_tag }}"

          cosign verify \
            --certificate-identity-regexp "https://github.com/holomush/holomush/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "ghcr.io/holomush/holomush:${{ needs.goreleaser.outputs.version }}"

          echo "Container signature verified"

      - name: Release verification complete
        run: |
          echo "All release artifacts are properly signed and attested"
          echo "  - Binary checksums: signed with Cosign"
          echo "  - Container images: signed with Cosign"
          echo "  - Binary provenance: attested"
          echo "  - Container provenance: attested"
