name: Scripts Tests

on:
  pull_request:
    paths:
      - "scripts/**"
      - "Taskfile.yaml"
      - ".github/workflows/scripts-tests.yaml"
      # The Bats job consumes local composite actions (install-task,
      # install-cog, install-formatters); edits to them must re-run this
      # workflow, so trigger on the whole actions dir.
      - ".github/actions/**"
      - ".claude/skills/holomush-dev/scripts/**"

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"

      - name: Run pytest
        working-directory: scripts
        run: uv run --group dev pytest tests/ -v

      - name: Lint with ruff
        working-directory: scripts
        run: |-
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .

  bats:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup bats + bats-support + bats-assert
        # Installs bats + plugins. The action exposes the install location
        # as the `lib-path` STEP OUTPUT (not as $GITHUB_ENV), so the
        # subsequent run step wires it into BATS_LIB_PATH explicitly.
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install yq (mikefarah)
        # Required by scripts/docs-paths-regex.sh + scripts/lint-docs-paths-sync.sh.
        # Ubuntu's apt `yq` is the python kislyuk wrapper with different syntax;
        # we need mikefarah's Go implementation. Built from go.tool.mod (pinned
        # there) via the module proxy — no GitHub Releases dependency.
        run: |-
          mkdir -p "$HOME/.local/bin"
          GOWORK=off go build -modfile=go.tool.mod \
            -o "$HOME/.local/bin/yq" github.com/mikefarah/yq/v4
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/yq" --version

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Install cog
        # scripts/tests/cog-release.bats invokes `cog`; without it those tests
        # fail with status 127 (command not found). Reuses the same pinned
        # composite action as the release + commit-lint workflows.
        uses: ./.github/actions/install-cog

      - name: Install formatters
        # ripgrep + rumdl + dprint. license-eye.bats (INV-3/4/6) and
        # no-lefthook-refs.bats run `rg` and the full `task fmt` (fmt:markdown
        # via rumdl, fmt:dprint via dprint). Shared SHA-pinned versions live in
        # the composite, mirroring the CI Lint job. gofumpt/yamlfmt come via
        # `go tool`; license-eye self-installs via the license:add guard.
        uses: ./.github/actions/install-formatters

      # docs-parity.bats (INV-1/INV-5) verifies the BUILT site under site/dist.
      # Build it here (Astro needs Node >= 22.12, hence node 24) so the parity
      # test runs against real output; without a dist it self-skips.
      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: site/.bun-version

      - name: Build docs site (for docs-parity.bats)
        working-directory: site
        run: bun install --frozen-lockfile && bunx astro build

      - name: Run bats
        # Plumb the bats-action install path into BATS_LIB_PATH so
        # `bats_load_library bats-support` / `bats-assert` resolve.
        # Taskfile's test:bats respects an externally-set BATS_LIB_PATH.
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
        run: task test:bats

  plugin-scripts:
    name: Plugin scripts tests (holomush-dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
      - name: Run pytest
        working-directory: .claude/skills/holomush-dev/scripts
        run: uv run --group dev pytest tests/ -v
      - name: Lint with ruff
        working-directory: .claude/skills/holomush-dev/scripts
        run: |-
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .
