name: Scripts Tests

on:
  pull_request:
    paths:
      - "scripts/**"
      - "Taskfile.yaml"
      - ".github/workflows/scripts-tests.yaml"

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.15"

      - name: Run pytest
        working-directory: scripts
        run: uv run --group dev pytest tests/ -v

      - name: Lint with ruff
        working-directory: scripts
        run: |-
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .

  bats:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup bats + bats-support + bats-assert
        # Installs bats + plugins. The action exposes the install location
        # as the `lib-path` STEP OUTPUT (not as $GITHUB_ENV), so the
        # subsequent run step wires it into BATS_LIB_PATH explicitly.
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install yq (mikefarah)
        # Required by scripts/docs-paths-regex.sh + scripts/lint-docs-paths-sync.sh.
        # Ubuntu's apt `yq` is the python kislyuk wrapper with different syntax;
        # we need mikefarah's Go implementation. Built from go.tool.mod (pinned
        # there) via the module proxy — no GitHub Releases dependency.
        run: |-
          mkdir -p "$HOME/.local/bin"
          GOWORK=off go build -modfile=go.tool.mod \
            -o "$HOME/.local/bin/yq" github.com/mikefarah/yq/v4
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/yq" --version

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Install cog
        # scripts/tests/cog-release.bats invokes `cog`; without it those tests
        # fail with status 127 (command not found). Reuses the same pinned
        # composite action as the release + commit-lint workflows.
        uses: ./.github/actions/install-cog

      - name: Install rumdl + dprint
        # license-eye.bats INV-4 runs the full `task fmt`, which invokes
        # fmt:markdown (rumdl) + fmt:dprint (dprint). Pinned to match the CI
        # Lint job's Install tools step. gofumpt/yamlfmt come via `go tool`;
        # license-eye self-installs via the license:add guard.
        run: |
          RUMDL_VERSION="v0.1.62"
          RUMDL_TARBALL="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          RUMDL_URL="https://github.com/rvben/rumdl/releases/download/${RUMDL_VERSION}/${RUMDL_TARBALL}"
          RUMDL_SHA256="a25d9bab27ac9f17589e25cde32ce580c81dfd7bcc4a21e6dbfcd65bc7c1353c"
          curl -LsSfO "${RUMDL_URL}"
          echo "${RUMDL_SHA256}  ${RUMDL_TARBALL}" | sha256sum -c -
          sudo tar xzf "${RUMDL_TARBALL}" --overwrite -C /usr/local/bin
          rm "${RUMDL_TARBALL}"
          DPRINT_VERSION="0.51.1"
          DPRINT_ZIP="dprint-x86_64-unknown-linux-gnu.zip"
          DPRINT_URL="https://github.com/dprint/dprint/releases/download/${DPRINT_VERSION}/${DPRINT_ZIP}"
          DPRINT_SHA256="674c1f9fcdf8a564c26cc027e080d0c4758a40a566e04a776fc83c875ad51d45"
          curl -LsSfO "${DPRINT_URL}"
          echo "${DPRINT_SHA256}  ${DPRINT_ZIP}" | sha256sum -c -
          sudo unzip -oq "${DPRINT_ZIP}" -d /usr/local/bin
          rm "${DPRINT_ZIP}"

      - name: Run bats
        # Plumb the bats-action install path into BATS_LIB_PATH so
        # `bats_load_library bats-support` / `bats-assert` resolve.
        # Taskfile's test:bats respects an externally-set BATS_LIB_PATH.
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
        run: task test:bats
