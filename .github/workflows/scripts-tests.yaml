name: Scripts Tests

on:
  pull_request:
    paths:
      - "scripts/**"

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"

      - name: Run pytest
        working-directory: scripts
        run: uv run --group dev pytest tests/ -v

      - name: Lint with ruff
        working-directory: scripts
        run: |
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .
