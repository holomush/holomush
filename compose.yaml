# Local development stack. Build with: task docker:build
# Run with: task docker:up

services:
  postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: holomush
    volumes:
      - ./docker/postgres/init-role.sh:/docker-entrypoint-initdb.d/01-init-role.sh
      # postgres:18+ stores data in a major-version-specific subdir
      # (/var/lib/postgresql/18/docker) rather than /var/lib/postgresql/data.
      # Mount the parent so the subdir is persisted. Pre-18 volumes are not
      # upgraded in place — drop them with `docker compose down -v`.
      - pgdata:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holomush"]
      interval: 2s
      timeout: 5s
      retries: 10

  core:
    image: holomush
    command: ["core", "--log-format", "text", "--grpc-addr", "0.0.0.0:9000", "--metrics-addr", "0.0.0.0:9100"]
    environment:
      DATABASE_URL: postgres://holomush:holomush@postgres:5432/holomush?sslmode=disable
      # Set unconditionally — when the observability profile is inactive, the OTel SDK
      # retries silently with a no-op error handler (see internal/telemetry/provider.go).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - certs:/home/holomush/.config/holomush/certs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/healthz/readiness || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  gateway:
    image: holomush
    command: ["gateway", "--log-format", "text", "--core-addr", "core:9000", "--metrics-addr", "0.0.0.0:9101"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - certs:/home/holomush/.config/holomush/certs:ro
    networks:
      - frontend
    ports:
      - "8080:8080"
      - "4201:4201"
    depends_on:
      core:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest@sha256:a516c26968aa1feb5e5fc0562e3338ea13755cb4f373603226bcc4e276374ad0
    profiles: [observability]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - backend
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    profiles: [observability]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - backend
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    profiles: [observability]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1h"
    volumes:
      - ./docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    depends_on:
      core:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    profiles: [observability]
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - backend
    depends_on:
      - prometheus
      - jaeger

  dozzle:
    image: amir20/dozzle:latest@sha256:03ac4280eec733d004de0a46a3944e8ef0d3fbd9c317027b19492d4ed360aa89
    profiles: [observability]
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  frontend:
  backend:

volumes:
  pgdata:
  certs:
