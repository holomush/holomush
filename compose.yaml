# Local development stack. Build with: task docker:build
# Run with: task docker:up

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: holomush
    volumes:
      - ./docker/postgres/init-role.sh:/docker-entrypoint-initdb.d/01-init-role.sh
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holomush"]
      interval: 2s
      timeout: 5s
      retries: 10

  core:
    image: holomush
    command: ["core", "--log-format", "text", "--grpc-addr", "0.0.0.0:9000", "--metrics-addr", "0.0.0.0:9100"]
    environment:
      DATABASE_URL: postgres://holomush:holomush@postgres:5432/holomush?sslmode=disable
      # Set unconditionally — when the observability profile is inactive, the OTel SDK
      # retries silently with a no-op error handler (see internal/telemetry/provider.go).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - certs:/home/holomush/.config/holomush/certs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/healthz/readiness || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  gateway:
    image: holomush
    command: ["gateway", "--log-format", "text", "--core-addr", "core:9000", "--metrics-addr", "0.0.0.0:9101"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - certs:/home/holomush/.config/holomush/certs:ro
    networks:
      - frontend
    ports:
      - "8080:8080"
      - "4201:4201"
    depends_on:
      core:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: [observability]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - backend
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: [observability]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - backend
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest
    profiles: [observability]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1h"
    volumes:
      - ./docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    depends_on:
      core:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    profiles: [observability]
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - backend
    depends_on:
      - prometheus
      - jaeger

  dozzle:
    image: amir20/dozzle:latest
    profiles: [observability]
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  frontend:
  backend:

volumes:
  pgdata:
  certs:
