# Local development stack. Build with: task docker:build
# Run with: task docker:up

services:
  postgres:
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: holomush
    volumes:
      - ./docker/postgres/init-role.sh:/docker-entrypoint-initdb.d/01-init-role.sh
      # postgres:18+ stores data in a major-version-specific subdir
      # (/var/lib/postgresql/18/docker) rather than /var/lib/postgresql/data.
      # Mount the parent so the subdir is persisted. Pre-18 volumes are not
      # upgraded in place — drop them with `docker compose down -v`.
      - pgdata:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holomush"]
      interval: 2s
      timeout: 5s
      retries: 10

  core:
    image: holomush
    command: ["core", "--log-format", "text", "--grpc-addr", "0.0.0.0:9000", "--metrics-addr", "0.0.0.0:9100", "--auto-gen-kek"]
    environment:
      DATABASE_URL: postgres://holomush:holomush@postgres:5432/holomush?sslmode=disable
      # KEK is required to boot. The keyfile is minted on first start via
      # --auto-gen-kek and persisted in the certs volume; subsequent starts
      # reuse it. HOLOMUSH_KEK_PASSPHRASE is a fixed dev value — change this
      # for production deployments (or use HOLOMUSH_KEK_PASSPHRASE_FILE).
      HOLOMUSH_KEK_FILE: /home/holomush/.config/holomush/certs/master.key.enc
      HOLOMUSH_KEK_PASSPHRASE: ${HOLOMUSH_KEK_PASSPHRASE:-dev-local-passphrase}
      # Set unconditionally — when the observability profile is inactive, the OTel SDK
      # retries silently with a no-op error handler (see internal/telemetry/provider.go).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Sentry trial integration (holomush-0wun). Disabled by default; set
      # SENTRY_DSN in repo-root `.env` (gitignored — compose auto-reads) to
      # enable. See site/docs/operating/sentry.md.
      SENTRY_DSN: ${SENTRY_DSN-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT-dev-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE-1.0}
    volumes:
      - certs:/home/holomush/.config/holomush/certs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/healthz/readiness || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  gateway:
    image: holomush
    command: ["gateway", "--log-format", "text", "--core-addr", "core:9000", "--metrics-addr", "0.0.0.0:9101"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Same-origin browser trace relay (/api/otlp/v1/traces). Empty by
      # default: the dev observability flow (`task dev` + `task dev:obs`) points
      # PUBLIC_OTEL_ENDPOINT straight at localhost:4318, so the relay isn't on
      # the dev path. Set to http://otel-collector:4318 to exercise the relay
      # in compose — the collector is on both networks, so otel-collector:4318
      # resolves from the gateway's frontend network.
      OTLP_RELAY_ENDPOINT: ${OTLP_RELAY_ENDPOINT-}
      SENTRY_DSN: ${SENTRY_DSN-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT-dev-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE-1.0}
    volumes:
      - certs:/home/holomush/.config/holomush/certs:ro
    networks:
      - frontend
    ports:
      - "8080:8080"
      - "4201:4201"
    depends_on:
      core:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest@sha256:b3079f45e19bdb7326bf49cdddce6cf60dfd865138db39f2733ea48ab17bc4cb
    profiles: [observability]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - backend
      # Gateway is frontend-only but exports OTLP to otel-collector:4317, so the
      # collector must also be on frontend or the gateway's gRPC exporter fails
      # DNS resolution ("produced zero addresses"). Mirrors compose.prod.yaml.
      - frontend
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    # Jaeger v2 all-in-one (jaegertracing/jaeger). The v1 jaegertracing/all-in-one
    # image is end-of-life (Dec 31 2025). v2 runs with a built-in all-in-one default
    # config — memory storage, OTLP receivers on 4317/4318, UI on 16686 — so the
    # v1-only COLLECTOR_OTLP_ENABLED env var is dropped (OTLP is on by default). The
    # otel-collector still forwards traces to jaeger:4317 via OTLP (docker/otel-collector/config.yaml).
    image: jaegertracing/jaeger:latest@sha256:ede4864215be4cd85bd8c3129a2fea6c5713c5653c7282c429dba123014bc68b
    profiles: [observability]
    networks:
      - backend
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    profiles: [observability]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1h"
    volumes:
      - ./docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    depends_on:
      core:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    profiles: [observability]
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - backend
    depends_on:
      - prometheus
      - jaeger

  dozzle:
    image: amir20/dozzle:latest@sha256:2e14180fa14c195b8e86705b7ab2234b87599215bcf06f7f56396cb45f57f963
    profiles: [observability]
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  frontend:
  backend:

volumes:
  pgdata:
  certs:
