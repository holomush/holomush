# buf.yaml — multi-module workspace.
#
# Two modules:
#   - api/proto                 Public schema. Generates Go (→ pkg/proto/)
#                               AND TypeScript (→ web/src/lib/connect/).
#                               Consumed by plugin SDK and web client.
#   - internal/eventbus/cursor  Host-internal opaque cursor format.
#                               Generates Go ONLY (→ internal/eventbus/cursor/cursorv1/).
#                               MUST NOT leak to plugins or the web client —
#                               enforced by the CursorPackageInternal analyzer
#                               (gorules/analyzers/cursorpackageinternal/) and
#                               by NOT being inputted to web/buf.gen.yaml.
#
# Both modules are subject to `buf lint` and `buf breaking` per the configs
# below. Generation is per-module via separate buf.gen.<name>.yaml files —
# `task proto` runs both.
version: v2
modules:
  - path: api/proto
    name: buf.build/holomush/holomush
  - path: internal/eventbus/cursor
deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate
lint:
  use:
    - STANDARD
    - COMMENTS
  # The internal cursor proto deliberately lives at the root of its
  # module path (internal/eventbus/cursor/cursor.proto) for file-tree
  # opacity — not in a deep holomush/eventbus/cursor/v1/ subdirectory
  # like the public schema. Exempt it from PACKAGE_DIRECTORY_MATCH.
  ignore_only:
    PACKAGE_DIRECTORY_MATCH:
      - internal/eventbus/cursor/cursor.proto
    # Rekey RPCs intentionally share RekeyProgress (Rekey + RekeyResume) and
    # RekeyStatusResponse (RekeyStatus + RekeyList). The shared streaming type
    # is the canonical plan shape (jxo8.7.27) — naming per-RPC would require
    # aliasing identical messages, which adds no semantic value.
    RPC_REQUEST_RESPONSE_UNIQUE:
      - api/proto/holomush/admin/v1/admin.proto
    RPC_RESPONSE_STANDARD_NAME:
      - api/proto/holomush/admin/v1/admin.proto
    # SP0 ratchet (holomush-300ad): each proto below is exempt from COMMENT_*
    # until fully documented. Document → remove this line AND its
    # api/proto/doc-ratchet.yaml entry in the same PR. Delete this whole block
    # when empty. Bijection enforced by test/meta/proto_doc_ratchet_test.go.
    COMMENTS:
      - api/proto/holomush/core/v1/core.proto
      - api/proto/holomush/plugin/v1/plugin.proto
      - api/proto/holomush/plugin/v1/hostfunc.proto
      - api/proto/holomush/plugin/v1/attribute.proto
      - api/proto/holomush/web/v1/web.proto
      - api/proto/holomush/scene/v1/scene.proto
      - api/proto/holomush/world/v1/world.proto
      - api/proto/holomush/control/v1/control.proto
      - api/proto/holomush/admin/v1/admin.proto
      - api/proto/holomush/admin/v1/rekey.proto
breaking:
  use:
    - FILE
