version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Bugs
    - errcheck
    - govet
    - staticcheck
    - nilerr

    # Style
    - revive
    - misspell

    # Performance
    - prealloc
    - unconvert

    # Security
    - gosec

    # Error handling
    - errorlint
    - wrapcheck

    # Maintenance
    - unparam
    - gocritic
    - nolintlint
    - depguard

    # Logging correctness — enforce trace-context propagation + structured-log
    # discipline (see CLAUDE.md "Structured Logging" + .claude/rules/logging.md,
    # spec docs/superpowers/specs/2026-05-24-logging-discipline-policy-design.md).
    - sloglint

    # Custom bans
    - forbidigo

    # HoloMUSH custom analyzers (gorules/)
    - codeckeybytesallowlist
    - cursorpackageinternal
    - dekmaterialnofmtformatting
    - dekmaterialnogob
    - dekmaterialnojson
    - dekmaterialnolog
    - dekmaterialnoproto
    - dekmaterialnoslog
    - noremoteclockcompare
    - sceneopseventsappendonly
    - ulidmakeforbidden

  exclusions:
    # Default exclusion presets
    presets:
      - common-false-positives

    # No path-level exclusions. The previous `plugins/` exclusion was a
    # leftover from a TinyGo WASM plugin design that no longer exists in
    # this codebase. The current plugin layout under plugins/ is:
    #   - Lua plugins (core-aliases, core-building, core-communication,
    #     core-help, core-objects, echo-bot, setting-crossroads,
    #     setting-skeleton) — no Go files, nothing for golangci-lint to
    #     scan.
    #   - Go binary plugins (core-scenes, test-abac-widget) — should be
    #     linted normally like any other Go package.

    rules:
      # Test files can have longer functions and more complexity
      # Also exclude errcheck blank identifier checks for test cleanup code
      - path: '_test\.go'
        linters:
          - gocritic
          - wrapcheck
          - errcheck

      # ulidmakeforbidden replaces a ruleguard rule that only fired in
      # production because gocritic was excluded for _test.go. Tests
      # legitimately use ulid.Make() for fixture generation; preserve
      # that scope.
      - path: '_test\.go'
        linters:
          - ulidmakeforbidden

      # cursorpackageinternal replaces a ruleguard rule that only fired
      # in production for the same reason (gocritic excluded for
      # _test.go). Tests in allowlist-adjacent packages (e.g., the
      # external `hostfunc_test` package, whose pkg path has a `_test`
      # suffix that doesn't match the `internal/plugin/hostfunc`
      # allowlist entry) legitimately reference cursor symbols. Preserve
      # the original de-facto test-file scope.
      - path: '_test\.go'
        linters:
          - cursorpackageinternal

      # Test password hashes (argon2id fixtures) are not real credentials.
      # G101 fires on struct literals containing PasswordHash fields.
      - path: '_test\.go'
        linters:
          - gosec
        text: 'G101'

      # Main package doesn't need to wrap errors
      - path: cmd/
        linters:
          - wrapcheck

      # Package name "types" triggers var-naming but matches spec directory structure
      - path: internal/access/policy/types/
        linters:
          - revive
        text: var-naming

      # G706 (log injection) is a false positive when using structured slog: key-value pairs
      # prevent injection regardless of whether values are user-controlled.
      # Scoped to known slog-only packages; new packages using fmt/log must be added here.
      - path: '(internal/(access|command|core|grpc|logging|observability|plugin|store|telnet|tls|web|world|xdg)|cmd|pkg)/.+\.go$'
        linters:
          - gosec
        text: G706

      # forbidigo: only enforce the time.Sleep ban inside the eventbus paths.
      # Outside of those paths, time.Sleep is legitimate (legacy tests, etc.).
      # path-except matches files whose path does NOT match the regex; we
      # invert by disabling forbidigo on everything that is NOT under
      # internal/eventbus/ or test/integration/eventbus_e2e/.
      - path-except: '(internal/eventbus/|test/integration/eventbus_e2e/)'
        linters:
          - forbidigo

  settings:
    depguard:
      rules:
        no-test-only-constructs-in-production:
          # Apply only to production files: not *_test.go, and not the
          # test-support packages that legitimately wire harnesses in
          # non-_test.go files. A rule whose `files` are all negations
          # applies to every file except those excluded.
          files:
            - "!$test"
            - "!**/internal/testsupport/**"
            - "!**/internal/cluster/clustertest/**"
            - "!**/test/testutil/**"
          deny:
            - pkg: github.com/holomush/holomush/internal/eventbus/eventbustest
              desc: "embedded NATS test harness; production code MUST NOT import it (holomush-1eps2)"
            - pkg: github.com/holomush/holomush/internal/core/coretest
              desc: "in-memory test event store; production code MUST NOT import it (holomush-1eps2)"
            - pkg: github.com/holomush/holomush/internal/testsupport/quarantinetest
              desc: "quarantine skip helper; production code MUST NOT import it (holomush-b4myw)"
            - pkg: github.com/holomush/holomush/internal/testsupport/natstest
              desc: "external NATS test harness; production code MUST NOT import it (CLUSTER-03)"

    errcheck:
      check-type-assertions: true
      check-blank: true

    sloglint:
      # *Context variant required only when a context.Context is in scope
      # (leaves main/init/bare-goroutine sites untouched).
      context: scope
      no-mixed-args: true
      static-msg: true
      msg-style: lowercased
      key-naming-case: snake
      forbidden-keys:
        - time
        - level
        - msg
        - source

    govet:
      enable-all: true
      disable:
        - fieldalignment # Optimization hint, not a bug - can be addressed later

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam # Event struct (120 bytes) is passed by value by design

    gosec:
      excludes:
        - G104 # Audit errors not checked (handled by errcheck)

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-sig-regexps:
        # oops error library - builder pattern methods create structured errors
        - 'github\.com/samber/oops\.OopsErrorBuilder\)\.New\('
        - 'github\.com/samber/oops\.OopsErrorBuilder\)\.Wrap\('
      ignore-package-globs:
        # oops error library creates structured errors, not wrapping issues
        - github.com/samber/oops

    nolintlint:
      require-explanation: true
      require-specific: true

    custom:
      codeckeybytesallowlist:
        type: module
        description: "INV-27 residual defense: codec.Key.Bytes reads are restricted"
        original-url: github.com/holomush/holomush
      cursorpackageinternal:
        type: module
        description: forbids references to internal/eventbus/cursor outside host packages
        original-url: github.com/holomush/holomush
      dekmaterialnofmtformatting:
        type: module
        description: "INV-27: dek.Material MUST NOT be passed to fmt formatting"
        original-url: github.com/holomush/holomush
      dekmaterialnogob:
        type: module
        description: "INV-27: dek.Material MUST NOT be passed to encoding/gob"
        original-url: github.com/holomush/holomush
      dekmaterialnojson:
        type: module
        description: "INV-27: dek.Material MUST NOT be passed to encoding/json"
        original-url: github.com/holomush/holomush
      dekmaterialnolog:
        type: module
        description: "INV-27: dek.Material MUST NOT be passed to log"
        original-url: github.com/holomush/holomush
      dekmaterialnoproto:
        type: module
        description: "INV-27: dek.Material MUST NOT be passed to google.golang.org/protobuf/proto"
        original-url: github.com/holomush/holomush
      dekmaterialnoslog:
        type: module
        description: "INV-27: dek.Material MUST NOT be passed to log/slog"
        original-url: github.com/holomush/holomush
      noremoteclockcompare:
        type: module
        description: "INV-58: forbids wall-clock comparisons against remote-sourced timestamp fields (Decision 8)"
        original-url: github.com/holomush/holomush
      sceneopseventsappendonly:
        type: module
        description: forbids UPDATE/DELETE/TRUNCATE against scene_ops_events
        original-url: github.com/holomush/holomush
      ulidmakeforbidden:
        type: module
        description: forbids ulid.Make() (uses math/rand instead of crypto/rand)
        original-url: github.com/holomush/holomush

    forbidigo:
      # Scoping is enforced via exclusions.rules below (path-except):
      # the forbidigo linter is DISABLED outside eventbus paths, so the
      # forbid pattern below only fires inside internal/eventbus/** and
      # test/integration/eventbus_e2e/**. The `pkg:` field in forbidigo
      # matches the package DEFINING the symbol (i.e., `time`), not the
      # calling file's path — hence path-based scoping is the correct
      # mechanism.
      forbid:
        - pattern: '^time\.Sleep$'
          msg: "time.Sleep is banned in eventbus code; use eventbustest.Await* helpers (spec §8, invariant: no hidden waits)."
      analyze-types: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
