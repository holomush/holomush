# Codecov configuration for HoloMUSH.
# Docs: https://docs.codecov.com/docs/codecov-yaml

# Files and paths to exclude from coverage reporting.
# Only generated code is excluded — real Go code, including test plugins,
# must be covered by real tests.
ignore:
  - "**/*.pb.go"
  - "pkg/proto/**"
