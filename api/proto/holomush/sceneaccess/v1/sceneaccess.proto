}

// WatchSceneRequest is the facade request for observer auto-join. session_id
// and player_session_token authenticate the calling player; the facade
// resolves the acting character SERVER-SIDE and ignores/overrides any
// client-supplied identity (INV-SCENE-63). The character's existing game
// session is looked up server-side via FindByCharacter; the caller MUST have
// selected the character (via SelectCharacter) before calling WatchScene.
message WatchSceneRequest {
  // session_id is the client-declared player-session ULID. Authentication is
  // performed SOLELY against player_session_token (below, the authoritative
  // bearer); session_id is NOT consulted. A session↔token cross-check was
  // deliberately NOT wired (holomush-5rh.8.23 decision): it adds no security
  // over the authoritative token and would risk rejecting valid clients whose
  // session_id semantics differ. The field is retained as a forward-looking
  // hint — clients SHOULD send the player session they authenticated with.
  string session_id = 1;
  // player_session_token is the raw bearer token for the player session. The
  // facade looks up the session by token hash and rejects unauthenticated
  // callers with codes.Unauthenticated. The client-supplied character_id
  // is then verified as owned by this session's player (INV-SCENE-63).
  string player_session_token = 2;
  // character_id is the "act as this alt" selector. The facade verifies
  // ownership against the authenticated player before passing the
  // server-verified ID downstream; a character not owned by the player
  // returns codes.NotFound (INV-SCENE-63).
  string character_id = 3;
  // scene_id identifies the scene to watch; required. Must be visibility=open
  // and active or paused.
  string scene_id = 4;
}

// WatchSceneResponse wraps the plugin's observer-join confirmation.
message WatchSceneResponse {
  // participant is the resulting participant entry (role=observer), or the
  // pre-existing row when the character was already a participant.
  holomush.scene.v1.ParticipantInfo participant = 1;
}

// CreateSceneRequest is the facade request to create a scene. player_session_token
// authenticates the calling player (session_id is a reserved client hint, not
// consulted); the facade resolves the acting character SERVER-SIDE from the
// player's owned-character set (INV-SCENE-63) and overrides any client identity.
message CreateSceneRequest {
  // session_id is the client-declared player-session ULID, retained as a
  // forward-looking hint; authentication is performed SOLELY against
  // player_session_token (holomush-5rh.8.23 decision).
  string session_id = 1;
  // player_session_token is the raw bearer token; the facade looks up the
  // session by token hash and rejects unauthenticated callers
  // (codes.Unauthenticated) and guests (codes.PermissionDenied, INV-SCENE-64).
  string player_session_token = 2;
  // character_id selects which owned alt becomes the scene owner; the facade
  // verifies ownership before passing the server-verified ID downstream
  // (codes.NotFound when not owned, INV-SCENE-63).
  string character_id = 3;
  // title is the scene title; required. The plugin handler rejects empty or
  // whitespace-only titles after trim.
  string title = 4;
  // description is an optional scene synopsis; empty omits it.
  string description = 5;
}

// CreateSceneResponse wraps the created scene's full metadata projection.
message CreateSceneResponse {
  // scene is the newly created scene; the verified character is its owner and
  // first participant.
  holomush.scene.v1.SceneInfo scene = 1;
}

// ExportSceneRequest is the facade request for scene IC log export.
// player_session_token authenticates the calling player (session_id is a
// reserved client hint, not yet consulted); the facade resolves the acting
// character SERVER-SIDE and ignores/overrides any client-supplied identity
// (INV-SCENE-63).
message ExportSceneRequest {
  // session_id is the client-declared player-session ULID. Authentication is
  // performed SOLELY against player_session_token (below, the authoritative
  // bearer); session_id is NOT consulted. A session↔token cross-check was
  // deliberately NOT wired (holomush-5rh.8.23 decision): it adds no security
  // over the authoritative token and would risk rejecting valid clients whose
  // session_id semantics differ. The field is retained as a forward-looking
  // hint — clients SHOULD send the player session they authenticated with.
  string session_id = 1;
  // player_session_token is the raw bearer token for the player session. The
  // facade looks up the session by token hash and rejects unauthenticated
  // callers with codes.Unauthenticated. The client-supplied character_id
  // is then verified as owned by this session's player (INV-SCENE-63).
  string player_session_token = 2;
  // character_id is the "act as this alt" selector. The facade verifies
  // ownership against the authenticated player before passing the
  // server-verified ID downstream; a character not owned by the player
  // returns codes.NotFound (INV-SCENE-63).
  string character_id = 3;
  // scene_id identifies the scene to export; required.
  string scene_id = 4;
  // format is the render format; required. Supported: "markdown" or "jsonl".
  string format = 5;
}

// ExportSceneResponse wraps the plugin's rendered scene-log document.
message ExportSceneResponse {
  // content is the rendered document bytes.
  bytes content = 1;
  // mime_type is the content's MIME type (text/markdown or application/jsonl).
  string mime_type = 2;
  // filename is the suggested download filename (slugified title + extension).
  string filename = 3;
}

// SetSceneFocusRequest is the facade request to set per-connection scene focus
// for a web portal connection. session_id and player_session_token authenticate
// the calling player; the facade verifies that the connection belongs to a game
// session owned by one of the player's characters before calling
// SetConnectionFocus (INV-SCENE-63).
message SetSceneFocusRequest {
  // session_id is the client-declared player-session ULID. Authentication is
  // performed SOLELY against player_session_token (below, the authoritative
  // bearer); session_id is NOT consulted. A session↔token cross-check was
  // deliberately NOT wired (holomush-5rh.8.23 decision): it adds no security
  // over the authoritative token and would risk rejecting valid clients whose
  // session_id semantics differ. The field is retained as a forward-looking
  // hint — clients SHOULD send the player session they authenticated with.
  string session_id = 1;
  // player_session_token is the raw bearer token for the player session. The
  // facade looks up the session by token hash and rejects unauthenticated
  // callers with codes.Unauthenticated (INV-SCENE-63).
  string player_session_token = 2;
  // connection_id is the ULID of the web portal connection whose focus to set;
  // required. The facade verifies the connection belongs to a game session
  // owned by one of this player's characters.
  string connection_id = 3;
  // scene_id is the scene to focus on; optional. When empty, the focus is
  // cleared (grid default).
  string scene_id = 4;
}

// SetSceneFocusResponse is intentionally empty — a successful focus set
// carries no body; the client may update its local focus state optimistically.
message SetSceneFocusResponse {}

// ListPublishedScenesRequest is the facade request to page through publicly
// visible PUBLISHED scene archives. session_id and player_session_token
// authenticate the calling player; guest players are rejected (INV-SCENE-64).
message ListPublishedScenesRequest {
  // session_id is the client-declared player-session ULID. Authentication is
  // performed SOLELY against player_session_token (below, the authoritative
  // bearer); session_id is NOT consulted. A session↔token cross-check was
  // deliberately NOT wired (holomush-5rh.8.23 decision): it adds no security
  // over the authoritative token and would risk rejecting valid clients whose
  // session_id semantics differ. The field is retained as a forward-looking
  // hint — clients SHOULD send the player session they authenticated with.
  string session_id = 1;
  // player_session_token is the raw bearer token for the player session. The
  // facade looks up the session by token hash and rejects unauthenticated
  // callers with codes.Unauthenticated. Guest players are denied with
  // codes.PermissionDenied (INV-SCENE-64).
  string player_session_token = 2;
  // limit is the page size; 0 means server default, capped at 200.
  int32 limit = 3;
  // offset is the number of leading results to skip.
  int32 offset = 4;
  // tags restricts results to archives whose source scene carries all of
  // these tags.
  repeated string tags = 5;
}

// ListPublishedScenesResponse wraps the plugin's public archive list.
message ListPublishedScenesResponse {
  // archives is the public-safe published-archive summaries, newest first.
  repeated holomush.scene.v1.PublicSceneArchive archives = 1;
}

// GetPublicSceneArchiveRequest is the facade request for reading a single
// published scene archive without participant authentication. session_id and
// player_session_token authenticate the calling player; guest players are
// rejected (INV-SCENE-64). The only gate on the plugin call is
// status==PUBLISHED (INV-SCENE-35).
message GetPublicSceneArchiveRequest {
  // session_id is the client-declared player-session ULID. Authentication is
  // performed SOLELY against player_session_token (below, the authoritative
  // bearer); session_id is NOT consulted. A session↔token cross-check was
  // deliberately NOT wired (holomush-5rh.8.23 decision): it adds no security
  // over the authoritative token and would risk rejecting valid clients whose
  // session_id semantics differ. The field is retained as a forward-looking
  // hint — clients SHOULD send the player session they authenticated with.
  string session_id = 1;
  // player_session_token is the raw bearer token for the player session. The
  // facade looks up the session by token hash and rejects unauthenticated
  // callers with codes.Unauthenticated. Guest players are denied with
  // codes.PermissionDenied (INV-SCENE-64).
  string player_session_token = 2;
  // published_scene_id identifies the publication attempt to read; required.
  // A missing id or any non-PUBLISHED attempt returns one opaque NOT_FOUND
  // (INV-SCENE-35).
  string published_scene_id = 3;
}

// GetPublicSceneArchiveResponse wraps the plugin's public archive view.
message GetPublicSceneArchiveResponse {
  // id is the publication attempt's ID.
  string id = 1;
  // title_snapshot is the scene title snapshotted at publish time.
  string title_snapshot = 2;
  // participants_snapshot is the participant character names snapshotted at
  // publish time.
  repeated string participants_snapshot = 3;
  // content_entries is the frozen published content.
  repeated holomush.scene.v1.PublishedSceneEntry content_entries = 4;
  // published_at_unix_ns is the epoch-nanosecond publish time.
  int64 published_at_unix_ns = 5;
}

// DownloadPublicSceneArchiveRequest is the facade request for downloading a
// PUBLISHED scene archive without participant authentication. session_id and
// player_session_token authenticate the calling player; guest players are
// rejected (INV-SCENE-64). Same opacity contract as GetPublicSceneArchiveRequest
// (INV-SCENE-35).
message DownloadPublicSceneArchiveRequest {
  // session_id is the client-declared player-session ULID. Authentication is
  // performed SOLELY against player_session_token (below, the authoritative
  // bearer); session_id is NOT consulted. A session↔token cross-check was
  // deliberately NOT wired (holomush-5rh.8.23 decision): it adds no security
  // over the authoritative token and would risk rejecting valid clients whose
  // session_id semantics differ. The field is retained as a forward-looking
  // hint — clients SHOULD send the player session they authenticated with.
  string session_id = 1;
  // player_session_token is the raw bearer token for the player session. The
  // facade looks up the session by token hash and rejects unauthenticated
  // callers with codes.Unauthenticated. Guest players are denied with
  // codes.PermissionDenied (INV-SCENE-64).
  string player_session_token = 2;
  // published_scene_id identifies the publication attempt to download; required.
  // Same opacity contract as GetPublicSceneArchiveRequest (INV-SCENE-35).
  string published_scene_id = 3;
  // format is the render format; required. Supported: "markdown", "plain_text",
  // "jsonl".
  string format = 4;
}

// DownloadPublicSceneArchiveResponse wraps the plugin's rendered public-archive
// bytes and their MIME type.
message DownloadPublicSceneArchiveResponse {
  // content is the rendered file content.
  bytes content = 1;
  // mime_type is the content's MIME type (text/markdown, text/plain, or
  // application/jsonl).
  string mime_type = 2;
}

// EndSceneRequest is the facade request to end a scene. player_session_token
// authenticates the caller; the facade resolves the acting character SERVER-SIDE
// (INV-SCENE-63) and forwards the verified id to SceneService.EndScene.
message EndSceneRequest {
  // session_id is the client-declared player-session ULID (forward-looking hint;
  // authentication is solely via player_session_token).
  string session_id = 1;
  // player_session_token is the raw bearer token; the facade rejects
  // unauthenticated callers (Unauthenticated) and guests (PermissionDenied).
  string player_session_token = 2;
  // character_id selects which owned alt acts; the facade verifies ownership
  // (NotFound when not owned).
  string character_id = 3;
  // scene_id identifies the scene to end; required.
  string scene_id = 4;
}

// EndSceneResponse wraps the scene as of the ended transition.
message EndSceneResponse {
  // scene is the post-transition scene row (state == "ended").
  holomush.scene.v1.SceneInfo scene = 1;
}

// PauseSceneRequest is the facade request to pause a scene; fields mirror
// EndSceneRequest.
message PauseSceneRequest {
  // session_id is the client-declared player-session ULID (hint only).
  string session_id = 1;
  // player_session_token authenticates the caller (see EndSceneRequest).
  string player_session_token = 2;
  // character_id selects the acting owned alt (ownership verified server-side).
  string character_id = 3;
  // scene_id identifies the scene to pause; required.
  string scene_id = 4;
}

// PauseSceneResponse wraps the scene as of the paused transition.
message PauseSceneResponse {
  // scene is the post-transition scene row (state == "paused").
  holomush.scene.v1.SceneInfo scene = 1;
}

// ResumeSceneRequest is the facade request to resume a scene; fields mirror
// EndSceneRequest.
message ResumeSceneRequest {
  // session_id is the client-declared player-session ULID (hint only).
  string session_id = 1;
  // player_session_token authenticates the caller (see EndSceneRequest).
  string player_session_token = 2;
  // character_id selects the acting owned alt (ownership verified server-side).
  string character_id = 3;
  // scene_id identifies the scene to resume; required.
  string scene_id = 4;
}

// ResumeSceneResponse wraps the scene as of the resumed transition.
message ResumeSceneResponse {
  // scene is the post-transition scene row (state == "active").
  holomush.scene.v1.SceneInfo scene = 1;
}
