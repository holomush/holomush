syntax = "proto3";

package holomush.web.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/web/v1;webv1";

enum EventChannel {
  EVENT_CHANNEL_UNSPECIFIED = 0;
  EVENT_CHANNEL_TERMINAL = 1;
  EVENT_CHANNEL_STATE = 2;
  EVENT_CHANNEL_BOTH = 3;
  // EVENT_CHANNEL_AUDIT_ONLY mirrors corev1.EventChannel for INV-GW-16
  // lockstep parity. These events are dropped at the gRPC Subscribe
  // boundary and MUST NOT appear on the web wire format in practice.
  EVENT_CHANNEL_AUDIT_ONLY = 4;
}

enum ControlSignal {
  CONTROL_SIGNAL_UNSPECIFIED = 0;
  CONTROL_SIGNAL_REPLAY_COMPLETE = 1;
  CONTROL_SIGNAL_STREAM_CLOSED = 2;
}

message ControlFrame {
  ControlSignal signal = 1;
  string message = 2;
}

service WebService {
  // Send a game command (say, pose, quit, etc.)
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);

  // Server-streaming event feed. Client receives game events
  // (say, pose, arrive, leave) as they occur.
  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);

  // Disconnect ends the session and triggers cleanup.
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);

  // Retrieve command history for a session.
  rpc GetCommandHistory(GetCommandHistoryRequest) returns (GetCommandHistoryResponse);

  // Web auth RPCs.
  rpc WebAuthenticatePlayer(WebAuthenticatePlayerRequest) returns (WebAuthenticatePlayerResponse);
  rpc WebSelectCharacter(WebSelectCharacterRequest) returns (WebSelectCharacterResponse);
  rpc WebCreatePlayer(WebCreatePlayerRequest) returns (WebCreatePlayerResponse);
  // Create an ephemeral guest player and character.
  rpc WebCreateGuest(WebCreateGuestRequest) returns (WebCreateGuestResponse);
  rpc WebCreateCharacter(WebCreateCharacterRequest) returns (WebCreateCharacterResponse);
  rpc WebListCharacters(WebListCharactersRequest) returns (WebListCharactersResponse);
  rpc WebLogout(WebLogoutRequest) returns (WebLogoutResponse);
  rpc WebRequestPasswordReset(WebRequestPasswordResetRequest) returns (WebRequestPasswordResetResponse);
  rpc WebConfirmPasswordReset(WebConfirmPasswordResetRequest) returns (WebConfirmPasswordResetResponse);

  // Validate player session from cookie. Returns player info or Unauthenticated error.
  rpc WebCheckSession(WebCheckSessionRequest) returns (WebCheckSessionResponse);

  // Content store access (public, no auth required).
  rpc WebGetContent(WebGetContentRequest) returns (WebGetContentResponse);
  rpc WebListContent(WebListContentRequest) returns (WebListContentResponse);

  // WebQueryStreamHistory reads paginated event history for the web client.
  // Proxies to CoreService.QueryStreamHistory — authorization is enforced by core.
  rpc WebQueryStreamHistory(WebQueryStreamHistoryRequest) returns (WebQueryStreamHistoryResponse);

  // WebListSessionStreams returns the stream names the session is subscribed to.
  // Proxies to CoreService.ListSessionStreams — authorization is enforced by core.
  // Used by the web client to enumerate streams for reload-backfill.
  rpc WebListSessionStreams(WebListSessionStreamsRequest) returns (WebListSessionStreamsResponse);

  // Session-management RPCs. The caller is identified via the X-Session-Token
  // cookie header injected by CookieMiddleware; no token field in the request.
  rpc WebListPlayerSessions(WebListPlayerSessionsRequest) returns (WebListPlayerSessionsResponse);
  rpc WebRevokePlayerSession(WebRevokePlayerSessionRequest) returns (WebRevokePlayerSessionResponse);
  rpc WebRevokeOtherPlayerSessions(WebRevokeOtherPlayerSessionsRequest) returns (WebRevokeOtherPlayerSessionsResponse);

  // WebListFocusPresence returns the presence snapshot for the session's
  // current focus context (location or scene). Proxies to
  // CoreService.ListFocusPresence — authorization is enforced by core.
  // player_session_token is read from the HTTP cookie by gateway middleware.
  rpc WebListFocusPresence(WebListFocusPresenceRequest) returns (WebListFocusPresenceResponse);
}

message SendCommandRequest {
  string session_id = 1;
  string text = 2;
}

message SendCommandResponse {
  bool success = 1;
  string output = 2;
  string error_message = 3;
}

message StreamEventsRequest {
  string session_id = 1;
  // Field 2 (replay_from_cursor) removed — server chooses replay policy.
  reserved 2;
  reserved "replay_from_cursor";
}

message GameEvent {
  string type = 1;
  string category = 2;
  string format = 3;
  EventChannel display_target = 4;
  int64 timestamp = 5;
  string actor = 6;
  string text = 7;
  google.protobuf.Struct metadata = 8;
  string event_id = 9; // ULID; populated from corev1.EventFrame.id
  // cursor is the opaque pagination cursor for this event. Mirrors
  // corev1.EventFrame.cursor for reconnect-with-backfill support.
  bytes cursor = 10;
}

message StreamEventsResponse {
  oneof frame {
    GameEvent event = 1;
    ControlFrame control = 2;
  }
}

message DisconnectRequest {
  string session_id = 1;
}

message DisconnectResponse {}

message GetCommandHistoryRequest {
  string session_id = 1;
}

message GetCommandHistoryResponse {
  repeated string commands = 1;
}

// --- Web auth messages ---

message CharacterSummary {
  string character_id = 1;
  string character_name = 2;
  bool has_active_session = 3;
  string session_status = 4;
  string last_location = 5;
  int64 last_played_at = 6;
}

message WebAuthenticatePlayerRequest {
  string username = 1;
  string password = 2;
  bool remember_me = 3;
}

message WebAuthenticatePlayerResponse {
  bool success = 1;
  reserved 2;
  reserved "player_session_token"; // removed by the cookie cutover (PR #179)
  string error_message = 3;
  repeated CharacterSummary characters = 4;
  string default_character_id = 5;
  // NEW: machine-readable error code. Values: "" on success, "ALREADY_AUTHENTICATED"
  // when the cookie-collision gate fires, others reserved for future use.
  string error_code = 6;
  // NEW: populated only when error_code = "ALREADY_AUTHENTICATED". Holds the
  // existing player's display name so the client renders the right
  // "you are already signed in as X" UI without a second round trip.
  string current_player_name = 7;
}

message WebSelectCharacterRequest {
  string character_id = 2;
}

message WebSelectCharacterResponse {
  bool success = 1;
  string session_id = 2;
  string character_name = 3;
  bool reattached = 4;
  string error_message = 5;
}

message WebCreatePlayerRequest {
  string username = 1;
  string password = 2;
  string email = 3;
}

message WebCreatePlayerResponse {
  bool success = 1;
  reserved 2;
  reserved "player_session_token"; // removed by the cookie cutover (PR #179)
  repeated CharacterSummary characters = 3;
  string error_message = 4;
  // NEW: see WebAuthenticatePlayerResponse for semantics.
  string error_code = 5;
  string current_player_name = 6;
}

message WebCreateGuestRequest {}

message WebCreateGuestResponse {
  bool success = 1;
  string error_message = 2;
  repeated CharacterSummary characters = 3;
  string default_character_id = 4;
  // NEW: see WebAuthenticatePlayerResponse for semantics.
  string error_code = 5;
  string current_player_name = 6;
}

message WebCreateCharacterRequest {
  string character_name = 2;
}

message WebCreateCharacterResponse {
  bool success = 1;
  string character_id = 2;
  string character_name = 3;
  string error_message = 4;
}

message WebListCharactersRequest {}

message WebListCharactersResponse {
  repeated CharacterSummary characters = 1;
}

message WebLogoutRequest {}

message WebLogoutResponse {}

message WebRequestPasswordResetRequest {
  string email = 1;
}

message WebRequestPasswordResetResponse {
  bool success = 1;
}

message WebConfirmPasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message WebConfirmPasswordResetResponse {
  bool success = 1;
  string error_message = 2;
}

message WebCheckSessionRequest {}

message WebCheckSessionResponse {
  string player_name = 1;
  // NEW (additive on the success path; failure path still returns
  // connect.CodeUnauthenticated so web/src/routes/(authed)/+layout.ts:18-25
  // continues to redirect on throw — no contract break).
  string player_id = 2;
  bool is_guest = 3;
  repeated CharacterSummary characters = 4;
}

// --- Web content messages ---

message WebGetContentRequest {
  string key = 1;
}

message WebGetContentResponse {
  WebContentItem item = 1;
}

message WebListContentRequest {
  string prefix = 1;
  int32 limit = 2;
  string cursor = 3;
}

message WebListContentResponse {
  repeated WebContentItem items = 1;
  string next_cursor = 2;
}

message WebContentItem {
  string key = 1;
  string content_type = 2;
  bytes body = 3;
  map<string, string> metadata = 4;
}

message WebQueryStreamHistoryRequest {
  string session_id = 1;
  string stream = 2;
  int32 count = 3; // page size; 0 = default (150), max 500, negative rejected
  int64 not_before_ms = 4; // epoch ms time floor; 0 = no lower bound
  // cursor is the opaque pagination cursor from a previous WebQueryStreamHistoryResponse.
  // Events older than the cursor position are returned. Empty = start from latest.
  bytes cursor = 5;
}

message WebQueryStreamHistoryResponse {
  repeated GameEvent events = 1;
  bool has_more = 2;
  // next_cursor is the opaque cursor for the next page. Empty if has_more is false.
  bytes next_cursor = 3;
}

message WebListSessionStreamsRequest {
  string session_id = 1;
}

message WebListSessionStreamsResponse {
  repeated string streams = 1; // event-store stream names (e.g. "location:<id>", "character:<id>")
}

// --- Session management messages ---

message WebListPlayerSessionsRequest {}

message WebPlayerSessionInfo {
  // id is the PlayerSession.id (ULID). Used as target_session_id when
  // revoking. Safe to show - resource handle, not a secret.
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp last_active = 3;
  string user_agent = 4;
  string ip_address = 5;
  // is_current is true for the PlayerSession that made this request.
  bool is_current = 6;
}

message WebListPlayerSessionsResponse {
  repeated WebPlayerSessionInfo sessions = 1;
}

message WebRevokePlayerSessionRequest {
  // target_session_id is the PlayerSession.id (ULID) to revoke.
  string target_session_id = 1;
}

message WebRevokePlayerSessionResponse {
  bool success = 1;
  string error_message = 2;
}

message WebRevokeOtherPlayerSessionsRequest {}

message WebRevokeOtherPlayerSessionsResponse {
  bool success = 1;
  int32 revoked_count = 2;
}

// --- Presence messages ---

enum WebPresenceContext {
  WEB_PRESENCE_CONTEXT_UNSPECIFIED = 0;
  WEB_PRESENCE_CONTEXT_LOCATION = 1;
  WEB_PRESENCE_CONTEXT_SCENE = 2;
}

enum WebPresenceState {
  WEB_PRESENCE_STATE_UNSPECIFIED = 0;
  WEB_PRESENCE_STATE_ACTIVE = 1;
  WEB_PRESENCE_STATE_DETACHED = 2;
  WEB_PRESENCE_STATE_INACTIVE = 3;
}

message WebPresenceEntry {
  string character_id = 1;
  string character_name = 2;
  WebPresenceState state = 3;
}

message WebListFocusPresenceRequest {
  string session_id = 1;
}

message WebListFocusPresenceResponse {
  WebPresenceContext context = 1;
  string context_id = 2;
  repeated WebPresenceEntry entries = 3;
}
