syntax = "proto3";

package holomush.web.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/web/v1;webv1";

enum EventChannel {
  EVENT_CHANNEL_UNSPECIFIED = 0;
  EVENT_CHANNEL_TERMINAL = 1;
  EVENT_CHANNEL_STATE = 2;
  EVENT_CHANNEL_BOTH = 3;
}

enum ControlSignal {
  CONTROL_SIGNAL_UNSPECIFIED = 0;
  CONTROL_SIGNAL_REPLAY_COMPLETE = 1;
  CONTROL_SIGNAL_STREAM_CLOSED = 2;
}

message ControlFrame {
  ControlSignal signal = 1;
  string message = 2;
}

service WebService {
  // Authenticate as guest or registered user.
  rpc Login(LoginRequest) returns (LoginResponse);

  // Send a game command (say, pose, quit, etc.)
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);

  // Server-streaming event feed. Client receives game events
  // (say, pose, arrive, leave) as they occur.
  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);

  // Disconnect ends the session and triggers cleanup.
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);

  // Two-phase login: authenticate player credentials, get a token.
  rpc AuthenticatePlayer(AuthenticatePlayerRequest) returns (AuthenticatePlayerResponse);

  // Two-phase login: list characters available for the authenticated player.
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse);

  // Two-phase login: select a character, creating or reattaching a session.
  rpc SelectCharacter(SelectCharacterRequest) returns (SelectCharacterResponse);

  // List all sessions for the authenticated player.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Retrieve command history for a session.
  rpc GetCommandHistory(GetCommandHistoryRequest) returns (GetCommandHistoryResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string session_id = 2;
  string character_name = 3;
  string error_message = 4;
}

message SendCommandRequest {
  string session_id = 1;
  string text = 2;
}

message SendCommandResponse {
  bool success = 1;
  string output = 2;
  string error_message = 3;
}

message StreamEventsRequest {
  string session_id = 1;
  bool replay_from_cursor = 2;
}

message GameEvent {
  string type = 1;
  string character_name = 2;
  string text = 3;
  int64 timestamp = 4;
  EventChannel channel = 5;
  google.protobuf.Struct metadata = 6;
}

message StreamEventsResponse {
  oneof frame {
    GameEvent event = 1;
    ControlFrame control = 2;
  }
}

message DisconnectRequest {
  string session_id = 1;
}

message DisconnectResponse {}

// Two-phase login messages

message AuthenticatePlayerRequest {
  string username = 1;
  string password = 2;
}

message AuthenticatePlayerResponse {
  bool success = 1;
  string player_token = 2;
  string error_message = 3;
  repeated CharacterSummary characters = 4;
}

message CharacterSummary {
  string character_id = 1;
  string character_name = 2;
  bool has_active_session = 3;
  string session_status = 4; // "active", "detached", ""
}

message ListCharactersRequest {
  string player_token = 1;
}

message ListCharactersResponse {
  repeated CharacterSummary characters = 1;
}

message SelectCharacterRequest {
  string player_token = 1;
  string character_id = 2;
}

message SelectCharacterResponse {
  bool success = 1;
  string session_id = 2;
  string character_name = 3;
  bool reattached = 4; // true if this was an existing detached session
  string error_message = 5;
}

message ListSessionsRequest {
  string player_token = 1;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message SessionSummary {
  string session_id = 1;
  string character_name = 2;
  string status = 3;
  int64 created_at = 4;
  int64 detached_at = 5;
}

message GetCommandHistoryRequest {
  string session_id = 1;
}

message GetCommandHistoryResponse {
  repeated string commands = 1;
}
