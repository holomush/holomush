syntax = "proto3";

package holomush.web.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/web/v1;webv1";

enum EventChannel {
  EVENT_CHANNEL_UNSPECIFIED = 0;
  EVENT_CHANNEL_TERMINAL = 1;
  EVENT_CHANNEL_STATE = 2;
  EVENT_CHANNEL_BOTH = 3;
}

enum ControlSignal {
  CONTROL_SIGNAL_UNSPECIFIED = 0;
  CONTROL_SIGNAL_REPLAY_COMPLETE = 1;
  CONTROL_SIGNAL_STREAM_CLOSED = 2;
}

message ControlFrame {
  ControlSignal signal = 1;
  string message = 2;
}

service WebService {
  // Authenticate as guest or registered user.
  rpc Login(LoginRequest) returns (LoginResponse);

  // Send a game command (say, pose, quit, etc.)
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);

  // Server-streaming event feed. Client receives game events
  // (say, pose, arrive, leave) as they occur.
  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);

  // Disconnect ends the session and triggers cleanup.
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);

  // Retrieve command history for a session.
  rpc GetCommandHistory(GetCommandHistoryRequest) returns (GetCommandHistoryResponse);

  // Web auth RPCs.
  rpc WebAuthenticatePlayer(WebAuthenticatePlayerRequest) returns (WebAuthenticatePlayerResponse);
  rpc WebSelectCharacter(WebSelectCharacterRequest) returns (WebSelectCharacterResponse);
  rpc WebCreatePlayer(WebCreatePlayerRequest) returns (WebCreatePlayerResponse);
  rpc WebCreateCharacter(WebCreateCharacterRequest) returns (WebCreateCharacterResponse);
  rpc WebListCharacters(WebListCharactersRequest) returns (WebListCharactersResponse);
  rpc WebLogout(WebLogoutRequest) returns (WebLogoutResponse);
  rpc WebRequestPasswordReset(WebRequestPasswordResetRequest) returns (WebRequestPasswordResetResponse);
  rpc WebConfirmPasswordReset(WebConfirmPasswordResetRequest) returns (WebConfirmPasswordResetResponse);

  // Content store access (public, no auth required).
  rpc WebGetContent(WebGetContentRequest) returns (WebGetContentResponse);
  rpc WebListContent(WebListContentRequest) returns (WebListContentResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string session_id = 2;
  string character_name = 3;
  string error_message = 4;
}

message SendCommandRequest {
  string session_id = 1;
  string text = 2;
}

message SendCommandResponse {
  bool success = 1;
  string output = 2;
  string error_message = 3;
}

message StreamEventsRequest {
  string session_id = 1;
  bool replay_from_cursor = 2;
}

message GameEvent {
  string type = 1;
  string category = 2;
  string format = 3;
  EventChannel display_target = 4;
  int64 timestamp = 5;
  string actor = 6;
  string text = 7;
  google.protobuf.Struct metadata = 8;
}

message StreamEventsResponse {
  oneof frame {
    GameEvent event = 1;
    ControlFrame control = 2;
  }
}

message DisconnectRequest {
  string session_id = 1;
}

message DisconnectResponse {}

message GetCommandHistoryRequest {
  string session_id = 1;
}

message GetCommandHistoryResponse {
  repeated string commands = 1;
}

// --- Web auth messages ---

message CharacterSummary {
  string character_id = 1;
  string character_name = 2;
  bool has_active_session = 3;
  string session_status = 4;
  string last_location = 5;
  int64 last_played_at = 6;
}

message WebAuthenticatePlayerRequest {
  string username = 1;
  string password = 2;
  bool remember_me = 3;
}

message WebAuthenticatePlayerResponse {
  bool success = 1;
  string player_token = 2;
  string error_message = 3;
  repeated CharacterSummary characters = 4;
  string default_character_id = 5;
}

message WebSelectCharacterRequest {
  string player_token = 1;
  string character_id = 2;
}

message WebSelectCharacterResponse {
  bool success = 1;
  string session_id = 2;
  string character_name = 3;
  bool reattached = 4;
  string error_message = 5;
}

message WebCreatePlayerRequest {
  string username = 1;
  string password = 2;
  string email = 3;
}

message WebCreatePlayerResponse {
  bool success = 1;
  string player_token = 2;
  repeated CharacterSummary characters = 3;
  string error_message = 4;
}

message WebCreateCharacterRequest {
  string player_token = 1;
  string character_name = 2;
}

message WebCreateCharacterResponse {
  bool success = 1;
  string character_id = 2;
  string character_name = 3;
  string error_message = 4;
}

message WebListCharactersRequest {
  string player_token = 1;
}

message WebListCharactersResponse {
  repeated CharacterSummary characters = 1;
}

message WebLogoutRequest {
  string session_id = 1;
}

message WebLogoutResponse {}

message WebRequestPasswordResetRequest {
  string email = 1;
}

message WebRequestPasswordResetResponse {
  bool success = 1;
}

message WebConfirmPasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message WebConfirmPasswordResetResponse {
  bool success = 1;
  string error_message = 2;
}

// --- Web content messages ---

message WebGetContentRequest {
  string key = 1;
}

message WebGetContentResponse {
  WebContentItem item = 1;
}

message WebListContentRequest {
  string prefix = 1;
  int32 limit = 2;
  string cursor = 3;
}

message WebListContentResponse {
  repeated WebContentItem items = 1;
  string next_cursor = 2;
}

message WebContentItem {
  string key = 1;
  string content_type = 2;
  bytes body = 3;
  map<string, string> metadata = 4;
}
