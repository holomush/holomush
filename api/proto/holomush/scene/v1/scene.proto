syntax = "proto3";

package holomush.scene.v1;

import "buf/validate/validate.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/scene/v1;scenev1";

service SceneService {
  rpc ListScenes(ListScenesRequest) returns (ListScenesResponse);
  rpc GetScene(GetSceneRequest) returns (GetSceneResponse);
  rpc CreateScene(CreateSceneRequest) returns (CreateSceneResponse);
  rpc EndScene(EndSceneRequest) returns (EndSceneResponse);
  rpc PauseScene(PauseSceneRequest) returns (PauseSceneResponse);
  rpc ResumeScene(ResumeSceneRequest) returns (ResumeSceneResponse);
  rpc UpdateScene(UpdateSceneRequest) returns (UpdateSceneResponse);
  rpc JoinScene(JoinSceneRequest) returns (JoinSceneResponse);
  rpc LeaveScene(LeaveSceneRequest) returns (LeaveSceneResponse);
  rpc InviteToScene(InviteToSceneRequest) returns (InviteToSceneResponse);
  rpc KickFromScene(KickFromSceneRequest) returns (KickFromSceneResponse);
  rpc TransferOwnership(TransferOwnershipRequest) returns (TransferOwnershipResponse);
  rpc CastPublishVote(CastPublishVoteRequest) returns (CastPublishVoteResponse);
  rpc GetPoseOrder(GetPoseOrderRequest) returns (GetPoseOrderResponse);
  // Phase 6 publication RPCs. See spec section 5.
  rpc StartScenePublish(StartScenePublishRequest) returns (StartScenePublishResponse);
  rpc CastPublishSceneVote(CastPublishSceneVoteRequest) returns (CastPublishSceneVoteResponse);
  rpc WithdrawScenePublish(WithdrawScenePublishRequest) returns (WithdrawScenePublishResponse);
  rpc GetPublishedScene(GetPublishedSceneRequest) returns (GetPublishedSceneResponse);
  rpc DownloadPublishedScene(DownloadPublishedSceneRequest) returns (DownloadPublishedSceneResponse);
  rpc ListScenePublishAttempts(ListScenePublishAttemptsRequest) returns (ListScenePublishAttemptsResponse);
  rpc GetPublicSceneArchive(GetPublicSceneArchiveRequest) returns (GetPublicSceneArchiveResponse);
  rpc DownloadPublicSceneArchive(DownloadPublicSceneArchiveRequest) returns (DownloadPublicSceneArchiveResponse);
  rpc ExtendScenePublishVoteAttempts(ExtendScenePublishVoteAttemptsRequest) returns (ExtendScenePublishVoteAttemptsResponse);
}

message SceneInfo {
  string id = 1;
  string title = 2;
  string description = 3;
  string location_id = 4;
  string owner_id = 5;
  string state = 6;
  string pose_order_mode = 7;
  repeated string content_warnings = 8;
  repeated string tags = 9;
  string visibility = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp ended_at = 12;
  repeated ParticipantInfo participants = 13;
}

message ParticipantInfo {
  string character_id = 1;
  string character_name = 2;
  string role = 3;
  google.protobuf.Timestamp joined_at = 4;
}

message ListScenesRequest {
  int32 limit = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
  int32 offset = 2 [(buf.validate.field).int32.gte = 0];
  repeated string tags = 3;
}

message ListScenesResponse {
  repeated SceneInfo scenes = 1;
}

message GetSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message GetSceneResponse {
  SceneInfo scene = 1;
}

message CreateSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string title = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string description = 3 [(buf.validate.field).string.max_len = 4096];
  string location_id = 4;
  string visibility = 5 [(buf.validate.field).string = {
    in: [
      "",
      "open",
      "private"
    ]
  }];
  string pose_order_mode = 6 [(buf.validate.field).string = {
    in: [
      "",
      "free",
      "strict",
      "3pr",
      "5pr"
    ]
  }];
  repeated string tags = 7 [(buf.validate.field).repeated.max_items = 32];
  repeated string content_warnings = 8 [(buf.validate.field).repeated.max_items = 32];
}

message CreateSceneResponse {
  SceneInfo scene = 1;
}

message EndSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message EndSceneResponse {
  SceneInfo scene = 1;
}

message PauseSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message PauseSceneResponse {
  SceneInfo scene = 1;
}

message ResumeSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message ResumeSceneResponse {
  SceneInfo scene = 1;
}

// UpdateSceneRequest uses google.protobuf.FieldMask as the canonical proto3
// pattern for partial updates (per Google AIP-134). The mask is the single
// source of truth for "which fields to apply" — fields listed in the mask
// are updated to the value in the request (even if that value is empty/zero);
// fields not in the mask are left unchanged.
//
// Per-field constraint semantics:
// - max_len limits apply to all string fields regardless of mask membership
// - min_len IS NOT used at the proto layer because the mask gates whether
//   the field is applied; per-field semantic validation (e.g. "title cannot
//   be empty when in the mask") happens in the service handler's mask-iteration
//   switch statement
// - enum-style fields use `in:` constraints that include the empty string
//   so that "field not set" doesn't trip the validator
message UpdateSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];

  string title = 3 [(buf.validate.field).string.max_len = 200];
  string description = 4 [(buf.validate.field).string.max_len = 4096];
  string visibility = 5 [(buf.validate.field).string = {
    in: [
      "",
      "open",
      "private"
    ]
  }];
  string pose_order_mode = 6 [(buf.validate.field).string = {
    in: [
      "",
      "free",
      "strict",
      "3pr",
      "5pr"
    ]
  }];
  string location_id = 7;
  repeated string content_warnings = 8 [(buf.validate.field).repeated.max_items = 32];
  repeated string tags = 9 [(buf.validate.field).repeated.max_items = 32];

  google.protobuf.FieldMask update_mask = 99;
}

message UpdateSceneResponse {
  SceneInfo scene = 1;
}

message JoinSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message JoinSceneResponse {}

message LeaveSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message LeaveSceneResponse {}

message InviteToSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
  string target_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

message InviteToSceneResponse {}

message KickFromSceneRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
  string target_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

message KickFromSceneResponse {}

message TransferOwnershipRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
  string new_owner_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

message TransferOwnershipResponse {}

message CastPublishVoteRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
  bool vote = 3;
}

message CastPublishVoteResponse {}

message GetPoseOrderRequest {
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}

message PoseOrderEntry {
  string character_id = 1;
  string character_name = 2;
  bool eligible = 3;
  google.protobuf.Timestamp last_posed_at = 4;
  // Count of poses by other characters since this participant's last pose
  // (or since scene start if never posed). Meaningful for 3pr/5pr modes.
  optional uint32 poses_since_last = 5;
}

message GetPoseOrderResponse {
  string mode = 1; // strict | 3pr | 5pr | free
  uint32 total_pose_count = 2;
  repeated PoseOrderEntry entries = 3;
}

// Phase 6 publication messages. See spec section 5.

message StartScenePublishRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}
message StartScenePublishResponse {
  string published_scene_id = 1;
  int32 attempt_number = 2;
}

message CastPublishSceneVoteRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string published_scene_id = 2 [(buf.validate.field).string.min_len = 1];
  bool vote = 3;
}
message CastPublishSceneVoteResponse {
  bool is_change = 1;
}

message WithdrawScenePublishRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string published_scene_id = 2 [(buf.validate.field).string.min_len = 1];
}
message WithdrawScenePublishResponse {}

message PublishedSceneEntry {
  string speaker = 1;
  string kind = 2; // "pose" | "say" | "emit"
  string content = 3;
}

message PublishedSceneVoteSummary {
  int32 yes = 1;
  int32 no = 2;
  int32 pending = 3;
}

message GetPublishedSceneRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string published_scene_id = 2 [(buf.validate.field).string.min_len = 1];
}
message GetPublishedSceneResponse {
  string id = 1;
  string scene_id = 2;
  int32 attempt_number = 3;
  string status = 4;
  string failure_reason = 5; // empty unless ATTEMPT_FAILED
  PublishedSceneVoteSummary tally = 6;
  repeated PublishedSceneEntry content_entries = 7; // populated only when PUBLISHED
  string title_snapshot = 8;
  repeated string participants_snapshot = 9;
  int64 initiated_at_unix_ns = 10;
  int64 cooloff_started_at_unix_ns = 11;
  int64 resolved_at_unix_ns = 12;
  int64 published_at_unix_ns = 13;
}

message DownloadPublishedSceneRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string published_scene_id = 2 [(buf.validate.field).string.min_len = 1];
  string format = 3 [(buf.validate.field).string.min_len = 1]; // "markdown" | "plain_text" | "jsonl"
}
message DownloadPublishedSceneResponse {
  bytes content = 1;
  string mime_type = 2;
}

message ListScenePublishAttemptsRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
}
message ListScenePublishAttemptsResponse {
  repeated PublishedSceneSummary attempts = 1;
}
message PublishedSceneSummary {
  string id = 1;
  int32 attempt_number = 2;
  string status = 3;
  string failure_reason = 4;
  int64 initiated_at_unix_ns = 5;
  int64 resolved_at_unix_ns = 6;
}

message GetPublicSceneArchiveRequest {
  string published_scene_id = 1 [(buf.validate.field).string.min_len = 1];
}
message GetPublicSceneArchiveResponse {
  string id = 1;
  string title_snapshot = 2;
  repeated string participants_snapshot = 3;
  repeated PublishedSceneEntry content_entries = 4;
  int64 published_at_unix_ns = 5;
}

message DownloadPublicSceneArchiveRequest {
  string published_scene_id = 1 [(buf.validate.field).string.min_len = 1];
  string format = 2 [(buf.validate.field).string.min_len = 1];
}
message DownloadPublicSceneArchiveResponse {
  bytes content = 1;
  string mime_type = 2;
}

message ExtendScenePublishVoteAttemptsRequest {
  string caller_character_id = 1 [(buf.validate.field).string.min_len = 1];
  string scene_id = 2 [(buf.validate.field).string.min_len = 1];
  int32 additional = 3;
}
message ExtendScenePublishVoteAttemptsResponse {
  int32 new_max = 1;
}

// IC notice event messages for Phase 6 scene publication state transitions.
// All carry sensitivity:never per crypto.emits manifest.

message ScenePublishStartedEvent {
  string attempt_id = 1;
  int32 attempt_number = 2;
  string initiated_by = 3;
  int64 vote_window_seconds = 4;
  int64 cooloff_window_seconds = 5;
  repeated string roster_character_ids = 6;
}

message ScenePublishVoteCastEvent {
  string attempt_id = 1;
  string character_id = 2;
  bool vote = 3;
  bool is_change = 4;
}

message ScenePublishCoolOffStartedEvent {
  string attempt_id = 1;
  int64 cooloff_ends_at_unix_ns = 2;
}

message ScenePublishResolvedEvent {
  string attempt_id = 1;
  string outcome = 2; // "PUBLISHED" | "ATTEMPT_FAILED"
  string failure_reason = 3; // empty unless ATTEMPT_FAILED
  int32 tally_yes = 4;
  int32 tally_no = 5;
  int32 tally_pending = 6;
}

message ScenePublishWithdrawnEvent {
  string attempt_id = 1;
  string withdrawn_by = 2;
}

message ScenePublishVoteAttemptsExtendedEvent {
  string scene_id = 1;
  int32 additional = 2;
  int32 new_max = 3;
  string admin_id = 4;
}
