syntax = "proto3";

package holomush.world.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/world/v1;worldv1";

// WorldService provides read-only world model queries for binary plugins.
// It is served on an in-process gRPC connection registered in the plugin
// service registry as "holomush.world.v1.WorldService" (see
// internal/plugin/setup/world_conn.go::newWorldInProcessConn). Every RPC
// enforces ABAC by passing subject_id through world.Service, which delegates
// to the configured access.PolicyEngine before touching any repository.
// Errors that indicate missing records map to codes.NotFound; denied access
// maps to codes.PermissionDenied; all other failures map to codes.Internal
// with no internal detail leaked to callers.
service WorldService {
  // GetLocation fetches a single location by ULID. The caller must hold the
  // "read" permission on the location resource. Returns codes.NotFound if the
  // location does not exist and codes.PermissionDenied if access is denied.
  rpc GetLocation(GetLocationRequest) returns (GetLocationResponse);

  // GetCharacter fetches a single character by ULID. The caller must hold the
  // "read" permission on the character resource. Returns codes.NotFound if the
  // character does not exist and codes.PermissionDenied if access is denied.
  rpc GetCharacter(GetCharacterRequest) returns (GetCharacterResponse);

  // ListCharactersAtLocation returns all characters whose current location
  // matches location_id. The caller must hold the "list_characters" permission
  // on the location resource (action=list_characters, resource=location:<id>,
  // per ADR #76 compound-resource decomposition). Returns an empty list when
  // no characters are present; never returns codes.NotFound for an empty
  // location.
  rpc ListCharactersAtLocation(ListCharactersAtLocationRequest) returns (ListCharactersAtLocationResponse);

  // ListExits returns all exits originating from a location. The caller must
  // hold the "read" permission on the location resource. Returns an empty list
  // when the location has no exits; never returns codes.NotFound for an empty
  // exit set.
  rpc ListExits(ListExitsRequest) returns (ListExitsResponse);
}

// --- Canonical resource messages ---

// LocationInfo carries the public attributes of a world location. A location
// is a named place that can contain characters, objects, and exits. The type
// field distinguishes persistent grid locations from temporary scene locations and
// instanced copies. The owner_id is empty for unowned locations; ownership
// affects exit visibility rules evaluated server-side.
message LocationInfo {
  // ULID of the location, generated by idgen.New() at creation time.
  string id = 1;
  // Human-readable display name shown in location descriptions and exit listings.
  string name = 2;
  // Prose description shown to characters entering or looking at the location.
  string description = 3;
  // Spatial category of the location. One of "persistent" (permanent grid
  // location), "scene" (ephemeral RP space cloned from a persistent location), or
  // "instance" (private copy). Corresponds to world.LocationType in
  // internal/world/location.go.
  string type = 4;
  // ULID of the player account that owns this location, or empty string if the
  // location is unowned. Ownership influences exit visibility when the exit's
  // visibility is set to "owner".
  string owner_id = 5;
}

// CharacterInfo carries the public attributes of a player character. A
// character is the in-game entity controlled by a player account. One player
// may have multiple characters. The location_id is empty when the character is
// not currently placed in the world (i.e., not logged in or not yet in a
// location).
message CharacterInfo {
  // ULID of the character, generated by idgen.New() at creation time.
  string id = 1;
  // ULID of the player account that owns this character.
  string player_id = 2;
  // Human-readable display name used for emotes, location descriptions, and
  // character lists.
  string name = 3;
  // Prose description shown when another character looks at this character.
  string description = 4;
  // ULID of the location where the character is currently placed, or empty
  // string if the character is not in the world. Corresponds to the nullable
  // world.Character.LocationID field in internal/world/character.go.
  string location_id = 5;
}

// ExitInfo carries the public attributes of a directional connection between
// two locations. An exit has a source location (from_location_id) and a
// destination (to_location_id). When bidirectional is true, traversing the
// exit in the reverse direction uses return_name as the visible direction
// label. The locked field reflects the current lock state; the lock mechanism
// details (key, password, condition) are not exposed through this RPC surface.
message ExitInfo {
  // ULID of the exit, generated by idgen.New() at creation time.
  string id = 1;
  // Direction or display name for the exit as seen from from_location_id
  // (e.g., "north", "out").
  string name = 2;
  // ULID of the location from which this exit originates.
  string from_location_id = 3;
  // ULID of the location this exit leads to.
  string to_location_id = 4;
  // Whether a corresponding reverse exit exists. When true, return_name holds
  // the direction label used when travelling from to_location_id back to
  // from_location_id.
  bool bidirectional = 5;
  // Direction label for the reverse leg of a bidirectional exit (e.g.,
  // "south"). Empty string when bidirectional is false.
  string return_name = 6;
  // Whether the exit is currently locked. When locked, movement through this
  // exit is blocked unless the character satisfies the lock condition evaluated
  // by the movement subsystem.
  bool locked = 7;
}

// --- Request/Response messages ---

// GetLocationRequest identifies a location to fetch and the character
// performing the lookup for access-control evaluation.
message GetLocationRequest {
  // ULID of the character performing the query. Passed to the ABAC engine as
  // subject "character:<subject_id>" to check the "read" action on the
  // location resource.
  string subject_id = 1 [(buf.validate.field).string.min_len = 1];
  // ULID of the location to retrieve. Must be a valid strict ULID; malformed
  // values result in codes.InvalidArgument.
  string location_id = 2 [(buf.validate.field).string.min_len = 1];
}

// GetLocationResponse wraps the location returned by GetLocation. The location
// field is always populated on a successful response.
message GetLocationResponse {
  // The requested location.
  LocationInfo location = 1;
}

// GetCharacterRequest identifies a character to fetch and the querying
// character for access-control evaluation.
message GetCharacterRequest {
  // ULID of the character performing the query. Passed to the ABAC engine as
  // subject "character:<subject_id>" to check the "read" action on the
  // character resource.
  string subject_id = 1 [(buf.validate.field).string.min_len = 1];
  // ULID of the character to retrieve. Must be a valid strict ULID; malformed
  // values result in codes.InvalidArgument.
  string character_id = 2 [(buf.validate.field).string.min_len = 1];
}

// GetCharacterResponse wraps the character returned by GetCharacter. The
// character field is always populated on a successful response.
message GetCharacterResponse {
  // The requested character.
  CharacterInfo character = 1;
}

// ListCharactersAtLocationRequest identifies the location to query and the
// character performing the query for access-control evaluation.
message ListCharactersAtLocationRequest {
  // ULID of the character performing the query. Passed to the ABAC engine as
  // subject "character:<subject_id>" to check the "list_characters" action on
  // the location resource (per ADR #76 decomposition).
  string subject_id = 1 [(buf.validate.field).string.min_len = 1];
  // ULID of the location whose character roster is requested. Must be a valid
  // strict ULID; malformed values result in codes.InvalidArgument.
  string location_id = 2 [(buf.validate.field).string.min_len = 1];
}

// ListCharactersAtLocationResponse carries all characters currently placed at
// the requested location. The characters list is empty (not absent) when no
// characters are present; the field is never null.
message ListCharactersAtLocationResponse {
  // Characters currently placed at the queried location. Order is not
  // guaranteed; callers that need a stable display order should sort by name.
  repeated CharacterInfo characters = 1;
}

// ListExitsRequest identifies the location whose exits are requested and the
// character performing the query for access-control evaluation.
message ListExitsRequest {
  // ULID of the character performing the query. Passed to the ABAC engine as
  // subject "character:<subject_id>" to check the "read" action on the
  // location resource.
  string subject_id = 1 [(buf.validate.field).string.min_len = 1];
  // ULID of the location whose exits are requested. Must be a valid strict
  // ULID; malformed values result in codes.InvalidArgument.
  string location_id = 2 [(buf.validate.field).string.min_len = 1];
}

// ListExitsResponse carries all exits originating from the requested location.
// The exits list is empty (not absent) when the location has no exits; the
// field is never null.
message ListExitsResponse {
  // Exits originating from the queried location. Order is not guaranteed;
  // callers that need a stable display order should sort by name.
  repeated ExitInfo exits = 1;
}
