syntax = "proto3";

package holomush.channel.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/channel/v1;channelv1";

// ChannelService is the gRPC contract for the core-channels binary plugin
// (plugins/core-channels/). A channel is a persistent, location-independent
// named conversation space with an owner, a member roster, a visibility type
// (public, private, or admin), and a retention window. The plugin owns the
// `channel` ABAC resource type and persists to its own `plugin_core_channels`
// schema; it emits content and membership-notice events on
// events.<game_id>.channel.<channel_id> and audits them to its plugin-owned
// channel_log table.
//
// Authorization model mirrors SceneService: every mutating RPC trusts that the
// host's ABAC engine has already authorized the command-execute action at
// dispatch time (owner-or-admin for create/moderation, member for post). The
// plugin performs no implicit allow. The membership-gated reads
// (WhoInChannel, QueryChannelHistory) additionally enforce a direct plugin-code
// membership check before any content is read, precisely because channel
// visibility is a privacy boundary that must not be delegable; a caller who is
// not a member of a private or admin channel receives an opaque not-found so
// existence cannot be inferred.
//
// All payloads are plaintext: channels declare no crypto.emits and carry no
// sensitive fields. Channel identity flows by ID and a live name lookup, never
// by a channel-name field on any content message, so a rename cannot leak stale
// authorization context.
//
// Implemented by the channel service in plugins/core-channels/service.go
// (create/join/leave/list in 01-05; post/who/history and the moderation RPCs
// invite/mute/ban/kick/transfer in 01-05b), before the 01-07 command layer
// delegates to any of these methods.
service ChannelService {
  // CreateChannel allocates a new channel owned by the calling character,
  // seeded active with the supplied name, visibility type, and retention
  // window. The creating character becomes the `owner` member in the same
  // transaction, a create ops-journal entry is recorded, and a channel-created
  // notice is emitted. Creation authority is admin-gated by the host's ABAC
  // policy at dispatch; the handler enforces case-insensitive name uniqueness
  // and rejects a duplicate with codes.AlreadyExists.
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);

  // JoinChannel adds the calling character to a channel as a `member`. Public
  // channels accept any join; private and admin channels require a pre-existing
  // invitation. A banned character is refused. Idempotent: a repeat join by an
  // existing member succeeds without re-emitting a join notice. On success the
  // host subscribes the joining session's live stream for the channel subject.
  rpc JoinChannel(JoinChannelRequest) returns (JoinChannelResponse);

  // LeaveChannel removes the calling character's membership from a channel and
  // unsubscribes their session's live stream. The channel owner cannot leave
  // (codes.FailedPrecondition) — they must transfer ownership first. Emits a
  // leave notice.
  rpc LeaveChannel(LeaveChannelRequest) returns (LeaveChannelResponse);

  // ListChannels returns the channels visible to the calling character:
  // all public channels plus any private or admin channels the character is a
  // member of, paginated. Channels the caller cannot see are omitted rather
  // than surfaced as hidden, so the listing cannot be used to probe for the
  // existence of restricted channels.
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);

  // PostToChannel publishes one line of member-authored content (say, pose, or
  // ooc) to a channel. The handler self-enforces that the caller is a
  // non-muted member before building the CommunicationContent payload and
  // emitting it on the channel subject; a muted member's post is suppressed and
  // a non-member's post is refused. The durable effect is the emitted event,
  // which the host audits to channel_log for history.
  rpc PostToChannel(PostToChannelRequest) returns (PostToChannelResponse);

  // WhoInChannel returns the current member roster of a channel to a member.
  // The plugin-code membership gate runs before any roster read, so a
  // non-member of a private or admin channel is denied before the channel's
  // existence is confirmed.
  rpc WhoInChannel(WhoInChannelRequest) returns (WhoInChannelResponse);

  // QueryChannelHistory returns recent content for a channel to a member,
  // newest last, capped at the server-side scrollback ceiling. The handler
  // enforces the membership gate as its first step (before any store read) and
  // never returns rows older than the caller's most-recent join, so leaving and
  // rejoining does not expose messages sent while the caller was absent.
  rpc QueryChannelHistory(QueryChannelHistoryRequest) returns (QueryChannelHistoryResponse);

  // InviteToChannel records an invitation permitting a target character to join
  // a private or admin channel (owner-or-admin only via ABAC). Rejected with
  // codes.AlreadyExists when the target is already a member.
  rpc InviteToChannel(InviteToChannelRequest) returns (InviteToChannelResponse);

  // MuteMember marks a target member as muted, suppressing their subsequent
  // posts to the channel while leaving their membership and read access intact
  // (owner-or-admin only via ABAC). Emits a mute notice.
  rpc MuteMember(MuteMemberRequest) returns (MuteMemberResponse);

  // BanMember marks a target member as banned, removing them from the channel
  // and preventing any future rejoin until unbanned (owner-or-admin only via
  // ABAC). The channel owner cannot be banned (codes.FailedPrecondition).
  rpc BanMember(BanMemberRequest) returns (BanMemberResponse);

  // KickMember removes a target member from the channel and unsubscribes their
  // live stream, without the permanent block a ban imposes (owner-or-admin only
  // via ABAC). The channel owner cannot be kicked (codes.FailedPrecondition).
  // Emits a leave notice recording the removal.
  rpc KickMember(KickMemberRequest) returns (KickMemberResponse);

  // TransferOwnership reassigns channel ownership from the calling owner to a
  // target who MUST already be a member (owner-only via ABAC). The former owner
  // is demoted to member in the same transaction.
  rpc TransferOwnership(TransferOwnershipRequest) returns (TransferOwnershipResponse);
}

// ChannelInfo is the wire projection of a channel row plus its member roster,
// returned by the create, join, and list RPCs. The type field is the plugin's
// lowercase string enum, not a proto enum, matching the SceneInfo convention.
message ChannelInfo {
  // Channel primary key ("channel-<ULID>"), stable for the channel's lifetime.
  string id = 1;
  // Human-facing channel name, unique case-insensitively across all channels;
  // matches ^[a-zA-Z0-9][a-zA-Z0-9_-]{0,31}$ and is the token players type in
  // the "=name message" shorthand.
  string name = 2;
  // Visibility type: "public" (listed, open join), "private" (invitation-only),
  // or "admin" (invitation-only, operator-scoped). Governs join eligibility and
  // read/post policy evaluation.
  string type = 3;
  // Character ID of the current owner — the sole authority for moderation and
  // transfer, and the only member who cannot leave, be kicked, or be banned.
  string owner_id = 4;
  // True once the channel has been soft-deleted (archived); archived channels
  // are hidden from listings and reject new posts but retain their history for
  // the retention window.
  bool archived = 5;
  // Per-channel retention window in days; 0 means the plugin's configured
  // default applies. Admin channels may carry an unlimited (never-pruned)
  // window. Governs the background prune sweep.
  int32 retention_days = 6;
  // Wall-clock creation time, the host clock at create for CreateChannel
  // responses and the persisted row timestamp elsewhere.
  google.protobuf.Timestamp created_at = 7;
  // The current member roster (owner and members), excluding invitation records
  // that have not yet been accepted.
  repeated MemberInfo members = 8;
}

// MemberInfo is one entry in a channel's roster — a character's membership
// relationship to the channel at read time.
message MemberInfo {
  // Character ID of the member.
  string character_id = 1;
  // Display name of the character (best-effort; falls back to the ID when no
  // name resolver is wired).
  string character_name = 2;
  // Membership role: "owner" or "member". The owner holds moderation authority
  // and is protected from leave, kick, and ban.
  string role = 3;
  // True when the member is muted: their posts are suppressed while their read
  // access and roster membership remain intact.
  bool muted = 4;
  // True when the member is banned: removed from the channel and blocked from
  // rejoining until unbanned.
  bool banned = 5;
  // When the character joined the channel; also the floor below which
  // QueryChannelHistory will not return rows for this member.
  google.protobuf.Timestamp joined_at = 6;
}

// CreateChannelRequest is the new-channel definition. The calling character
// becomes the owner. An empty type defaults to "public" at the handler.
message CreateChannelRequest {
  // The creating character, who becomes the channel owner; required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // Channel name; required, 1-32 chars, must start alphanumeric and contain
  // only letters, digits, underscore, or hyphen. Rejected with
  // codes.AlreadyExists if a channel with the same name (case-insensitive)
  // already exists.
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 32
    pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]{0,31}$"
  }];
  // Visibility type; empty selects the "public" default. Constrained to
  // ""|"public"|"private"|"admin".
  string type = 3 [(buf.validate.field).string = {
    in: [
      "",
      "public",
      "private",
      "admin"
    ]
  }];
  // Optional per-channel retention window in days; 0 selects the plugin's
  // configured default. Must be non-negative.
  int32 retention_days = 4 [(buf.validate.field).int32.gte = 0];
}

// CreateChannelResponse carries the freshly created channel (active, owner
// seeded).
message CreateChannelResponse {
  // The new channel's projection.
  ChannelInfo channel = 1;
}

// JoinChannelRequest identifies the channel to join and the joining character,
// plus the session receiving live delivery.
message JoinChannelRequest {
  // The joining character's ID; required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel to join; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The joining character's game session ULID; required — the host subscribes
  // this session's live stream to the channel subject on a successful join.
  string session_id = 3 [(buf.validate.field).string.min_len = 1];
}

// JoinChannelResponse is intentionally empty — a successful join carries no
// body; the caller refetches roster or history if needed.
message JoinChannelResponse {}

// LeaveChannelRequest identifies the channel to leave, the leaving character,
// and the session to unsubscribe.
message LeaveChannelRequest {
  // The leaving character's ID; required (must not be the owner).
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel to leave; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The leaving character's game session ULID; required — the host
  // unsubscribes this session's live stream from the channel subject.
  string session_id = 3 [(buf.validate.field).string.min_len = 1];
}

// LeaveChannelResponse is intentionally empty — a successful leave carries no
// body.
message LeaveChannelResponse {}

// ListChannelsRequest is the channel-discovery query, scoped to the calling
// character's visibility, with pagination.
message ListChannelsRequest {
  // The listing character's ID; required. The result includes public channels
  // plus the private and admin channels this character is a member of.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // Maximum channels to return; 0 means server default, capped at 200.
  int32 limit = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
  // Number of leading results to skip for pagination.
  int32 offset = 3 [(buf.validate.field).int32.gte = 0];
}

// ListChannelsResponse is the channel-discovery result page.
message ListChannelsResponse {
  // The channels visible to the caller for this page.
  repeated ChannelInfo channels = 1;
}

// PostToChannelRequest carries one line of member-authored content to publish
// to a channel. It intentionally has no channel-name field: identity is the
// channel ID plus a live name lookup, so a rename cannot alter authorization.
message PostToChannelRequest {
  // The posting character, who MUST be a non-muted member; required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel to post to; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // Content kind; empty selects the "say" default. Constrained to
  // ""|"say"|"pose"|"ooc", matching the comm grammar the handler renders with.
  string kind = 3 [(buf.validate.field).string = {
    in: [
      "",
      "say",
      "pose",
      "ooc"
    ]
  }];
  // The raw message text; required, size-capped to bound a single event
  // payload. The handler sanitizes untrusted UTF-8 and renders it through the
  // comm builder for the selected kind.
  string text = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 4096
  }];
}

// PostToChannelResponse is intentionally empty — the durable effect is the
// emitted, audited content event; live members receive it via their subscribed
// stream and history readers see it through QueryChannelHistory.
message PostToChannelResponse {}

// WhoInChannelRequest identifies the channel whose roster is requested and the
// requesting character (who MUST be a member; the gate is plugin-code, not
// ABAC).
message WhoInChannelRequest {
  // The requesting character; MUST be a member of the channel.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel to read the roster of; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
}

// WhoInChannelResponse carries the channel's current member roster.
message WhoInChannelResponse {
  // The channel's members (owner and members).
  repeated MemberInfo members = 1;
}

// QueryChannelHistoryRequest asks for recent channel content as a member,
// bounded by a scrollback limit and the caller's join floor.
message QueryChannelHistoryRequest {
  // The reading character, who MUST be a member; required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel whose history to read; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // Maximum content entries to return; 0 means server default, capped at the
  // 500-row scrollback ceiling. Entries older than the caller's most-recent
  // join are never returned regardless of this value.
  int32 limit = 3 [(buf.validate.field).int32 = {
    gte: 0
    lte: 500
  }];
}

// QueryChannelHistoryResponse carries the requested content entries, oldest
// first.
message QueryChannelHistoryResponse {
  // The channel content entries for this read, oldest first.
  repeated ChannelHistoryEntry entries = 1;
}

// ChannelHistoryEntry is one rendered line of channel history, projected from a
// channel_log audit row. Only content and membership-notice events are
// surfaced; the payload is plaintext.
message ChannelHistoryEntry {
  // The event's ULID identity/dedup key (never an ordering key — ordering is
  // the audit store's sequence).
  string id = 1;
  // The qualified wire type of the source event (for example
  // "core-channels:channel_say"), letting a renderer pick the display grammar.
  string type = 2;
  // The acting character's ID; empty for host-originated notices.
  string actor_id = 3;
  // The acting character's display name (best-effort; falls back to the actor
  // ID when no name resolver is wired).
  string actor_name = 4;
  // The rendered line content.
  string content = 5;
  // The wall-clock time the event was recorded.
  google.protobuf.Timestamp created_at = 6;
}

// InviteToChannelRequest identifies the inviting owner-or-admin, the channel,
// and the character being granted an invitation.
message InviteToChannelRequest {
  // The inviting character (owner or admin per ABAC); required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel to invite into; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The character receiving the invitation; required.
  string target_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

// InviteToChannelResponse is intentionally empty — a successful invite carries
// no body.
message InviteToChannelResponse {}

// MuteMemberRequest identifies the acting owner-or-admin, the channel, and the
// member to mute.
message MuteMemberRequest {
  // The acting character (owner or admin per ABAC); required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel the target is muted in; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The member to mute; required.
  string target_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

// MuteMemberResponse is intentionally empty — a successful mute carries no body.
message MuteMemberResponse {}

// BanMemberRequest identifies the acting owner-or-admin, the channel, and the
// member to ban.
message BanMemberRequest {
  // The acting character (owner or admin per ABAC); required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel the target is banned from; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The member to ban (must not be the owner); required.
  string target_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

// BanMemberResponse is intentionally empty — a successful ban carries no body.
message BanMemberResponse {}

// KickMemberRequest identifies the acting owner-or-admin, the channel, and the
// member to remove.
message KickMemberRequest {
  // The acting character (owner or admin per ABAC); required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel to remove the target from; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The member to remove (must not be the owner); required.
  string target_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

// KickMemberResponse is intentionally empty — a successful kick carries no body.
message KickMemberResponse {}

// TransferOwnershipRequest identifies the current owner, the channel, and the
// member who will become the new owner.
message TransferOwnershipRequest {
  // The current owner; required.
  string character_id = 1 [(buf.validate.field).string.min_len = 1];
  // The channel whose ownership transfers; required.
  string channel_id = 2 [(buf.validate.field).string.min_len = 1];
  // The new owner, who MUST already be a member of the channel; required.
  string new_owner_character_id = 3 [(buf.validate.field).string.min_len = 1];
}

// TransferOwnershipResponse is intentionally empty — a successful transfer
// carries no body.
message TransferOwnershipResponse {}
