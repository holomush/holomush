syntax = "proto3";

package holomush.core.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/core/v1;corev1";

// RequestMeta contains metadata for request correlation and debugging.
message RequestMeta {
  string request_id = 1; // ULID for log correlation
  google.protobuf.Timestamp timestamp = 2;
}

// ResponseMeta contains metadata echoed back from requests.
message ResponseMeta {
  string request_id = 1; // Echoed from request
  google.protobuf.Timestamp timestamp = 2;
}

// CoreService is the main game service.
service CoreService {
  // HandleCommand processes a game command.
  rpc HandleCommand(HandleCommandRequest) returns (HandleCommandResponse);

  // Subscribe opens a stream of events for the session.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);

  // Disconnect ends a session.
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);

  // GetCommandHistory retrieves command history for a session.
  rpc GetCommandHistory(GetCommandHistoryRequest) returns (GetCommandHistoryResponse);

  // Two-phase login: authenticate player credentials.
  rpc AuthenticatePlayer(AuthenticatePlayerRequest) returns (AuthenticatePlayerResponse);

  // Two-phase login: select a character, creating or reattaching a game session.
  rpc SelectCharacter(SelectCharacterRequest) returns (SelectCharacterResponse);

  // Create a new player account.
  rpc CreatePlayer(CreatePlayerRequest) returns (CreatePlayerResponse);

  // Create an ephemeral guest player and character.
  rpc CreateGuest(CreateGuestRequest) returns (CreateGuestResponse);

  // Create a new character for an authenticated player.
  rpc CreateCharacter(CreateCharacterRequest) returns (CreateCharacterResponse);

  // List characters for an authenticated player.
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse);

  // Request a password reset (email stubbed).
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);

  // Confirm a password reset with token.
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse);

  // End a player session.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Validate a player session token. Used by web gateway for cookie-based auth checks.
  rpc CheckPlayerSession(CheckPlayerSessionRequest) returns (CheckPlayerSessionResponse);

  // QueryStreamHistory reads paginated event history from a stream.
  // Two-layer authorization: membership gate (I-17) for private streams,
  // ABAC policy evaluation for public streams.
  // Pure read — does not mutate session cursors (invariant I-13).
  rpc QueryStreamHistory(QueryStreamHistoryRequest) returns (QueryStreamHistoryResponse);
}

message HandleCommandRequest {
  RequestMeta meta = 1;
  string session_id = 2;
  string command = 3;
}

message HandleCommandResponse {
  ResponseMeta meta = 1;
  bool success = 2;
  reserved 3; // was: string output (now delivered via command_response events)
  string error = 4;
}

message SubscribeRequest {
  RequestMeta meta = 1;
  string session_id = 2;
  // Fields 3 (streams) and 4 (replay_from_cursor) removed in focus
  // substrate clean break. Server determines streams and replay policy
  // via FocusCoordinator.RestoreFocus.
  reserved 3, 4;
  reserved "streams", "replay_from_cursor";
}

message EventFrame {
  string id = 1;
  string stream = 2;
  string type = 3;
  google.protobuf.Timestamp timestamp = 4;
  string actor_type = 5;
  string actor_id = 6;
  bytes payload = 7;
}

enum ControlSignal {
  CONTROL_SIGNAL_UNSPECIFIED = 0;
  CONTROL_SIGNAL_REPLAY_COMPLETE = 1;
  CONTROL_SIGNAL_STREAM_CLOSED = 2;
}

message ControlFrame {
  ControlSignal signal = 1;
  string message = 2;
}

message SubscribeResponse {
  oneof frame {
    EventFrame event = 1;
    ControlFrame control = 2;
  }
}

message DisconnectRequest {
  RequestMeta meta = 1;
  string session_id = 2;
  string connection_id = 3; // optional: remove specific connection
}

message DisconnectResponse {
  ResponseMeta meta = 1;
  bool success = 2;
}

message GetCommandHistoryRequest {
  RequestMeta meta = 1;
  string session_id = 2;
}

message GetCommandHistoryResponse {
  ResponseMeta meta = 1;
  bool success = 2;
  repeated string commands = 3;
  string error = 4;
}

// --- Auth messages ---

message CharacterSummary {
  string character_id = 1;
  string character_name = 2;
  bool has_active_session = 3;
  string session_status = 4;
  string last_location = 5;
  int64 last_played_at = 6;
}

message AuthenticatePlayerRequest {
  string username = 1;
  string password = 2;
  string captcha_token = 3;
  bool remember_me = 4;
}

message AuthenticatePlayerResponse {
  bool success = 1;
  string player_session_token = 2;
  string error_message = 3;
  repeated CharacterSummary characters = 4;
  string default_character_id = 5;
  // Session TTL in seconds. Used by the web gateway to set cookie MaxAge so
  // the cookie expires when the underlying session expires (prevents stale
  // cookies outliving 2h guest sessions).
  int64 session_ttl_seconds = 6;
}

message SelectCharacterRequest {
  string player_session_token = 1;
  string character_id = 2;
}

message SelectCharacterResponse {
  bool success = 1;
  string session_id = 2;
  string character_name = 3;
  bool reattached = 4;
  string error_message = 5;
}

message CreatePlayerRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string captcha_token = 4;
}

message CreatePlayerResponse {
  bool success = 1;
  string player_session_token = 2;
  repeated CharacterSummary characters = 3;
  string error_message = 4;
  // Session TTL in seconds (see AuthenticatePlayerResponse).
  int64 session_ttl_seconds = 5;
}

message CreateGuestRequest {}

message CreateGuestResponse {
  bool success = 1;
  string error_message = 2;
  string player_session_token = 3;
  repeated CharacterSummary characters = 4;
  string default_character_id = 5;
  // Session TTL in seconds (see AuthenticatePlayerResponse). For guest
  // sessions this is 2h, not the 24h regular-player TTL.
  int64 session_ttl_seconds = 6;
}

message CreateCharacterRequest {
  string player_session_token = 1;
  string character_name = 2;
}

message CreateCharacterResponse {
  bool success = 1;
  string character_id = 2;
  string character_name = 3;
  string error_message = 4;
}

message ListCharactersRequest {
  string player_session_token = 1;
}

message ListCharactersResponse {
  repeated CharacterSummary characters = 1;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  bool success = 1;
}

message ConfirmPasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message ConfirmPasswordResetResponse {
  bool success = 1;
  string error_message = 2;
}

message LogoutRequest {
  string player_session_token = 1;
}

message LogoutResponse {}

message CheckPlayerSessionRequest {
  string player_session_token = 1;
}

message CheckPlayerSessionResponse {
  string player_name = 1;
}

message QueryStreamHistoryRequest {
  RequestMeta meta = 1;
  string session_id = 2;
  string stream = 3;
  int32 count = 4; // page size; 0 = default (150), max 500, negative rejected
  int64 not_before_ms = 5; // epoch ms time floor; 0 = no lower bound
  string before_id = 6; // ULID pagination cursor; events older than this; empty = latest
}

message QueryStreamHistoryResponse {
  ResponseMeta meta = 1;
  repeated EventFrame events = 2;
  bool has_more = 3;
}
