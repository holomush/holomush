syntax = "proto3";

package holomush.plugin.v1;

import "google/protobuf/timestamp.proto";
import "holomush/eventbus/v1/eventbus.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/plugin/v1;pluginv1";

// PluginAuditService is implemented by plugins that declare audit
// subjects in their manifest. The host owns the JetStream durable
// consumer and forwards each delivered event to the plugin via
// AuditEvent. The plugin INSERTs into its own schema and acks.
//
// QueryHistory is invoked by host's bus.QueryHistory when the queried
// subject prefix is owned by this plugin.
service PluginAuditService {
  rpc AuditEvent(AuditEventRequest) returns (AuditEventResponse);
  rpc QueryHistory(QueryHistoryRequest) returns (stream QueryHistoryResponse);
}

// AuditRow is the canonical wire shape for plugin-owned audit rows.
// Used in both directions: dispatcher → plugin (AuditEventRequest)
// and plugin → host (QueryHistoryResponse). Mirrors the events_audit
// row shape so the proto wire format and the storage shape are
// coupled.
message AuditRow {
  // Cleartext projection fields
  bytes id = 1; // 16-byte ULID
  string subject = 2;
  string type = 3;
  google.protobuf.Timestamp timestamp = 4;
  holomush.eventbus.v1.Actor actor = 5;

  // Crypto envelope
  string codec = 6; // "identity" | "xchacha20poly1305-v1"
  bytes payload = 7; // ciphertext when codec != "identity"

  // DEK reference — absent on identity codec, required otherwise.
  // Host enforces the agreement (codec=identity ⇔ both absent).
  optional uint64 dek_ref = 8;
  optional uint32 dek_version = 9;

  // Audit schema version (was App-Schema-Version header).
  int32 schema_ver = 10;
}

message AuditEventRequest {
  AuditRow row = 1;
}

message AuditEventResponse {}

message QueryHistoryRequest {
  string subject = 1;
  bytes after = 2; // ULID; empty = from start
  bytes before = 3; // ULID; empty = unbounded
  int32 page_size = 4; // host caps at 200
  int32 direction = 5; // 1=forward, 2=backward
  google.protobuf.Timestamp not_before = 6;
  google.protobuf.Timestamp not_after = 7;

  // caller identifies the principal on whose behalf the host is reading.
  // Plugins implementing PluginAuditService MUST enforce domain-specific
  // authz (e.g., membership) against this identity before returning rows.
  // An absent caller, a zero identity, or an unsupported Actor.Kind MUST
  // be rejected with gRPC PERMISSION_DENIED. The host populates this
  // field from the authenticated session record; clients never supply it.
  holomush.eventbus.v1.Actor caller = 8;
}

message QueryHistoryResponse {
  AuditRow row = 1;
}
