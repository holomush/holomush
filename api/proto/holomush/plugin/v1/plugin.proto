// api/proto/holomush/plugin/v1/plugin.proto
syntax = "proto3";

package holomush.plugin.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/plugin/v1;pluginv1";

// PluginService is called by the go-plugin host to send events and commands to binary plugins.
// This service is implemented by the plugin (the gRPC server runs in the plugin process).
service PluginService {
  // Init is called by the host after connection, providing service configuration
  // (DB connection string, required service addresses, etc.) and receiving
  // the list of gRPC services the plugin provides.
  rpc Init(InitRequest) returns (InitResponse);

  // HandleEvent delivers an event to the plugin and receives any response events.
  rpc HandleEvent(HandleEventRequest) returns (HandleEventResponse);

  // HandleCommand delivers a command to the plugin.
  rpc HandleCommand(HandleCommandRequest) returns (HandleCommandResponse);
}

// PluginHostService runs in the host process, allowing binary plugins
// to call back for event emission, logging, and KV storage.
service PluginHostService {
  // EmitEvent publishes an event to a stream.
  rpc EmitEvent(PluginHostServiceEmitEventRequest) returns (PluginHostServiceEmitEventResponse);
  // Log writes a log message through the host's logging system.
  rpc Log(PluginHostServiceLogRequest) returns (PluginHostServiceLogResponse);
  // KVGet retrieves a value from the plugin's key-value store.
  rpc KVGet(PluginHostServiceKVGetRequest) returns (PluginHostServiceKVGetResponse);
  // KVSet stores a value in the plugin's key-value store.
  rpc KVSet(PluginHostServiceKVSetRequest) returns (PluginHostServiceKVSetResponse);
  // KVDelete removes a value from the plugin's key-value store.
  rpc KVDelete(PluginHostServiceKVDeleteRequest) returns (PluginHostServiceKVDeleteResponse);
}

// ServiceConfig carries initialization data from the host to the plugin.
message ServiceConfig {
  // PostgreSQL connection string (provided when the plugin declares storage: postgres).
  string connection_string = 1;
  // Addresses of required services, keyed by service name (future use).
  map<string, string> required_services = 2;
}

// InitRequest is sent by the host after connecting to the plugin process.
message InitRequest {
  // Service configuration for the plugin.
  ServiceConfig config = 1;
}

// InitResponse is returned by the plugin after initialization.
message InitResponse {
  // gRPC service names this plugin provides on the go-plugin transport.
  repeated string provided_services = 1;
}

// Event represents a game event delivered to plugins.
// Compatible with pkg/plugin.Event but uses protobuf types.
message Event {
  // Unique event identifier (ULID string).
  string id = 1 [(buf.validate.field).string.min_len = 1];
  // Stream the event belongs to (e.g., "location:loc_abc123").
  string stream = 2 [(buf.validate.field).string.min_len = 1];
  // Event type (e.g., "say", "pose", "arrive", "leave", "system").
  string type = 3 [(buf.validate.field).string.min_len = 1];
  // Timestamp in Unix milliseconds.
  int64 timestamp = 4;
  // Actor kind as string (e.g., "character", "system", "plugin").
  // Using string instead of enum for flexibility and compatibility.
  string actor_kind = 5 [(buf.validate.field).string.min_len = 1];
  // Actor identifier.
  string actor_id = 6 [(buf.validate.field).string.min_len = 1];
  // JSON-encoded payload.
  string payload = 7 [(buf.validate.field).string.max_len = 65536];
}

// EmitEvent represents an event that a plugin wants to emit.
// Compatible with pkg/plugin.EmitEvent.
message EmitEvent {
  // Target stream for the event.
  string stream = 1 [(buf.validate.field).string.min_len = 1];
  // Event type.
  string type = 2 [(buf.validate.field).string.min_len = 1];
  // JSON-encoded payload.
  string payload = 3 [(buf.validate.field).string.max_len = 65536];
}

// HandleEventRequest wraps an event for delivery to the plugin.
message HandleEventRequest {
  // The event to handle.
  Event event = 1;
}

// HandleEventResponse contains any events the plugin wants to emit.
message HandleEventResponse {
  // Events to emit in response.
  repeated EmitEvent emit_events = 1;
}

// CommandRequest carries context for a plugin command invocation.
message CommandRequest {
  // Parsed command name (e.g., "say", "dig").
  string command = 1 [(buf.validate.field).string.min_len = 1];
  // Everything after the command name.
  string args = 2 [(buf.validate.field).string.max_len = 8192];
  // What the player actually typed (alias support).
  string raw_input = 3 [(buf.validate.field).string.max_len = 8192];
  // Invoking character ULID.
  string character_id = 4 [(buf.validate.field).string.min_len = 1];
  // Character display name.
  string character_name = 5 [(buf.validate.field).string.min_len = 1];
  // Character's current location ULID.
  string location_id = 6 [(buf.validate.field).string.min_len = 1];
  // Active session ULID.
  string session_id = 7 [(buf.validate.field).string.min_len = 1];
  // Player account ULID.
  string player_id = 8 [(buf.validate.field).string.min_len = 1];
}

// CommandStatus maps to pkg/plugin.CommandStatus values.
enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_OK = 1;
  COMMAND_STATUS_ERROR = 2;
  COMMAND_STATUS_FAILURE = 3;
  COMMAND_STATUS_FATAL = 4;
}

// CommandResponse carries the result of a plugin command execution.
message CommandResponse {
  // Outcome category.
  CommandStatus status = 1;
  // Synchronous text output to the invoking player.
  string output = 2 [(buf.validate.field).string.max_len = 8192];
  // Events to append to the event store.
  repeated EmitEvent events = 3;
  // Audit decision hints accumulated by the plugin handler during this
  // command dispatch. The dispatcher extracts these after the response is
  // returned, stamps host-controlled fields (subject, action base, source,
  // component, timestamp, duration), and flushes them through the audit
  // logger.
  repeated AuditDecisionHint audit_hints = 4;
}

// AuditDecisionHint is a partial audit event emitted by a plugin handler.
// The plugin provides decision-specific fields (id, name, message, effect,
// resource, attributes, action qualifier); the host stamps identity fields
// (subject from dispatch context, source = SourcePlugin, component =
// plugin name, timestamp, duration).
//
// Plugins MUST NOT set subject, source, or component — the dispatcher
// overwrites those fields to prevent spoofing.
message AuditDecisionHint {
  // Stable slug identifying the plugin's internal rule, e.g., "not_member".
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];

  // Human-readable label for the rule, e.g., "channels: not a member".
  string name = 2 [(buf.validate.field).string.max_len = 256];

  // Per-firing description, e.g., "player not in channel members".
  string message = 3 [(buf.validate.field).string.max_len = 1024];

  // Effect the plugin decided: "deny" or "allow".
  string effect = 4 [(buf.validate.field).string.min_len = 1];

  // Action qualifier appended to the dispatcher-known base action.
  // E.g., the dispatcher knows the command is "channel"; the plugin
  // supplies "speak", producing final action "channel:speak".
  string action_qualifier = 5 [(buf.validate.field).string.max_len = 64];

  // Resource reference in <type>:<id> form, e.g., "channel:01XYZ".
  // Plugin-provided, host-validated for shape.
  string resource = 6 [(buf.validate.field).string.max_len = 256];

  // Plugin-provided context. Keys SHOULD be namespaced (e.g.,
  // "channel.type" rather than "type") to avoid collision with
  // host-overlay keys.
  map<string, string> attributes = 7;
}

// HandleCommandRequest wraps a command for delivery to the plugin.
message HandleCommandRequest {
  // The command to handle.
  CommandRequest command = 1;
}

// HandleCommandResponse wraps the command result from the plugin.
message HandleCommandResponse {
  // The command result.
  CommandResponse response = 1;
}

// --- PluginHostService messages ---

message PluginHostServiceEmitEventRequest {
  string stream = 1 [(buf.validate.field).string.min_len = 1];
  string event_type = 2 [(buf.validate.field).string.min_len = 1];
  bytes payload = 3;
}

message PluginHostServiceEmitEventResponse {}

message PluginHostServiceLogRequest {
  string level = 1 [(buf.validate.field).string.min_len = 1];
  string message = 2 [(buf.validate.field).string.max_len = 8192];
}

message PluginHostServiceLogResponse {}

message PluginHostServiceKVGetRequest {
  string plugin_name = 1 [(buf.validate.field).string.min_len = 1];
  string key = 2 [(buf.validate.field).string.min_len = 1];
}

message PluginHostServiceKVGetResponse {
  string value = 1;
  bool found = 2;
}

message PluginHostServiceKVSetRequest {
  string plugin_name = 1 [(buf.validate.field).string.min_len = 1];
  string key = 2 [(buf.validate.field).string.min_len = 1];
  string value = 3;
}

message PluginHostServiceKVSetResponse {}

message PluginHostServiceKVDeleteRequest {
  string plugin_name = 1 [(buf.validate.field).string.min_len = 1];
  string key = 2 [(buf.validate.field).string.min_len = 1];
}

message PluginHostServiceKVDeleteResponse {}
