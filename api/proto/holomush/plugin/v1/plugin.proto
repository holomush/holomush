// api/proto/holomush/plugin/v1/plugin.proto
syntax = "proto3";

package holomush.plugin.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/plugin/v1;pluginv1";

// PluginService is the plugin-IMPLEMENTED half of the binary-plugin contract:
// the gRPC server runs inside the plugin subprocess (hashicorp/go-plugin) and
// the host dials it. The host adapter is pkg/plugin.pluginServerAdapter, which
// bridges these RPCs to a plugin author's Go handler. The host-implemented
// callback surface plugins dial in return is the per-capability
// holomush.plugin.host.v1 services (api/proto/holomush/plugin/host/v1).
service PluginService {
  // Init is the first call the host makes after the go-plugin handshake. It
  // hands the plugin its ServiceConfig (DB connection string, required-service
  // addresses, opaque runtime config) and returns the gRPC service names the
  // plugin provides plus the emit-type set the host validates against the
  // manifest's crypto.emits (INV-PLUGIN-32). Bridged by pluginServerAdapter.Init,
  // which also lazily dials the plugin-host connection for any host-facing
  // facade (sink/focus/evaluator/decryptor) the provider opts into.
  rpc Init(InitRequest) returns (InitResponse);

  // HandleEvent delivers one subscribed event to the plugin and collects the
  // events the plugin wants to emit in response. Bridged by
  // pluginServerAdapter.HandleEvent, which converts the proto Event to the SDK
  // Event type, invokes the author's handler, and converts returned EmitEvents
  // back to the wire. Response emits flow through the host emit fence, not
  // straight to the bus.
  rpc HandleEvent(HandleEventRequest) returns (HandleEventResponse);

  // HandleCommand delivers a parsed player command to the plugin and returns
  // the command result (output text, status, response emits, and audit hints).
  // Bridged by pluginServerAdapter.HandleCommand; if the plugin registered no
  // command handler the adapter returns an empty response rather than erroring.
  rpc HandleCommand(HandleCommandRequest) returns (HandleCommandResponse);

  // QuerySessionStreams asks the plugin which stream names it wants subscribed
  // for a session being established, before LISTEN/subscription setup. Called
  // exactly once at session establishment, and only for plugins that declare
  // session_streams: true in their manifest. A plugin-reported error degrades
  // gracefully (the host logs and skips that plugin's contribution).
  rpc QuerySessionStreams(QuerySessionStreamsRequest) returns (QuerySessionStreamsResponse);
}

// ServiceConfig carries the host→plugin initialization payload delivered in
// InitRequest. It is consumed by pluginServerAdapter.Init / the provider's own
// Init.
message ServiceConfig {
  // PostgreSQL DSN the plugin uses for its own storage. Populated only when the
  // plugin declares storage: postgres in its manifest; empty otherwise.
  string connection_string = 1;
  // Network addresses of the proto services the plugin declared in requires,
  // keyed by service name, for the plugin to dial. (Reserved for future
  // service-to-service wiring.)
  map<string, string> required_services = 2;
  // Opaque plugin-owned runtime config: the effective (manifest-default <
  // server-override) map the host delivers at init. The host does NOT
  // interpret keys/values; the plugin decodes them per its own schema.
  map<string, string> plugin_config = 3;
}

// InitRequest is the host's first call to a freshly connected plugin process.
message InitRequest {
  // The initialization payload (DSN, required-service addresses, runtime config)
  // the plugin needs before it can serve events or commands.
  ServiceConfig config = 1;
}

// InitResponse is the plugin's reply to Init, advertising what it serves and
// what it may emit.
message InitResponse {
  // gRPC service names this plugin implements on the go-plugin transport, so
  // the host's service registry can route requires→provides between plugins.
  repeated string provided_services = 1;

  // Set of plugin-owned event types this plugin may emit. Host validates
  // set-equality against manifest's crypto.emits per INV-PLUGIN-32. Plugins
  // without crypto.emits leave empty and skip validation; plugins WITH
  // crypto.emits MUST populate (mismatch fails load).
  repeated string registered_emit_types = 2;
}

// Event is the host→plugin delivery shape for one game event (the proto mirror
// of pkg/plugin.Event). pluginServerAdapter.HandleEvent converts it to the SDK
// Event before invoking the author's handler.
message Event {
  // ULID string uniquely identifying the event; also its bus dedup key.
  string id = 1 [(buf.validate.field).string.min_len = 1];
  // Source stream this event belongs to, in legacy "prefix:id" form
  // (e.g. "location:loc_abc123"). Translated to the dot-delimited NATS subject
  // at the emit boundary.
  string stream = 2 [(buf.validate.field).string.min_len = 1];
  // Event-type discriminator (e.g. "say", "pose", "arrive", "leave",
  // "system") that the plugin handler switches on.
  string type = 3 [(buf.validate.field).string.min_len = 1];
  // Event occurrence time in Unix milliseconds (host clock).
  int64 timestamp = 4;
  // Actor kind as a string (e.g. "character", "system", "plugin"). Carried as
  // a string rather than an enum for forward-compat; the SDK maps it to its
  // ActorKind type. Distinct from the bus-internal ActorKind enum.
  string actor_kind = 5 [(buf.validate.field).string.min_len = 1];
  // ULID of the actor that caused the event (the character/system/plugin id).
  string actor_id = 6 [(buf.validate.field).string.min_len = 1];
  // JSON-encoded event payload (max 64 KiB); the plugin decodes it per the
  // event type's schema.
  string payload = 7 [(buf.validate.field).string.max_len = 65536];
  // cursor is the opaque pagination token for this event. Pass as the
  // QueryStreamHistory request cursor on the next call to page backward from
  // this position. Empty on events received via delivery (not history). Treat
  // as an opaque blob.
  bytes cursor = 8;
}

// EmitEvent is one event a plugin wants to emit, returned from HandleEvent /
// HandleCommand (the proto mirror of pkg/plugin.EmitEvent). It is NOT published
// directly — the host routes it through the PluginEventEmitter.Emit fence.
message EmitEvent {
  // Target stream the event is published to (legacy "prefix:id" form).
  string stream = 1 [(buf.validate.field).string.min_len = 1];
  // Event-type discriminator for the emitted event; gated by the manifest's
  // emits / crypto.emits declarations at the fence.
  string type = 2 [(buf.validate.field).string.min_len = 1];
  // JSON-encoded payload (max 64 KiB); validated as well-formed JSON at the
  // fence before publish.
  string payload = 3 [(buf.validate.field).string.max_len = 65536];
  // Per-event sensitivity claim for a return-value emit, validated against the
  // plugin manifest by event_emitter.go::Emit via EnforceSensitivity
  // (internal/plugin/sensitivity_fence.go) — INV-PLUGIN-29: a sensitivity=never manifest
  // rejects true; INV-PLUGIN-30: a sensitivity=always manifest rejects false. Carries
  // the same semantics as the active EmitEvent RPC's sensitive field so a binary
  // plugin's return-value emit cannot silently downgrade to plaintext where the
  // Lua runtime would encrypt (holomush-av954). Default false for backward
  // compatibility.
  bool sensitive = 4;
}

// HandleEventRequest wraps a single delivered event for the PluginService
// HandleEvent call.
message HandleEventRequest {
  // The event being delivered to the plugin handler.
  Event event = 1;
}

// HandleEventResponse returns the events the plugin chose to emit in reaction
// to the delivered event.
message HandleEventResponse {
  // Events the plugin wants emitted; each is run through the host emit fence.
  repeated EmitEvent emit_events = 1;
}

// CommandRequest carries the full dispatch context for a plugin command
// invocation. pluginServerAdapter.HandleCommand maps it to the SDK
// CommandRequest type.
message CommandRequest {
  // Parsed command verb the plugin registered (e.g. "say", "dig").
  string command = 1 [(buf.validate.field).string.min_len = 1];
  // Argument text following the verb (max 8 KiB).
  string args = 2 [(buf.validate.field).string.max_len = 8192];
  // The raw line the player typed, preserving aliases; surfaced to the SDK as
  // InvokedAs (max 8 KiB).
  string raw_input = 3 [(buf.validate.field).string.max_len = 8192];
  // ULID of the character invoking the command.
  string character_id = 4 [(buf.validate.field).string.min_len = 1];
  // Display name of the invoking character.
  string character_name = 5 [(buf.validate.field).string.min_len = 1];
  // ULID of the invoking character's current location.
  string location_id = 6 [(buf.validate.field).string.min_len = 1];
  // ULID of the active session the command was issued in.
  string session_id = 7 [(buf.validate.field).string.min_len = 1];
  // ULID of the player account behind the character.
  string player_id = 8 [(buf.validate.field).string.min_len = 1];
  // Originating connection ULID (Phase 5). Empty for server-side dispatch paths
  // that do not have a specific connection (e.g., non-gateway callers).
  string connection_id = 9;
}

// CommandStatus is the outcome category of a plugin command, mirroring
// pkg/plugin.CommandStatus.
enum CommandStatus {
  // Zero value; a well-formed CommandResponse sets a concrete status.
  COMMAND_STATUS_UNSPECIFIED = 0;
  // The command succeeded.
  COMMAND_STATUS_OK = 1;
  // The command failed in a recoverable, user-facing way (e.g. bad arguments).
  COMMAND_STATUS_ERROR = 2;
  // The command could not complete due to a runtime failure short of fatal.
  COMMAND_STATUS_FAILURE = 3;
  // The command hit an unrecoverable condition.
  COMMAND_STATUS_FATAL = 4;
}

// CommandResponse is the result of a plugin command execution returned from
// HandleCommand.
message CommandResponse {
  // Outcome category of the command.
  CommandStatus status = 1;
  // Synchronous text shown to the invoking player (max 8 KiB).
  string output = 2 [(buf.validate.field).string.max_len = 8192];
  // Events the command wants emitted; routed through the host emit fence like
  // HandleEvent emits.
  repeated EmitEvent events = 3;
  // Audit decision hints accumulated by the plugin handler during this
  // command dispatch. The dispatcher extracts these after the response is
  // returned, stamps host-controlled fields (subject, action base, source,
  // component, timestamp, duration), and flushes them through the audit
  // logger.
  repeated AuditDecisionHint audit_hints = 4;
}

// AuditEffect is the closed set of decision outcomes a plugin handler may
// emit through an AuditDecisionHint. Plugin denials and plugin allows are
// the only meaningful outcomes — engine-specific effects (default_deny,
// system_bypass) are not exposed to plugins because plugins do not produce
// those decisions.
enum AuditEffect {
  // Zero value; never a meaningful plugin decision.
  AUDIT_EFFECT_UNSPECIFIED = 0;
  // The plugin denied the action — the hint records why.
  AUDIT_EFFECT_DENY = 1;
  // The plugin allowed the action.
  AUDIT_EFFECT_ALLOW = 2;
}

// AuditDecisionHint is a partial audit event emitted by a plugin handler.
// The plugin provides decision-specific fields (id, name, message, effect,
// resource, attributes, action qualifier); the host stamps identity fields
// (subject from dispatch context, source = SourcePlugin, component =
// plugin name, timestamp, duration).
//
// Plugins MUST NOT set subject, source, or component — the dispatcher
// overwrites those fields to prevent spoofing.
message AuditDecisionHint {
  // Stable slug identifying the plugin's internal rule, e.g., "not_member".
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];

  // Human-readable label for the rule, e.g., "channels: not a member".
  string name = 2 [(buf.validate.field).string.max_len = 256];

  // Per-firing description, e.g., "player not in channel members".
  string message = 3 [(buf.validate.field).string.max_len = 1024];

  // Effect the plugin decided. Closed enum at the proto boundary —
  // unknown effects can never round-trip the wire.
  AuditEffect effect = 4;

  // Action qualifier appended to the dispatcher-known base action.
  // E.g., the dispatcher knows the command is "channel"; the plugin
  // supplies "speak", producing final action "channel:speak".
  string action_qualifier = 5 [(buf.validate.field).string.max_len = 64];

  // Resource reference in <type>:<id> form, e.g., "channel:01XYZ".
  // Plugin-provided, host-validated for shape.
  string resource = 6 [(buf.validate.field).string.max_len = 256];

  // Plugin-provided context. Keys SHOULD be namespaced (e.g.,
  // "channel.type" rather than "type") to avoid collision with
  // host-overlay keys.
  map<string, string> attributes = 7;
}

// HandleCommandRequest wraps a command dispatch for the PluginService
// HandleCommand call.
message HandleCommandRequest {
  // The command (verb, args, and dispatch context) to handle.
  CommandRequest command = 1;
}

// HandleCommandResponse wraps the plugin's command result.
message HandleCommandResponse {
  // The command outcome (status, output, response emits, audit hints).
  CommandResponse response = 1;
}

// QuerySessionStreamsRequest provides session context for stream contribution.
message QuerySessionStreamsRequest {
  // Identifier of the character entering the session.
  string character_id = 1;
  // Identifier of the player owning the character.
  string player_id = 2;
  // Session identifier.
  string session_id = 3;
}

// QuerySessionStreamsResponse returns stream names and an optional error.
message QuerySessionStreamsResponse {
  // Stream names the plugin wants added to this session's subscription.
  repeated string streams = 1;
  // Non-empty indicates a plugin-reported error. Host degrades (logs + skips).
  string error = 2;
}

// SettingScope selects which settings scope a Get/Set targets. There is no
// chained mode — callers compose scopes themselves (e.g. a CW-block union read
// across game+player+character). The iokti.7 handler maps each value to its
// backing store and rejects the unspecified value (fail closed).
enum SettingScope {
  // Unspecified scope — rejected by the handler (fail closed).
  SETTING_SCOPE_UNSPECIFIED = 0;
  // Server-wide scope, backed by holomush_system_info.
  SETTING_SCOPE_GAME = 1;
  // Per-player scope, backed by players.preferences.
  SETTING_SCOPE_PLAYER = 2;
  // Per-character scope, backed by characters.preferences.
  SETTING_SCOPE_CHARACTER = 3;
}
