syntax = "proto3";

package holomush.plugin.host.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/plugin/host/v1;hostv1";

// FocusService is the host-brokered `focus` capability: a plugin granted
// `capability: focus` may mutate and read session/connection focus state through
// the host focus coordinator. Carved from the former PluginHostService
// (holomush-eykuh.1). Served by focusServer in
// internal/plugin/goplugin/host_capability_servers.go.
service FocusService {
  // JoinFocus adds a focus membership (e.g. a scene) to a session via the host
  // focus coordinator. The plugin declares intent; the coordinator applies the
  // kind-specific replay policy. Fails if the focus coordinator is not configured.
  rpc JoinFocus(JoinFocusRequest) returns (JoinFocusResponse);
  // LeaveFocus removes one focus membership from a session. Idempotent — leaving
  // a target the session does not hold is a successful no-op.
  rpc LeaveFocus(LeaveFocusRequest) returns (LeaveFocusResponse);
  // LeaveFocusByTarget removes the given focus membership from every non-expired
  // session that holds it — cross-session fan-out. Partial success is normal:
  // per-session failures aggregate into the response, not an RPC error.
  rpc LeaveFocusByTarget(LeaveFocusByTargetRequest) returns (LeaveFocusByTargetResponse);
  // PresentFocus repoints a session's PresentingFocus to an existing membership.
  // The target MUST already be in the session's FocusMemberships.
  rpc PresentFocus(PresentFocusRequest) returns (PresentFocusResponse);
  // SetConnectionFocus is the explicit focus mutation for a single Connection;
  // validates the membership, then writes Connection.FocusKey and (D9-gated)
  // Info.PresentingFocus atomically under one Store-lock acquisition.
  rpc SetConnectionFocus(SetConnectionFocusRequest) returns (SetConnectionFocusResponse);
  // GetConnectionFocus returns the named connection's current per-connection
  // focus, or absent when grid-focused (FocusKey nil) or unknown. Read-only.
  rpc GetConnectionFocus(GetConnectionFocusRequest) returns (GetConnectionFocusResponse);
  // AutoFocusOnJoin focuses all of a character's terminal/telnet connections on
  // a scene at once. Connections already explicitly focused elsewhere are
  // skipped. The caller MUST have completed JoinFocus first.
  rpc AutoFocusOnJoin(AutoFocusOnJoinRequest) returns (AutoFocusOnJoinResponse);
  // IsAnyConnFocused reports whether any of the character's connections focuses
  // the given scene, so callers can decide whether to emit a notification.
  rpc IsAnyConnFocused(IsAnyConnFocusedRequest) returns (IsAnyConnFocusedResponse);
}

// FocusKind enumerates the types of focused contexts a character can
// participate in. Adding a new kind requires: (a) a new constant here,
// (b) a matching session.FocusKind constant in Go, (c) a new
// FocusKindPolicy implementation registered in the coordinator.
enum FocusKind {
  // Zero value; not a real focus kind — a well-formed FocusKey sets a concrete
  // kind.
  FOCUS_KIND_UNSPECIFIED = 0;
  // A roleplay scene focus.
  FOCUS_KIND_SCENE = 1;
}

// FocusKey identifies a focus membership within a session. A session's
// focus memberships are unique by (kind, target_id) pair.
message FocusKey {
  // Which kind of focused context this key names.
  FocusKind kind = 1;
  // ULID of the focused target (e.g. the scene id) within that kind.
  string target_id = 2 [(buf.validate.field).string.min_len = 1];
}

// JoinFocusRequest names the session and the focus target to add a membership
// for.
message JoinFocusRequest {
  // Session to add the focus membership to.
  string session_id = 1 [(buf.validate.field).string.min_len = 1];
  // The (kind, target_id) membership to add.
  FocusKey target = 2;
}

// JoinFocusResponse is the empty ack that the membership was added.
message JoinFocusResponse {}

// LeaveFocusRequest names the session and the focus target to remove a
// membership for (idempotent on non-member).
message LeaveFocusRequest {
  // Session to remove the focus membership from.
  string session_id = 1 [(buf.validate.field).string.min_len = 1];
  // The (kind, target_id) membership to remove.
  FocusKey target = 2;
}

// LeaveFocusResponse is the empty ack for LeaveFocus.
message LeaveFocusResponse {}

// LeaveFocusByTargetRequest names a focus target to remove from every session
// that holds it (cross-session fan-out).
message LeaveFocusByTargetRequest {
  // The (kind, target_id) membership to sweep out of all holding sessions.
  FocusKey target = 1;
}

// LeaveFocusByTargetResponse reports the aggregate result of a cross-session
// leave sweep.
message LeaveFocusByTargetResponse {
  // Number of sessions successfully left. Zero is a valid result
  // (target had no members or every member was already non-a-member
  // — per-session idempotent no-ops count as successes). Callers
  // comparing succeeded + len(failed_session_ids) against total_scanned
  // can distinguish total, partial, and empty-sweep outcomes without
  // parsing any error string.
  int32 succeeded = 1;
  // Number of non-expired sessions the sweep scanned. Always
  // >= succeeded + len(failed_session_ids).
  int32 total_scanned = 2;
  // Session IDs for which the per-session leave failed. Empty means
  // every scanned session succeeded (idempotent no-ops included).
  // Per-session error details are not serialized; callers should
  // treat these IDs as the authoritative partial-failure signal and
  // re-issue LeaveFocus against them if retry is desired. The RPC
  // error is reserved for enumeration/list failures (e.g., the
  // session store could not list members).
  repeated string failed_session_ids = 3;
}

// PresentFocusRequest names the session and the existing membership to set as
// its PresentingFocus.
message PresentFocusRequest {
  // Session whose PresentingFocus pointer is being set.
  string session_id = 1 [(buf.validate.field).string.min_len = 1];
  // Existing membership to present; validated against FocusMemberships.
  FocusKey target = 2;
}

// PresentFocusResponse is the empty ack for PresentFocus.
message PresentFocusResponse {}

// SetConnectionFocusRequest selects one connection and the focus to set on it
// (Phase 5).
message SetConnectionFocusRequest {
  // ULID bytes of the connection whose focus is being set.
  bytes connection_id = 1;
  // The focus to set; absent (unset) clears the connection's focus.
  optional FocusKey focus_key = 2;
  // is_scene_grid signals that this call originated from a `scene grid`
  // command — substrate skips the D9 PresentingFocus write per D10.
  bool is_scene_grid = 3;
}

// SetConnectionFocusResponse echoes the resulting focus.
message SetConnectionFocusResponse {
  // The connection's focus after the write; absent if the connection was
  // cleared/unfocused.
  optional FocusKey focus_key = 1;
}

// GetConnectionFocusRequest carries the connection ID whose focus is being
// read. Read-only counterpart of SetConnectionFocus.
message GetConnectionFocusRequest {
  // ULID bytes of the connection whose focus is being read.
  bytes connection_id = 1;
}

// GetConnectionFocusResponse returns the connection's current focus key, if
// any. Absent when the connection is grid-focused or unknown.
message GetConnectionFocusResponse {
  // The connection's focus; absent for grid focus or unknown connection.
  optional FocusKey focus_key = 1;
}

// AutoFocusOnJoinRequest names the character and scene to fan-out focus across
// the character's connections.
message AutoFocusOnJoinRequest {
  // ULID bytes of the character whose connections are being focused.
  bytes character_id = 1;
  // ULID bytes of the scene to focus those connections on.
  bytes scene_id = 2;
}

// AutoFocusOnJoinResponse reports per-connection fan-out outcomes.
message AutoFocusOnJoinResponse {
  // Connection ULIDs newly focused on the scene by this call.
  repeated bytes focused_connection_ids = 1;
  // Total terminal/telnet connections the character had (the fan-out
  // denominator).
  uint32 total_connection_count = 2;
  // Connection ULIDs skipped because they were already explicitly focused
  // elsewhere (D8).
  repeated bytes skipped_connection_ids = 3;
  // Connections that failed to focus, each with a structured reason.
  repeated FocusFailure failed_connection_ids = 4;
}

// FocusFailure carries the connection_id and reason for an AutoFocusOnJoin
// failure.
message FocusFailure {
  // ULID bytes of the connection that failed to focus.
  bytes connection_id = 1;
  // Why the focus attempt failed for that connection.
  FocusFailureReason reason = 2;
}

// FocusFailureReason is the closed set of per-connection AutoFocusOnJoin
// failure causes.
enum FocusFailureReason {
  // Zero value; not a real failure reason.
  FOCUS_FAILURE_REASON_UNSPECIFIED = 0;
  // The session lacked the focus membership (JoinFocus was not completed first).
  FOCUS_FAILURE_REASON_MEMBERSHIP_ABSENT = 1;
  // The connection could not be found (e.g. it dropped during the sweep).
  FOCUS_FAILURE_REASON_CONNECTION_NOT_FOUND = 2;
}

// IsAnyConnFocusedRequest names the character and scene to test for any focused
// connection.
message IsAnyConnFocusedRequest {
  // ULID bytes of the character to check.
  bytes character_id = 1;
  // ULID bytes of the scene the connections might be focused on.
  bytes scene_id = 2;
}

// IsAnyConnFocusedResponse reports the focus check result.
message IsAnyConnFocusedResponse {
  // True iff at least one of the character's connections focuses the scene.
  bool focused = 1;
}
