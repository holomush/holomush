syntax = "proto3";

package holomush.plugin.host.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/plugin/host/v1;hostv1";

// SessionService is the host-brokered read/write half of the `session`
// capability: a plugin looks up sessions by character name, lists active
// sessions, and records the last-whispered target. Promotes the Lua session.*
// host functions (internal/plugin/hostfunc/cap_session.go) to the binary
// surface. Served by sessionServer in
// internal/plugin/goplugin/host_capability_servers.go.
service SessionService {
  // FindByName returns the active session for a character looked up by name
  // (case-insensitive), mirroring the Lua session.find_by_name(name) host
  // function (SessionAccess.FindSessionByName). The response session is absent
  // when no active session matches.
  rpc FindByName(FindByNameRequest) returns (FindByNameResponse);
  // ListActive returns every currently active session, mirroring the Lua
  // session.list_active() host function (SessionAccess.ListActiveSessions).
  rpc ListActive(ListActiveRequest) returns (ListActiveResponse);
  // SetLastWhispered records the last whisper target on a session, mirroring the
  // Lua session.set_last_whispered(session_id, name) host function
  // (SessionAccess.SetLastWhispered).
  rpc SetLastWhispered(SetLastWhisperedRequest) returns (SetLastWhisperedResponse);
}

// SessionAdminService is the host-brokered administrative half of the `session`
// capability: a plugin broadcasts system messages to all sessions and forcibly
// disconnects a session. Promotes the Lua session.broadcast / session.disconnect
// host functions (internal/plugin/hostfunc/cap_session.go) to the binary
// surface. Served by sessionAdminServer in
// internal/plugin/goplugin/host_capability_servers.go.
service SessionAdminService {
  // Broadcast sends a system message to all active sessions, mirroring the Lua
  // session.broadcast(message) host function
  // (SessionAccess.BroadcastSystemMessage).
  rpc Broadcast(BroadcastRequest) returns (BroadcastResponse);
  // Disconnect forcibly disconnects a session with a reason, mirroring the Lua
  // session.disconnect(session_id, reason) host function
  // (SessionAccess.DisconnectSession).
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);
}

// SessionInfo is the flat, string-keyed session projection the host hands to
// plugins, mirroring hostfunc.SessionInfo. It avoids coupling plugins to
// internal session types.
message SessionInfo {
  // ULID of the active session.
  string id = 1;
  // ULID of the character the session belongs to.
  string character_id = 2;
  // Display name of the session's character.
  string character_name = 3;
  // ULID of the character's current location.
  string location_id = 4;
  // Whether the character is visible on the grid (has a terminal/telnet
  // connection).
  bool grid_present = 5;
  // Display name of the last character this session whispered to; empty when
  // none.
  string last_whispered = 6;
}

// FindByNameRequest names the character whose active session to resolve.
message FindByNameRequest {
  // Character display name to match (case-insensitive).
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

// FindByNameResponse returns the matched session, or an absent session when no
// active session matches the name.
message FindByNameResponse {
  // The matched active session; absent when no session was found.
  SessionInfo session = 1;
}

// ListActiveRequest carries no fields; it requests every active session.
message ListActiveRequest {}

// ListActiveResponse returns all currently active sessions.
message ListActiveResponse {
  // Every currently active session, in store order.
  repeated SessionInfo sessions = 1;
}

// SetLastWhisperedRequest names the session and the whisper target to record.
message SetLastWhisperedRequest {
  // ULID of the session to update.
  string session_id = 1 [(buf.validate.field).string.min_len = 1];
  // Display name of the last character whispered to.
  string name = 2 [(buf.validate.field).string.min_len = 1];
}

// SetLastWhisperedResponse is the empty acknowledgement that the whisper target
// was recorded.
message SetLastWhisperedResponse {}

// BroadcastRequest carries the system message to send to all active sessions.
message BroadcastRequest {
  // System message body to broadcast to every active session.
  string message = 1 [(buf.validate.field).string.min_len = 1];
}

// BroadcastResponse is the empty acknowledgement that the broadcast was sent.
message BroadcastResponse {}

// DisconnectRequest names the session to disconnect and the reason to record.
message DisconnectRequest {
  // ULID of the session to forcibly disconnect.
  string session_id = 1 [(buf.validate.field).string.min_len = 1];
  // Human-readable reason surfaced for the disconnect.
  string reason = 2 [(buf.validate.field).string.min_len = 1];
}

// DisconnectResponse is the empty acknowledgement that the session was
// disconnected.
message DisconnectResponse {}
