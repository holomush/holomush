syntax = "proto3";

package holomush.plugin.host.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/plugin/host/v1;hostv1";

// EmitService is the host-brokered `emit` capability: a plugin publishes
// events through the host emit fence, requests the self-token a plugin-served
// gRPC handler needs to do so, and registers the emit-type set the host
// validates against the manifest. Carved from the former PluginHostService
// (holomush-eykuh.1). Served by emitServer in
// internal/plugin/goplugin/host_capability_servers.go.
service EmitService {
  // EmitEvent publishes one plugin-originated event onto the bus through the
  // host emit fence. The caller's identity is NOT trusted from the wire — the
  // plugin presents a host-issued dispatch token in the x-holomush-emit-token
  // metadata header, the host recovers the vouched-for actor from
  // tokenStore.Lookup(pluginName, token), and a missing/foreign token is
  // rejected (EMIT_TOKEN_MISSING / EMIT_TOKEN_REJECTED). The recovered actor
  // then flows through PluginEventEmitter.Emit, which enforces the manifest
  // gates: emits (subject namespace must be declared), actor_kinds_claimable
  // (actor kind must be listed — EMIT_ACTOR_KIND_NOT_CLAIMABLE), and the
  // crypto.emits sensitivity fence. These gates fire identically for Lua and
  // binary plugins (plugin runtime symmetry); the token mechanism is the
  // binary-side forgery fence.
  rpc EmitEvent(EmitEventRequest) returns (EmitEventResponse);
  // RequestEmitToken issues a self-token bound to {ActorPlugin, pluginName} so
  // a plugin-served gRPC handler (e.g. SceneService.CreateScene) — which is NOT
  // reached via DeliverEvent/DeliverCommand and so holds no dispatch token —
  // can still call EmitEvent. The plugin's identity is taken from the
  // mTLS-bound server struct (s.pluginName); the request carries no identity
  // fields, so a plugin cannot impersonate another actor or escalate to a
  // character actor through this RPC. The actor_kinds_claimable manifest gate
  // still fires when the issued token is later spent at EmitEvent.
  // (Spec §3.3.5 / §5.4 two-token pattern.)
  rpc RequestEmitToken(RequestEmitTokenRequest) returns (RequestEmitTokenResponse);
  // RegisterEmitType records one plugin-owned event type the plugin may later
  // emit, validated by the host against the manifest's crypto.emits per
  // INV-PLUGIN-32. Promotes the Lua holomush.register_emit_type(type) host
  // function (internal/plugin/hostfunc/stdlib_emit_registry.go) to the binary
  // surface so both runtimes declare their emit-type set through one channel.
  rpc RegisterEmitType(RegisterEmitTypeRequest) returns (RegisterEmitTypeResponse);
}

// EmitEventRequest is the wire form of a plugin emit. The caller's identity is
// NOT on this message — it is recovered host-side from the x-holomush-emit-token
// header (see EmitService.EmitEvent).
message EmitEventRequest {
  // Target stream (legacy "prefix:id" form); its namespace must be declared in
  // the manifest's emits list or the fence rejects the emit.
  string stream = 1 [(buf.validate.field).string.min_len = 1];
  // Event-type discriminator for the emitted event.
  string event_type = 2 [(buf.validate.field).string.min_len = 1];
  // Raw event payload bytes (validated as JSON at the fence).
  bytes payload = 3;
  // sensitive declares per-event sensitivity at emit time.
  // Phase 3a's host-side fence at internal/plugin/event_emitter.go::Emit
  // validates this against the plugin manifest's declared sensitivity:
  //   - manifest sensitivity=never:  sensitive=true rejected (INV-PLUGIN-29).
  //   - manifest sensitivity=may:    sensitive=true/false honored.
  //   - manifest sensitivity=always: sensitive=false rejected (INV-PLUGIN-30).
  // Default false (proto3 zero) for older plugins compiled before this
  // field existed — matching pre-Phase-3d behavior.
  bool sensitive = 4;
}

// EmitEventResponse is the empty acknowledgement that an emit passed the fence
// and was published.
message EmitEventResponse {}

// RequestEmitTokenRequest carries no fields. The host derives the calling
// plugin's identity from the mTLS-bound server struct. Future evolution: do NOT
// add actor fields here — that would re-open the G1 forgery surface this RPC is
// designed to close.
message RequestEmitTokenRequest {}

// RequestEmitTokenResponse returns the issued self-token.
message RequestEmitTokenResponse {
  // Opaque self-token. Plugins MUST treat this as opaque; only the host's
  // emitTokenStore can interpret it. The token is bound to ActorPlugin +
  // the calling plugin's name and is single-use-friendly (TTL-revoked).
  string token = 1;
}

// RegisterEmitTypeRequest carries the one plugin-owned event type to add to the
// caller's registered emit-type set, mirroring the single string argument of
// the Lua holomush.register_emit_type(type) host function.
message RegisterEmitTypeRequest {
  // Bare plugin-owned event type (e.g. "scene_pose") to register; the host
  // validates the accumulated set against the manifest's crypto.emits
  // (INV-PLUGIN-32).
  string event_type = 1 [(buf.validate.field).string.min_len = 1];
}

// RegisterEmitTypeResponse is the empty acknowledgement that the event type was
// recorded in the caller's emit-type set.
message RegisterEmitTypeResponse {}
