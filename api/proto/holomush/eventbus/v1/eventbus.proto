syntax = "proto3";

package holomush.eventbus.v1;

import "google/protobuf/timestamp.proto";
import "holomush/core/v1/core.proto";

option go_package = "github.com/holomush/holomush/pkg/proto/holomush/eventbus/v1;eventbusv1";

// ActorKind identifies what type of entity caused an event.
enum ActorKind {
  ACTOR_KIND_UNSPECIFIED = 0;
  ACTOR_KIND_CHARACTER = 1;
  ACTOR_KIND_PLAYER = 2;
  ACTOR_KIND_SYSTEM = 3;
  ACTOR_KIND_PLUGIN = 4;
}

// Actor identifies who caused an event.
message Actor {
  ActorKind kind = 1;
  bytes id = 2; // ULID (16 bytes); MUST be set for every ActorKind value.
  // Field 3 was `string legacy_id` (removed in holomush-w9ml).
  // T18 cutover purges all pre-w9ml envelopes; reserved markers prevent
  // accidental field-number reuse.
  reserved 3;
  reserved "legacy_id";
}

// Event is the host-side envelope. Wire encoding is proto bytes in the
// JetStream message data; headers carry routing/codec/version metadata.
message Event {
  bytes id = 1; // ULID (16 bytes)
  string subject = 2;
  string type = 3;
  google.protobuf.Timestamp timestamp = 4;
  Actor actor = 5;
  bytes payload = 6; // codec.Encode output
  // Rendering metadata, populated by RenderingPublisher.Publish before
  // marshaling for JetStream. Mirrors the corev1.RenderingMetadata used
  // on the gRPC Subscribe wire (one schema, two transports).
  holomush.core.v1.RenderingMetadata rendering = 7;
}
