# buf.gen.yaml — TypeScript ConnectRPC code generation
#
# `include_imports: true` makes the es plugin emit code for transitive
# imports (notably `buf/validate/validate.proto` from
# buf.build/bufbuild/protovalidate, which the generated _pb.ts files
# reference at runtime via `file_buf_validate_validate`). Without it,
# the import path resolves to a missing file and svelte-check fails.
#
# `include_wkt` is left at its default (false): google/protobuf/* well-
# known types are supplied by `@bufbuild/protobuf` and MUST NOT be
# regenerated locally — doing so creates duplicate runtime registries.
version: v2
plugins:
  # The remote plugin version is pinned (not bare `buf.build/bufbuild/es`) so
  # `buf generate` is a pure function of checked-in inputs. A bare reference
  # resolves to whatever is latest on the BSR at run time, which silently
  # re-stamped every generated `_pb.ts` stub from v2.12.0 to a newer release on
  # an unrelated web build (holomush-h6aj1). `bufbuild/es` MUST track the
  # `@bufbuild/protoc-gen-es` pin in package.json; bump both together — the
  # `# renovate:` annotation below wires that into Renovate
  # (see .github/renovate.json customManagers + "buf codegen" packageRule).
  #
  # connect-es v2 derives clients directly from the `GenService` descriptors in
  # the `_pb.ts` stubs (`createClient(SomeService, transport)`), so the v1
  # `protoc-gen-connect-es` plugin that emitted `_connect.ts` service stubs was
  # removed per the connect-es v2 migration (holomush-dxmqg).
  # renovate: datasource=npm depName=@bufbuild/protoc-gen-es
  - remote: buf.build/bufbuild/es:v2.12.0
    out: src/lib/connect
    opt: target=ts
    include_imports: true
inputs:
  - directory: ../api/proto
