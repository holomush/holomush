name: test-focus-join
version: 1.0.0
type: lua
resource_types: []
# The brokered `focus` host capability injects the `focus` Lua global
# (luabridge.RegisterHostCaps -> registerFocusService) so on_command can call
# focus.AutoFocusOnJoin. Declaring it grants the token (dependency.go resolver)
# which gates injection after the atomic capability cutover (holomush-eykuh.4) —
# without this entry the `focus` global is absent and the fixture degrades.
requires:
  - capability: focus
provides: []

lua-plugin:
  entry: plugin.lua

commands:
  - name: luafocusjoin
    capabilities:
      - action: write
        resource: scene
        scope: local
    help: "Test command: auto-focuses the issuing character's connections onto a scene (Lua runtime symmetry fixture)"
    usage: "luafocusjoin <character_id_ulid> <scene_id_ulid>"

policies:
  - name: execute-luafocusjoin
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { resource.command.name == "luafocusjoin"
      };
