# buf.gen.yaml — generation for the PUBLIC schema module (api/proto).
#
# The internal eventbus cursor module is generated separately by
# buf.gen.internal.yaml. This split lets each module have its own
# go_package_prefix and output path without the public Go SDK leaking
# the internal cursor types.
version: v2
managed:
  enabled: true
  disable:
    # Prevent managed mode from rewriting go_package for the protovalidate
    # module; its generated Go lives under buf.build/go/protovalidate and
    # must not be remapped into our local pkg/proto tree.
    - module: buf.build/bufbuild/protovalidate
      file_option: go_package
  override:
    - file_option: go_package_prefix
      value: github.com/holomush/holomush/pkg/proto
plugins:
  # Remote plugin versions are pinned (not bare `buf.build/protocolbuffers/go`)
  # so `buf generate` is a pure function of checked-in inputs. A bare reference
  # resolves to whatever is latest on the BSR at run time; when buf.build
  # publishes a newer generator, an unrelated `task proto` run re-stamps every
  # `*.pb.go` ahead of the go.mod runtime pin (same drift class fixed for the
  # web stubs in holomush-h6aj1). Keep each pin in lockstep with its go.mod
  # runtime: protocolbuffers/go ↔ google.golang.org/protobuf,
  # connectrpc/go ↔ connectrpc.com/connect. grpc/go (protoc-gen-go-grpc) is
  # versioned independently of google.golang.org/grpc — track its own release.
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: pkg/proto
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.2
    out: pkg/proto
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.20.0
    out: pkg/proto
    opt: paths=source_relative
inputs:
  # Restrict to the PUBLIC module. Without this, `buf generate` would
  # apply pkg/proto output paths to the internal cursor module too.
  - directory: api/proto
