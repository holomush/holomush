#
# Production deployment stack.
# Copy to /opt/holomush/compose.yaml and configure .env before starting.
# See: https://holomush.dev/operating/deployment/

services:
  postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    environment:
      POSTGRES_USER: holomush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: holomush
    # Enable TLS so DATABASE_URL can use sslmode=require. A self-signed
    # certificate is generated on first boot and stored on the data
    # volume (under /var/lib/postgresql/ssl, outside PGDATA so it
    # survives postgres major-version upgrades). Connections from core
    # use sslmode=require (encrypt, but do not verify CA), which is
    # appropriate for an intra-stack backend network. Operators who
    # need verify-full SHOULD mount their own CA-signed cert at
    # /var/lib/postgresql/ssl/server.crt|key and set sslmode=verify-full
    # in DATABASE_URL.
    command:
      - sh
      - -c
      - |
        set -e
        SSL_DIR=/var/lib/postgresql/ssl
        CRT=$$SSL_DIR/server.crt
        KEY=$$SSL_DIR/server.key
        mkdir -p "$$SSL_DIR"
        if [ ! -s "$$CRT" ] || [ ! -s "$$KEY" ]; then
          apk add --no-cache openssl >/dev/null
          openssl req -new -x509 -days 3650 -nodes -subj "/CN=holomush-postgres" -out "$$CRT" -keyout "$$KEY"
          chown 70:70 "$$CRT" "$$KEY"
          chmod 600 "$$KEY"
          chmod 644 "$$CRT"
        fi
        exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=$$CRT -c ssl_key_file=$$KEY
    volumes:
      # postgres:18+ stores data under /var/lib/postgresql/<major>/docker;
      # mount the parent so both PGDATA and the ssl/ dir are persisted.
      - ${DATA_DIR:-/opt/holomush/data}/postgres:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holomush"]
      interval: 5s
      timeout: 5s
      retries: 10

  core:
    image: ghcr.io/holomush/holomush:${HOLOMUSH_VERSION:?Set HOLOMUSH_VERSION in .env}
    restart: unless-stopped
    command:
      - core
      - --grpc-addr=0.0.0.0:9000
      - --metrics-addr=0.0.0.0:9100
      - --log-format=json
    environment:
      DATABASE_URL: postgres://holomush:${POSTGRES_PASSWORD}@postgres:5432/holomush?sslmode=require
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
    volumes:
      - ${CONFIG_DIR:-/opt/holomush/config}/certs:/home/holomush/.config/holomush/certs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/healthz/readiness || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  gateway:
    image: ghcr.io/holomush/holomush:${HOLOMUSH_VERSION:?Set HOLOMUSH_VERSION in .env}
    restart: unless-stopped
    command:
      - gateway
      - --core-addr=core:9000
      - --metrics-addr=0.0.0.0:9101
      - --log-format=json
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
    volumes:
      - ${CONFIG_DIR:-/opt/holomush/config}/certs:/home/holomush/.config/holomush/certs:ro
    networks:
      - frontend
    ports:
      - "4201:4201"
    depends_on:
      core:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    restart: unless-stopped
    profiles: [caddy]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
    command: caddy reverse-proxy --from ${DOMAIN} --to gateway:8080
    volumes:
      - ${CADDY_DIR:-/opt/holomush/caddy}/data:/data
      - ${CADDY_DIR:-/opt/holomush/caddy}/config:/config
    networks:
      - frontend
    depends_on:
      - gateway

  cloudflared:
    # Pinned to a tested version; bump deliberately. `:latest` would let a
    # silent upstream change break the tunnel. Check cloudflared release
    # notes before bumping — tunnel protocol (QUIC/HTTP/2) defaults shift
    # between majors.
    image: cloudflare/cloudflared:2025.4.2@sha256:698f5c59bf0b9ece62f8c60061004bdfcf7718fbac5d72b87e214af7b9d1d7ac
    restart: unless-stopped
    profiles: [tunnel]
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      # Intentionally `:-` (not `:?`): compose resolves interpolations across
      # the entire file at config time, even for services not in the active
      # profile. With `:?` operators using --profile caddy (no tunnel) would
      # have to set a dummy CLOUDFLARE_TUNNEL_TOKEN in .env to satisfy
      # parsing. The obvious default value makes misconfiguration
      # self-diagnosing when --profile tunnel is actually active.
      - ${CLOUDFLARE_TUNNEL_TOKEN:-PLEASE_SET_CLOUDFLARE_TUNNEL_TOKEN_IN_DOT_ENV}
    networks:
      - frontend
    depends_on:
      gateway:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest@sha256:f41d7995565df3733b7568702073a9c490792f9c6ac60684fe6a4da21a313f8d
    restart: unless-stopped
    profiles: [observability]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS}
    volumes:
      - ${CONFIG_DIR:-/opt/holomush/config}/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - backend

  backup:
    build: ./docker/postgres-backup
    restart: unless-stopped
    profiles: [backups]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: holomush
      POSTGRES_DB: holomush
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:?Set BACKUP_S3_BUCKET in .env}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:?Set BACKUP_S3_ACCESS_KEY in .env}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:?Set BACKUP_S3_SECRET_KEY in .env}
      KOPIA_PASSWORD: ${KOPIA_PASSWORD:?Set KOPIA_PASSWORD in .env}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-4}
      BACKUP_KEEP_MONTHLY: ${BACKUP_KEEP_MONTHLY:-6}
    volumes:
      - backup-kopia-cache:/home/backup/.cache/kopia
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

networks:
  frontend:
  backend:

volumes:
  backup-kopia-cache:
