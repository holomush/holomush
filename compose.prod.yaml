#
# Production deployment stack.
# Copy to /opt/holomush/compose.yaml and configure .env before starting.
# See: https://holomush.dev/operating/deployment/

services:
  postgres:
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    restart: unless-stopped
    environment:
      POSTGRES_USER: holomush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: holomush
    # Enable TLS so DATABASE_URL can use sslmode=require. A self-signed
    # certificate is generated on first boot and stored on the data
    # volume (under /var/lib/postgresql/ssl, outside PGDATA so it
    # survives postgres major-version upgrades). Connections from core
    # use sslmode=require (encrypt, but do not verify CA), which is
    # appropriate for an intra-stack backend network. Operators who
    # need verify-full SHOULD mount their own CA-signed cert at
    # /var/lib/postgresql/ssl/server.crt|key and set sslmode=verify-full
    # in DATABASE_URL.
    command:
      - sh
      - -c
      - |
        set -e
        SSL_DIR=/var/lib/postgresql/ssl
        CRT=$$SSL_DIR/server.crt
        KEY=$$SSL_DIR/server.key
        mkdir -p "$$SSL_DIR"
        if [ ! -s "$$CRT" ] || [ ! -s "$$KEY" ]; then
          apk add --no-cache openssl >/dev/null
          openssl req -new -x509 -days 3650 -nodes -subj "/CN=holomush-postgres" -out "$$CRT" -keyout "$$KEY"
          chown 70:70 "$$CRT" "$$KEY"
          chmod 600 "$$KEY"
          chmod 644 "$$CRT"
        fi
        exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=$$CRT -c ssl_key_file=$$KEY
    volumes:
      # postgres:18+ stores data under /var/lib/postgresql/<major>/docker;
      # mount the parent so both PGDATA and the ssl/ dir are persisted.
      - ${DATA_DIR:-/opt/holomush/data}/postgres:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holomush"]
      interval: 5s
      timeout: 5s
      retries: 10

  core:
    image: ghcr.io/holomush/holomush:${HOLOMUSH_VERSION:?Set HOLOMUSH_VERSION in .env}
    restart: unless-stopped
    command:
      - core
      - --grpc-addr=0.0.0.0:9000
      - --metrics-addr=0.0.0.0:9100
      - --log-format=json
    environment:
      DATABASE_URL: postgres://holomush:${POSTGRES_PASSWORD}@postgres:5432/holomush?sslmode=require
      # Empty by default: with no OTLP endpoint the telemetry SDK no-ops
      # (internal/telemetry/provider.go). A localhost:4317 default made the
      # service spam "telemetry SDK error: connection refused" on deployments
      # without a collector. Operators wanting tracing set this explicitly
      # (e.g. OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317) and run the
      # observability profile.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Error/trace reporting. Empty SENTRY_DSN disables Sentry (no-op), so
      # self-hosters without Sentry are unaffected.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-}
    volumes:
      - ${CONFIG_DIR:-/opt/holomush/config}/certs:/home/holomush/.config/holomush/certs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/healthz/readiness || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  gateway:
    image: ghcr.io/holomush/holomush:${HOLOMUSH_VERSION:?Set HOLOMUSH_VERSION in .env}
    restart: unless-stopped
    command:
      - gateway
      - --core-addr=core:9000
      - --metrics-addr=0.0.0.0:9101
      - --log-format=json
      # Served over TLS (Cloudflare edge -> tunnel -> gateway), so session
      # cookies MUST carry the Secure flag + SameSite=Strict.
      - --secure-cookies
    environment:
      # Empty by default — see the core service note above (no-op without a collector).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Collector's OTLP/HTTP base URL for the same-origin browser trace relay
      # at /api/otlp/v1/traces (cmd/holomush/gateway.go). Empty = relay
      # disabled. Recommended value when the observability profile is active:
      # http://otel-collector:4318 (the HTTP receiver — distinct from the gRPC
      # 4317 above). Requires the gateway to share a network with the collector
      # (the collector joins `frontend` below for exactly this).
      OTLP_RELAY_ENDPOINT: ${OTLP_RELAY_ENDPOINT:-}
      # Gateway reads SENTRY_DSN (cmd/holomush/gateway.go); empty = disabled.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-}
    volumes:
      - ${CONFIG_DIR:-/opt/holomush/config}/certs:/home/holomush/.config/holomush/certs:ro
    networks:
      - frontend
    ports:
      - "4201:4201"
    depends_on:
      core:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    restart: unless-stopped
    profiles: [caddy]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
    command: caddy reverse-proxy --from ${DOMAIN} --to gateway:8080
    volumes:
      - ${CADDY_DIR:-/opt/holomush/caddy}/data:/data
      - ${CADDY_DIR:-/opt/holomush/caddy}/config:/config
    networks:
      - frontend
    depends_on:
      - gateway

  cloudflared:
    # Pinned to a tested version; bump deliberately. `:latest` would let a
    # silent upstream change break the tunnel. Check cloudflared release
    # notes before bumping — tunnel protocol (QUIC/HTTP/2) defaults shift
    # between majors.
    image: cloudflare/cloudflared:2026.5.0@sha256:59bab8d3aceec09bf6bdb07d6beca0225ca5cd7ab79436a87ea97978fe1dc4f9
    restart: unless-stopped
    profiles: [tunnel]
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      # Intentionally `:-` (not `:?`): compose resolves interpolations across
      # the entire file at config time, even for services not in the active
      # profile. With `:?` operators using --profile caddy (no tunnel) would
      # have to set a dummy CLOUDFLARE_TUNNEL_TOKEN in .env to satisfy
      # parsing. The obvious default value makes misconfiguration
      # self-diagnosing when --profile tunnel is actually active.
      - ${CLOUDFLARE_TUNNEL_TOKEN:-PLEASE_SET_CLOUDFLARE_TUNNEL_TOKEN_IN_DOT_ENV}
    networks:
      - frontend
    depends_on:
      gateway:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest@sha256:b3079f45e19bdb7326bf49cdddce6cf60dfd865138db39f2733ea48ab17bc4cb
    restart: unless-stopped
    profiles: [observability]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
    volumes:
      - ${CONFIG_DIR:-/opt/holomush/config}/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      # backend: core/gateway gRPC export (OTEL_EXPORTER_OTLP_ENDPOINT, 4317).
      # frontend: the gateway's same-origin OTLP/HTTP relay (OTLP_RELAY_ENDPOINT)
      # forwards browser spans to the collector's 4318 receiver, so the
      # collector must be reachable from the gateway's network. No ports are
      # published, so the receiver stays internal to the compose networks.
      - backend
      - frontend

  backup:
    build: ./docker/postgres-backup
    restart: unless-stopped
    profiles: [backups]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: holomush
      POSTGRES_DB: holomush
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:?Set BACKUP_S3_BUCKET in .env}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:?Set BACKUP_S3_ACCESS_KEY in .env}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:?Set BACKUP_S3_SECRET_KEY in .env}
      KOPIA_PASSWORD: ${KOPIA_PASSWORD:?Set KOPIA_PASSWORD in .env}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-4}
      BACKUP_KEEP_MONTHLY: ${BACKUP_KEEP_MONTHLY:-6}
    volumes:
      - backup-kopia-cache:/home/backup/.cache/kopia
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

networks:
  frontend:
  backend:

volumes:
  backup-kopia-cache:
