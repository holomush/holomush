# buf.gen.internal.yaml — generation for the host-INTERNAL eventbus
# cursor module (internal/eventbus/cursor).
#
# Go bindings only — no gRPC services, no ConnectRPC handlers, no
# TypeScript clients. The cursor proto defines an opaque on-the-wire
# token format used by host code; clients and plugins MUST NOT inspect
# or construct it. The CursorPackageInternal analyzer
# (gorules/analyzers/cursorpackageinternal/) enforces the same
# boundary at import time for Go consumers.
#
# Managed mode disabled here so the proto's own `option go_package`
# declaration drives the output path:
#   option go_package = "github.com/holomush/holomush/internal/eventbus/cursor/cursorv1;cursorv1";
#
# Combined with `out: internal/eventbus/cursor/cursorv1` and
# `paths=source_relative`, this places the generated file at:
#   internal/eventbus/cursor/cursorv1/cursor.pb.go
version: v2
managed:
  enabled: false
plugins:
  # Pinned to match buf.gen.yaml and the google.golang.org/protobuf go.mod pin
  # (holomush-pw76v) — a bare remote ref drifts to the latest BSR generator and
  # silently re-stamps cursor.pb.go on an unrelated `task proto` run. The
  # `# renovate:` annotation wires this pin into Renovate's customManager so it
  # bumps in lockstep with the go.mod runtime (holomush-9vyc3).
  # renovate: datasource=go depName=google.golang.org/protobuf
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: internal/eventbus/cursor/cursorv1
    opt: paths=source_relative
inputs:
  - directory: internal/eventbus/cursor
