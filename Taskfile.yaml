# https://taskfile.dev

version: "3"

vars:
  BINARY_NAME: holomush
  MAIN_PKG: ./cmd/holomush
  MIGRATIONS_DIR: internal/store/migrations
  LICENSE_DIRS: api cmd internal pkg plugins scripts

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ──────────────────────────────────────────
  # Daily dev loop
  # ──────────────────────────────────────────

  dev:
    desc: Start full stack (Postgres + core + gateway) — rebuilds on each run
    cmds:
      - task: docker:build
      - docker compose up --force-recreate --remove-orphans

  dev:down:
    desc: Stop the dev stack
    cmds:
      - docker compose down

  dev:clean:
    desc: Stop the dev stack and wipe the database
    cmds:
      - docker compose down -v

  dev:obs:
    desc: Start dev environment with observability stack (Grafana, Tempo, Prometheus, Dozzle)
    cmds:
      - task: docker:build
      - COMPOSE_PROFILES=observability docker compose up --force-recreate --remove-orphans

  test:
    desc: Run unit tests (pass package/test args after --)
    cmds:
      - gotestsum --format pkgname -- -race -count=1 {{.CLI_ARGS | default "./..."}}

  test:verbose:
    desc: Run unit tests with full verbose output
    cmds:
      - gotestsum --format standard-verbose -- -race -count=1 {{.CLI_ARGS | default "./..."}}

  lint:
    desc: Run all linters
    cmds:
      - task: lint:go
      - task: lint:proto
      - task: lint:markdown
      - task: lint:yaml
      - task: lint:actions
      - task: lint:access-migration
      - task: lint:test-helpers

  fmt:
    desc: Format all files
    cmds:
      - task: fmt:go
      - task: fmt:yaml
      - task: fmt:markdown
      - task: fmt:dprint

  # ──────────────────────────────────────────
  # Extended testing
  # ──────────────────────────────────────────

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - gotestsum --format pkgname -- -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -html=coverage.out -o coverage.html

  test:int:
    desc: Run integration tests (needs Docker for testcontainers)
    cmds:
      - echo "▸ Building binary plugins for host platform..."
      - GOOS={{OS}} GOARCH={{ARCH}} ./scripts/build-plugins.sh
      - gotestsum --format pkgname -- -race -tags=integration -count=1 -coverprofile=coverage-int.out -covermode=atomic ./internal/content/
        ./internal/store/ ./plugins/core-scenes/ ./test/integration/...

  test:int:focus:
    desc: Run focused integration tests with Ginkgo focus filter (pass -ginkgo.focus="..." after --)
    cmds:
      - gotestsum --format pkgname -- -race -tags=integration -count=1 -timeout 8m {{.CLI_ARGS}} github.com/holomush/holomush/test/integration/plugin

  test:e2e:
    desc: Run Playwright E2E tests in Docker
    deps: ['docker:build']
    cmds:
      - cmd: |
          if docker compose -p holomush-e2e ps -q 2>/dev/null | grep -q .; then
            echo "ERROR: E2E infrastructure already running (project: holomush-e2e)."
            echo "Stop it with: docker compose -p holomush-e2e down -v"
            exit 1
          fi
      - rm -rf web/test-results
      - defer: docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml down -v
      - cmd: |
          set +e
          docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml run --rm playwright npx playwright test {{.CLI_ARGS}}
          E2E_EXIT=$?
          ./scripts/e2e-summary.sh
          exit $E2E_EXIT

  test:e2e:cover:
    desc: Run E2E tests with binary coverage instrumentation
    deps: ['docker:build:cover']
    cmds:
      - cmd: |
          if docker compose -p holomush-e2e ps -q 2>/dev/null | grep -q .; then
            echo "ERROR: E2E infrastructure already running (project: holomush-e2e)."
            echo "Stop it with: docker compose -p holomush-e2e down -v"
            exit 1
          fi
      - mkdir -p .coverdata/core .coverdata/gateway
      - defer: {docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml -f compose.e2e.cover.yaml down -v; rm -rf .coverdata;: ''}
      - cmd: |
          set +e
          E2E_EXIT=0
          docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml -f compose.e2e.cover.yaml run --rm \
            playwright npx playwright test {{.CLI_ARGS}} || E2E_EXIT=$?
          docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml -f compose.e2e.cover.yaml stop core gateway
          go tool covdata textfmt -i=.coverdata/core,.coverdata/gateway -o coverage-e2e.out
          echo "E2E coverage written to coverage-e2e.out"
          ./scripts/e2e-summary.sh
          exit $E2E_EXIT

  test:bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem -count={{.BENCH_COUNT}} -benchtime={{.BENCH_TIME}} -run='^$' {{.BENCH_PACKAGE}}
    vars:
      BENCH_COUNT: '{{default "3" .BENCH_COUNT}}'
      BENCH_TIME: '{{default "1s" .BENCH_TIME}}'
      BENCH_PACKAGE: '{{default "./internal/access/policy/" .BENCH_PACKAGE}}'

  test:fuzz:
    desc: Run fuzz tests
    cmds:
      - go test -fuzz=FuzzParse -fuzztime={{.FUZZ_TIME}} {{.FUZZ_PACKAGE}}
    vars:
      FUZZ_TIME: '{{default "30s" .FUZZ_TIME}}'
      FUZZ_PACKAGE: '{{default "./internal/access/policy/dsl/" .FUZZ_PACKAGE}}'

  # ──────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────

  build:
    desc: Build the server binary
    deps: ['web:embed']
    cmds:
      - go build -o {{.BINARY_NAME}} {{.MAIN_PKG}}

  plugin:build-all:
    desc: Discover and compile all binary plugins (host + linux/amd64 + linux/arm64)
    cmds:
      - ./scripts/build-plugins.sh

  plugin:build:
    desc: Build a single binary plugin (pass name after --)
    cmds:
      - ./scripts/build-plugins.sh {{.CLI_ARGS}}

  docker:build:
    desc: Build Docker image from locally-compiled Linux binary
    deps: ['web:embed', 'plugin:build-all']
    cmds:
      - CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o holomush {{.MAIN_PKG}}
      - docker build --build-arg TARGETARCH=$(go env GOARCH) -t holomush .

  docker:build:cover:
    desc: Build Docker image with coverage instrumentation
    deps: ['web:embed', 'plugin:build-all']
    cmds:
      - CGO_ENABLED=0 GOOS=linux go build -cover -o holomush {{.MAIN_PKG}}
      - docker build -t holomush .

  # ──────────────────────────────────────────
  # Code generation
  # ──────────────────────────────────────────

  proto:
    desc: Generate Go code from protobuf definitions
    cmds:
      - buf generate
    sources:
      - api/proto/**/*.proto
      - buf.yaml
      - buf.gen.yaml
    generates:
      - internal/proto/**/*.go

  generate:schema:
    desc: Generate plugin JSON Schema from Go types
    cmds:
      - go generate ./internal/plugin/
    sources:
      - internal/plugin/gen-schema/main.go
      - internal/plugin/manifest.go
      - internal/plugin/schema.go
    generates:
      - schemas/plugin.schema.json

  generate:ebnf:
    desc: Generate EBNF grammar and railroad diagram from DSL parser
    cmds:
      - go generate ./internal/access/policy/dsl/
    sources:
      - internal/access/policy/dsl/gen-ebnf/main.go
      - internal/access/policy/dsl/ast.go
    generates:
      - site/docs/reference/policy-dsl.ebnf
      - site/docs/reference/policy-dsl-railroad.html

  mocks:generate:
    desc: Generate mocks with mockery
    cmds:
      - mockery

  # ──────────────────────────────────────────
  # Web client
  # ──────────────────────────────────────────

  web:install:
    desc: Install web client dependencies
    dir: web
    cmds:
      - pnpm install
    sources:
      - web/package.json
      - web/pnpm-lock.yaml
    preconditions:
      - sh: command -v pnpm
        msg: "pnpm not found. Install with: npm install -g pnpm"
    status:
      - test -d node_modules/.pnpm

  web:generate:
    desc: Generate TypeScript ConnectRPC clients from proto
    dir: web
    cmds:
      - buf generate
    sources:
      - web/buf.gen.yaml
      - api/proto/**/*.proto
    generates:
      - web/src/lib/connect/**/*.ts

  web:build:
    desc: Build SvelteKit static site
    dir: web
    deps: ['web:install', 'web:generate']
    cmds:
      - pnpm build
    sources:
      - web/src/**/*
      - web/svelte.config.js
      - web/vite.config.ts
    generates:
      - web/build/index.html

  web:embed:
    desc: Copy SvelteKit build to internal/web/dist for go:embed
    deps: ['web:build']
    cmds:
      - rm -rf internal/web/dist
      - cp -r web/build internal/web/dist

  web:dev:
    desc: Run SvelteKit dev server (frontend only)
    dir: web
    deps: ['web:install', 'web:generate']
    cmds:
      - pnpm dev

  # ──────────────────────────────────────────
  # Linters (called by `task lint`)
  # ──────────────────────────────────────────

  lint:go:
    desc: Lint Go code
    cmds:
      - golangci-lint run

  lint:proto:
    desc: Lint protobuf definitions (matches CI's Buf Lint check)
    cmds:
      - buf lint
      - buf format --diff --exit-code

  lint:markdown:
    desc: Lint Markdown files
    cmds:
      - rumdl check --exclude 'site,.git,.beads,.serena' .
      - rumdl check --config site/.rumdl.toml site/

  lint:yaml:
    desc: Check YAML formatting
    cmds:
      - yamlfmt -lint .

  lint:actions:
    desc: Lint GitHub Actions workflows
    cmds:
      - actionlint -config-file .github/actionlint.yaml .github/workflows/*

  lint:access-migration:
    desc: Verify no legacy AccessControl.Check() calls remain
    cmds:
      - |
        set -euo pipefail
        LEGACY_CALLS=$(grep -rn --include="*.go" --exclude="*_test.go" --exclude="*.pb.go" \
          -E 'AccessControl\.Check\(ctx,' internal/ pkg/ 2>/dev/null | grep -v '^\s*//' || true)
        if [ -n "$LEGACY_CALLS" ]; then
          echo "ERROR: Found legacy AccessControl.Check() calls:"
          echo "$LEGACY_CALLS"
          exit 1
        fi
        CHAR_PREFIX=$(grep -rn --include="*.go" --exclude="*_test.go" --exclude="*.pb.go" \
          -E '"char:' internal/ pkg/ 2>/dev/null | grep -v '^\s*//' | grep -v '"character:' || true)
        if [ -n "$CHAR_PREFIX" ]; then
          echo "ERROR: Found legacy \"char:\" prefix:"
          echo "$CHAR_PREFIX"
          exit 1
        fi

  lint:test-helpers:
    desc: Verify no test helper imports in production code
    cmds:
      - |
        set -euo pipefail
        IMPORTS=$(grep -rn --include="*.go" --exclude="*_test.go" --exclude="*.pb.go" \
          -E '(import|").*policytest' internal/ pkg/ 2>/dev/null | grep -v '^\s*//' | grep -v '/testutil/' || true)
        if [ -n "$IMPORTS" ]; then
          echo "ERROR: Found test helper imports in production code:"
          echo "$IMPORTS"
          exit 1
        fi

  # ──────────────────────────────────────────
  # Formatters (called by `task fmt`)
  # ──────────────────────────────────────────

  fmt:go:
    desc: Format Go code
    cmds:
      - gofumpt -w .

  fmt:markdown:
    desc: Format Markdown files
    cmds:
      - rumdl fmt --exclude 'site,.git,.beads,.serena' .
      - rumdl fmt --config site/.rumdl.toml site/

  fmt:yaml:
    desc: Format YAML files
    cmds:
      - yamlfmt .

  fmt:dprint:
    desc: Format with dprint
    cmds:
      - dprint fmt

  fmt:check:
    desc: Check formatting without modifying
    cmds:
      - dprint check
      - rumdl fmt --check --exclude 'site,.git,.beads,.serena' .
      - rumdl fmt --check --config site/.rumdl.toml site/

  # ──────────────────────────────────────────
  # License headers
  # ──────────────────────────────────────────

  license:check:
    desc: Check SPDX license headers
    cmds:
      - task: license:run
        vars: {MODE: -check}

  license:add:
    desc: Add missing SPDX license headers
    cmds:
      - task: license:run

  license:run:
    internal: true
    cmds:
      - |
        set -euo pipefail
        EXISTING_DIRS=""
        for dir in {{.LICENSE_DIRS}}; do
          [ -d "$dir" ] && EXISTING_DIRS="$EXISTING_DIRS $dir"
        done
        [ -z "$EXISTING_DIRS" ] && { echo "ERROR: No directories found"; exit 1; }
        command -v addlicense >/dev/null 2>&1 || go install github.com/google/addlicense@latest
        addlicense {{.MODE}} -f LICENSE_HEADER \
          -ignore '**/*.pb.go' -ignore 'vendor/**' -ignore 'internal/web/dist/**' \
          $EXISTING_DIRS

  # ──────────────────────────────────────────
  # PR preparation (mirrors CI Lint job)
  # ──────────────────────────────────────────

  pr-prep:
    desc: Run all CI checks locally before pushing (mirrors ALL CI jobs)
    cmds:
      - echo "▸ Verifying schema is current..."
      - task: generate:schema
      - cmd: |
          SCHEMA=schemas/plugin.schema.json
          BEFORE=$(sha256sum "$SCHEMA" | cut -d' ' -f1)
          go generate ./internal/plugin/
          AFTER=$(sha256sum "$SCHEMA" | cut -d' ' -f1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "ERROR: Schema out of sync with Go types. Run 'task generate:schema' and commit."
            exit 1
          fi
      - echo "▸ Checking license headers..."
      - task: license:check
      - echo "▸ Building binary plugins..."
      - task: plugin:build-all
      - echo "▸ Running linters..."
      - task: lint
      - echo "▸ Checking formatting..."
      - task: fmt:check
      - echo "▸ Running unit tests..."
      - task: test
      - echo "▸ Running integration tests..."
      - task: test:int
      - echo "▸ Running E2E tests..."
      - task: test:e2e
      - echo "✓ All PR checks passed."

  # ──────────────────────────────────────────
  # Setup (run once)
  # ──────────────────────────────────────────

  setup:
    desc: Install all dev tools and git hooks
    cmds:
      - brew install golangci-lint gofumpt lefthook actionlint goreleaser dprint cocogitto rumdl yamlfmt binaryen gotestsum
      - brew install steveyegge/beads/bd
      - go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
      - lefthook install
      - bd hooks install --chain
      - echo "✓ Dev environment ready. Run 'task dev' to start."

  deps:
    desc: Download and tidy Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  # ──────────────────────────────────────────
  # Database migrations
  # ──────────────────────────────────────────

  migrate:up:
    desc: Apply all pending migrations
    cmds:
      - go run {{.MAIN_PKG}} migrate up

  migrate:down:
    desc: Rollback one migration
    cmds:
      - go run {{.MAIN_PKG}} migrate down

  migrate:status:
    desc: Show migration status
    cmds:
      - go run {{.MAIN_PKG}} migrate status

  migrate:create:
    desc: 'Create a new migration (usage: task migrate:create -- name)'
    cmds:
      - migrate create -ext sql -dir {{.MIGRATIONS_DIR}} -seq {{.CLI_ARGS}}
    preconditions:
      - sh: command -v migrate
        msg: "migrate CLI not found. Install with: go install -tags 'pgx5' github.com/golang-migrate/migrate/v4/cmd/migrate@latest"

  migrate:force:
    desc: 'Force set migration version (usage: task migrate:force -- VERSION)'
    cmds:
      - go run {{.MAIN_PKG}} migrate force {{.CLI_ARGS}}

  # ──────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────

  release:check:
    desc: Validate goreleaser config
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Build snapshot locally (no publish)
    cmds:
      - goreleaser build --snapshot --clean --single-target

  # ──────────────────────────────────────────
  # Documentation site
  # ──────────────────────────────────────────

  docs:setup:
    desc: Set up documentation dev environment
    dir: site
    cmds:
      - uv sync

  docs:build:
    desc: Build documentation site
    dir: site
    cmds:
      - uv run zensical build

  docs:serve:
    desc: Start documentation dev server
    dir: site
    cmds:
      - uv run zensical serve

  docs:proto:
    desc: Generate gRPC API reference from proto files
    vars:
      PROTOC_INCLUDE:
        sh: echo "$(dirname $(which protoc) 2>/dev/null)/../include" 2>/dev/null || echo "/usr/local/include"
    cmds:
      - >-
        protoc --doc_out=site/docs/reference --doc_opt=markdown,grpc-api.md --proto_path=api/proto --proto_path={{.PROTOC_INCLUDE}}
        api/proto/holomush/core/v1/core.proto api/proto/holomush/web/v1/web.proto api/proto/holomush/control/v1/control.proto
        api/proto/holomush/plugin/v1/plugin.proto api/proto/holomush/plugin/v1/hostfunc.proto
      # Fix well-known type links to point to official protobuf docs (handles any google.protobuf.* type)
      - >-
        perl -pi -e 's|\[google\.protobuf\.([A-Za-z]+)\]\(#google-protobuf-[A-Za-z]+\)|"[google.protobuf.$1](https://protobuf.dev/reference/protobuf/google.protobuf/#"
        . lc($1) . ")"|ge' site/docs/reference/grpc-api.md
    sources:
      - api/proto/holomush/*/v1/*.proto
    generates:
      - site/docs/reference/grpc-api.md

  # ──────────────────────────────────────────
  # Cleanup
  # ──────────────────────────────────────────

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/
      - rm -rf build/
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html
      - rm -rf web/build
      - rm -rf internal/web/dist
