version: "3"

vars:
  BINARY_NAME: holomush
  MAIN_PKG: ./cmd/holomush
  MIGRATIONS_DIR: internal/store/migrations
  # license-eye (Apache SkyWalking Eyes) pinned release — the single version
  # source. CI's Lint job no longer pins it separately: `task license:check`
  # self-installs license-eye at this version via its `command -v ... || go
  # install` guard (see license:check / license:add / setup below).
  LICENSE_EYE_VERSION: v0.8.0
  # Build/test/lint tooling is pinned in isolated `go tool` modules
  # (go.tool.mod, go.tool-lint.mod) and run from the Go module proxy rather
  # than installed from GitHub Releases — this removes the CDN-flake class
  # that broke arduino/setup-task and the install.sh shim (holomush-ar31b).
  # GOWORK=off is required: go.work enables workspace mode, which rejects
  # -modfile. The two modules are split because the linters' dependency
  # closures conflict with task's (charmbracelet/go-yaml versions).
  GO_TOOL: GOWORK=off go tool -modfile=go.tool.mod
  GO_TOOL_LINT: GOWORK=off go tool -modfile=go.tool-lint.mod
  # Canonical docs-only path globs. MUST stay byte-identical with
  # .github/workflows/ci.yaml's paths-ignore: blocks and
  # .github/workflows/ci-docs-skip.yaml's paths: blocks.
  # Enforced by `task lint:docs-paths-sync`. Spec:
  # docs/superpowers/specs/2026-05-14-pr-prep-docs-fast-lane-design.md §4.1.
  DOCS_ONLY_PATHS: |
    site/**
    docs/**
    **/*.md
    .claude/agents/**
    .claude/commands/**
    .claude/rules/**
    .claude/agent-memory/**
    LICENSE
    LICENSE_HEADER

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ──────────────────────────────────────────
  # Daily dev loop
  # ──────────────────────────────────────────

  dev:
    desc: Start full stack (Postgres + core + gateway) — rebuilds on each run
    cmds:
      - task: docker:build
      - docker compose up --force-recreate --remove-orphans

  dev:down:
    desc: Stop the dev stack
    cmds:
      - docker compose down

  dev:clean:
    desc: Stop the dev stack and wipe the database
    cmds:
      - docker compose down -v

  dev:obs:
    desc: Start dev environment with observability stack (Grafana, Jaeger, Prometheus, Dozzle)
    cmds:
      - task: docker:build
      # Surface the UIs up front so traces from the server-side spans
      # (e.g. holomush-87qu's Subscribe phase breakdown) are discoverable.
      # Web-side traces require `task web:dev:obs` in a separate shell —
      # the SvelteKit tracer is conditional on PUBLIC_OTEL_ENDPOINT.
      - |
        echo "▸ Observability UIs (start after services are up):"
        echo "    Jaeger    http://localhost:16686"
        echo "    Grafana   http://localhost:3001"
        echo "    Dozzle    http://localhost:8888"
        echo "    Prom      http://localhost:9090  (internal to backend; expose via grafana)"
        echo "▸ Web-side traces: run 'task web:dev:obs' in another shell"
      - COMPOSE_PROFILES=observability docker compose up --force-recreate --remove-orphans

  test:
    desc: Run unit tests (parent module + gorules analyzer module; pass package/test args after --)
    cmds:
      - task: test:gorules
      - "{{.GO_TOOL}} gotestsum --format pkgname -- -race -count=1 {{.CLI_ARGS | default \"./...\"}}"

  test:gorules:
    desc: Run analysistest unit tests for the gorules analyzer module
    dir: gorules
    cmds:
      - go test ./...

  test:verbose:
    desc: Run unit tests with full verbose output
    cmds:
      - "{{.GO_TOOL}} gotestsum --format standard-verbose -- -race -count=1 {{.CLI_ARGS | default \"./...\"}}"

  lint:
    desc: Run all linters
    cmds:
      - task: lint:go
      - task: lint:proto
      - task: lint:markdown
      - task: lint:yaml
      - task: lint:actions
      - task: lint:access-migration
      - task: lint:test-helpers
      - task: lint:plugin-manifests
      - task: lint:docs-symmetry
      - task: lint:docs-paths-sync
      - task: lint:adr
      - task: lint:no-timestamptz
      - task: lint:no-microsecond-truncate
      - task: lint:no-unixnano-in-repos

  lint:adr:
    desc: "Run docs/adr/ health check (adr-doctor.sh)"
    cmds:
      - scripts/adr-doctor.sh

  adr:migrate:
    desc: "One-shot migration of legacy ADRs to bd-id filename convention. Use -- --apply to mutate."
    cmds:
      - python3 scripts/adr-migrate.py {{.CLI_ARGS}}

  fmt:
    desc: Format all files and apply license headers
    cmds:
      - task: fmt:go
      - task: fmt:yaml
      - task: fmt:markdown
      - task: fmt:dprint
      - task: license:add

  # ──────────────────────────────────────────
  # Extended testing
  # ──────────────────────────────────────────

  test:cover:
    desc: Run tests with coverage report
    cmds:
      # -coverpkg=./... instruments ALL packages so a test in package A that
      # exercises code in package B contributes coverage to B. Without this,
      # Go's default only counts coverage for the package currently being
      # tested, which hides cross-package exercise (e.g., integration tests
      # that drive multiple packages via an end-to-end flow).
      - "{{.GO_TOOL}} gotestsum --format pkgname -- -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./..."
      # HTML generation can fail with "inconsistent NumStmt" when packages
      # use build tags (e.g., store_memory.go with //go:build !integration)
      # that change statement structure across compilation contexts. The
      # coverage profile itself is correct for Codecov; HTML is convenience.
      - go tool cover -html=coverage.out -o coverage.html || true

  test:int:
    desc: Run integration tests (needs Docker for testcontainers)
    env:
      HOLOMUSH_REQUIRE_PLUGINS: "1"
    cmds:
      - task: plugin:build-all
      # No package enumeration: the only //go:build !integration helper
      # (the in-memory event store) was extracted to internal/core/coretest
      # (holomush-1eps2), so ./... compiles cleanly under -tags=integration.
      # -coverpkg=./... makes integration tests contribute coverage to every
      # production package they exercise (see .codecov.yml).
      - "{{.GO_TOOL}} gotestsum --format pkgname -- -race -tags=integration -count=1 -coverprofile=coverage-int.out -covermode=atomic
        -coverpkg=./... {{.CLI_ARGS | default \"./...\"}}"

  test:int:focus:
    desc: Run focused integration tests with Ginkgo focus filter (pass -ginkgo.focus="..." after --)
    cmds:
      - task: plugin:build-all
      - "{{.GO_TOOL}} gotestsum --format pkgname -- -race -tags=integration -count=1 -timeout 8m github.com/holomush/holomush/test/integration/plugin
        {{.CLI_ARGS}}"

  soak:eventbus:
    desc: Run the eventbus chaos + soak matrix (nightly CI; 5min sustained load per spec §8)
    cmds:
      # -tags=integration,soak picks up the soak-only tests under
      # test/integration/eventbus_e2e/ without firing regular integration
      # tests again. 20m total timeout absorbs the 5m sustained run plus
      # projection drain + teardown.
      - "{{.GO_TOOL}} gotestsum --format standard-verbose -- -race -tags='integration,soak' -count=1 -timeout=20m -v ./test/integration/eventbus_e2e/..."

  test:e2e:
    desc: Run Playwright E2E tests in Docker
    deps: ['docker:build']
    cmds:
      - cmd: |
          if docker compose -p holomush-e2e ps -q 2>/dev/null | grep -q .; then
            echo "ERROR: E2E infrastructure already running (project: holomush-e2e)."
            echo "Stop it with: docker compose -p holomush-e2e down -v"
            exit 1
          fi
      - rm -rf web/test-results
      - defer: docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml down -v
      - cmd: |
          set +e
          docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml run --rm playwright npx playwright test {{.CLI_ARGS}}
          E2E_EXIT=$?
          ./scripts/e2e-summary.sh
          exit $E2E_EXIT

  test:e2e:cover:
    desc: Run E2E tests with binary coverage instrumentation
    deps: ['docker:build:cover']
    cmds:
      - cmd: |
          if docker compose -p holomush-e2e ps -q 2>/dev/null | grep -q .; then
            echo "ERROR: E2E infrastructure already running (project: holomush-e2e)."
            echo "Stop it with: docker compose -p holomush-e2e down -v"
            exit 1
          fi
      - mkdir -p .coverdata/core .coverdata/gateway
      - defer: {docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml -f compose.e2e.cover.yaml down -v; rm -rf .coverdata;: ''}
      - cmd: |
          set +e
          E2E_EXIT=0
          docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml -f compose.e2e.cover.yaml run --rm \
            playwright npx playwright test {{.CLI_ARGS}} || E2E_EXIT=$?
          docker compose -p holomush-e2e -f compose.yaml -f compose.e2e.yaml -f compose.e2e.cover.yaml stop core gateway
          go tool covdata textfmt -i=.coverdata/core,.coverdata/gateway -o coverage-e2e.out
          echo "E2E coverage written to coverage-e2e.out"
          ./scripts/e2e-summary.sh
          exit $E2E_EXIT

  quarantine:audit:
    desc: Fail if any quarantined spec's bead is closed (needs bd; run locally / pre-bd-close). INV-3.
    cmds:
      - bash scripts/quarantine-audit.sh

  test:bats:
    desc: Run bats shell tests under scripts/tests/
    cmds:
      # bats_load_library searches BATS_LIB_PATH for bats-support/bats-assert.
      # Default covers macOS (Homebrew arm64+x86) and Linux (apt/manual install).
      # Respect an externally-set BATS_LIB_PATH so CI workflows that install
      # bats helpers to a custom location (e.g., bats-core/bats-action) work
      # without requiring this default to match.
      - cmd: |
          BATS_LIB_PATH="${BATS_LIB_PATH:-/opt/homebrew/lib:/usr/local/lib:/usr/lib}" \
            bats scripts/tests/

  test:bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem -count={{.BENCH_COUNT}} -benchtime={{.BENCH_TIME}} -run='^$' {{.BENCH_PACKAGE}}
    vars:
      BENCH_COUNT: '{{default "3" .BENCH_COUNT}}'
      BENCH_TIME: '{{default "1s" .BENCH_TIME}}'
      BENCH_PACKAGE: '{{default "./internal/access/policy/" .BENCH_PACKAGE}}'

  test:fuzz:
    desc: Run fuzz tests
    cmds:
      - go test -fuzz=FuzzParse -fuzztime={{.FUZZ_TIME}} {{.FUZZ_PACKAGE}}
    vars:
      FUZZ_TIME: '{{default "30s" .FUZZ_TIME}}'
      FUZZ_PACKAGE: '{{default "./internal/access/policy/dsl/" .FUZZ_PACKAGE}}'

  # ──────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────

  build:
    desc: Build the server binary with the real SvelteKit bundle embedded
    deps: ['web:embed']
    cmds:
      # -tags realweb selects static_realweb.go (go:embed all:dist).
      # Without the tag, the default build embeds internal/web/placeholder/
      # via static_placeholder.go — used by `task test` and fresh-checkout
      # `go build`. See internal/web/static.go for the full rationale.
      - go build -tags realweb -o {{.BINARY_NAME}} {{.MAIN_PKG}}

  plugin:build-all:
    desc: Discover and compile all binary plugins (host + linux/amd64 + linux/arm64)
    # Sources cover the plugin tree, the SDK packages plugins import
    # (pkg/plugin/**, pkg/proto/**), and the module manifest. pkg/proto
    # catches `task proto` regenerations; pkg/plugin catches SDK changes;
    # go.mod/go.sum catch dep bumps.
    #
    # NOT covered: internal/** — including it would invalidate the cache
    # on most pr-prep iterations (internal/ changes frequently), defeating
    # the whole optimization. Within pr-prep:run, an internal/** change
    # that breaks plugin builds is caught downstream by `task lint` and
    # `task test` (both re-compile plugin sources via go vet / go test)
    # BEFORE `test:int` would exercise a stale subprocess binary.
    # Direct `task test:int` invocations after an internal/** API change
    # may run against a stale cached binary; if symptoms are confusing,
    # `rm -rf build/plugins && task test:int` forces rebuild.
    sources:
      - plugins/**/*.go
      - plugins/**/plugin.yaml
      - plugins/**/migrations/**
      - pkg/plugin/**/*.go
      - pkg/proto/**/*.go
      - scripts/build-plugins.sh
      - go.mod
      - go.sum
    generates:
      - build/plugins/*/plugin.yaml
      - build/plugins/*/*-*/*
      - build/plugins/*/migrations/**
    cmds:
      - ./scripts/build-plugins.sh

  plugin:build:
    desc: Build a single binary plugin (pass name after --)
    cmds:
      - ./scripts/build-plugins.sh {{.CLI_ARGS}}

  plugin:validate:
    desc: "Validate a plugin's manifest (manifest grammar + crypto.emits/consumes rules)"
    cmds:
      - ./scripts/validate-plugin.sh {{.CLI_ARGS}}
    silent: false

  docker:build:
    desc: Build Docker image from locally-compiled Linux binary
    deps: ['web:embed', 'plugin:build-all']
    cmds:
      # -tags realweb embeds the real dist bundle; see `build:` for context.
      - CGO_ENABLED=0 GOOS=linux go build -tags realweb -ldflags="-s -w" -o holomush {{.MAIN_PKG}}
      - docker build --build-arg TARGETARCH=$(go env GOARCH) -t holomush .

  docker:build:cover:
    desc: Build Docker image with coverage instrumentation
    deps: ['web:embed', 'plugin:build-all']
    cmds:
      - CGO_ENABLED=0 GOOS=linux go build -tags realweb -cover -o holomush {{.MAIN_PKG}}
      - docker build -t holomush .

  # ──────────────────────────────────────────
  # Code generation
  # ──────────────────────────────────────────

  proto:
    desc: Generate Go code from protobuf definitions (public and internal modules).
    cmds:
      # Public module (api/proto): Go + gRPC + ConnectRPC bindings → pkg/proto/.
      - buf generate
      # Internal module (internal/eventbus/cursor): Go only → internal/eventbus/cursor/cursorv1/.
      # Separate template because the internal module has different
      # go_package_prefix and output paths; both are real buf modules
      # listed in buf.yaml so `buf lint` and `buf breaking` cover both.
      - buf generate --template buf.gen.internal.yaml
    sources:
      - api/proto/**/*.proto
      - internal/eventbus/cursor/**/*.proto
      - buf.yaml
      - buf.gen.yaml
      - buf.gen.internal.yaml
    generates:
      - pkg/proto/**/*.pb.go
      - internal/eventbus/cursor/cursorv1/*.pb.go

  generate:schema:
    desc: Generate plugin JSON Schema from Go types
    cmds:
      - go generate ./internal/plugin/
    sources:
      - internal/plugin/gen-schema/main.go
      - internal/plugin/manifest.go
      - internal/plugin/schema.go
    generates:
      - schemas/plugin.schema.json

  generate:ebnf:
    desc: Generate EBNF grammar and railroad diagram from DSL parser
    cmds:
      - go generate ./internal/access/policy/dsl/
    sources:
      - internal/access/policy/dsl/gen-ebnf/main.go
      - internal/access/policy/dsl/ast.go
    generates:
      - site/docs/reference/policy-dsl.ebnf
      - site/docs/reference/policy-dsl-railroad.html

  generate:ebnf:check:
    desc: Verify generated EBNF grammar + railroad diagram are current
    cmds:
      - |
        set -euo pipefail
        EBNF=site/docs/reference/policy-dsl.ebnf
        RAIL=site/docs/reference/policy-dsl-railroad.html
        BEFORE=$(sha256sum "$EBNF" "$RAIL" | sha256sum)
        task --force generate:ebnf
        AFTER=$(sha256sum "$EBNF" "$RAIL" | sha256sum)
        if [ "$BEFORE" != "$AFTER" ]; then
          echo "EBNF/railroad out of sync. Run 'task generate:ebnf' and commit." >&2
          exit 1
        fi

  mocks:generate:
    desc: Generate mocks with mockery
    cmds:
      - mockery

  # ──────────────────────────────────────────
  # Web client
  # ──────────────────────────────────────────

  web:install:
    desc: Install web client dependencies
    dir: web
    cmds:
      - pnpm install
    sources:
      - web/package.json
      - web/pnpm-lock.yaml
    preconditions:
      - sh: command -v pnpm
        msg: "pnpm not found. Install with: npm install -g pnpm"
    status:
      - test -d node_modules/.pnpm

  web:generate:
    desc: Generate TypeScript ConnectRPC clients from proto
    dir: web
    cmds:
      - buf generate
    sources:
      - web/buf.gen.yaml
      - api/proto/**/*.proto
    generates:
      - web/src/lib/connect/**/*.ts

  web:build:
    desc: Build SvelteKit static site
    dir: web
    deps: ['web:install', 'web:generate']
    cmds:
      - pnpm build
    sources:
      - web/src/**/*
      - web/svelte.config.js
      - web/vite.config.ts
    generates:
      - web/build/index.html

  web:embed:
    desc: Copy SvelteKit build to internal/web/dist for go:embed
    deps: ['web:build']
    cmds:
      - rm -rf internal/web/dist
      - cp -r web/build internal/web/dist

  web:dev:
    desc: Run SvelteKit dev server (frontend only)
    dir: web
    deps: ['web:install', 'web:generate']
    cmds:
      - pnpm dev

  web:dev:obs:
    desc: Run SvelteKit dev server with OTel tracing enabled (pairs with `task dev:obs`)
    dir: web
    deps: ['web:install', 'web:generate']
    cmds:
      # PUBLIC_OTEL_ENDPOINT is the conditional-init switch for the web
      # tracer (web/src/lib/telemetry.ts:33) — without it set, the SDK
      # returns early and no spans are emitted. The browser POSTs to the
      # OTel collector's HTTP receiver (compose.yaml exposes 4318 on
      # localhost; collector config allows CORS from http://localhost:*).
      # Use the HTTP endpoint, NOT 4317 (that's gRPC, browser can't use it).
      # Pair with `task dev:obs` to start the otel-collector + Jaeger.
      #
      # PUBLIC_SENTRY_DSN passes through from the shell when set (holomush-0wun).
      # Sentry's browser SDK is dynamic-imported behind that gate, so unset =
      # zero bundle cost. See site/docs/operating/sentry.md.
      - PUBLIC_OTEL_ENDPOINT=http://localhost:4318 pnpm dev

  # ──────────────────────────────────────────
  # Linters (called by `task lint`)
  # ──────────────────────────────────────────

  lint:go:
    desc: Lint Go code (uses bin/custom-gcl with the holomushrules plugin)
    deps: ['lint:build-custom-gcl']
    cmds:
      - ./bin/custom-gcl run

  lint:build-custom-gcl:
    desc: Build the custom-gcl binary if missing or stale
    # NOTE: .golangci.yaml is intentionally excluded from sources — the
    # binary embeds analyzer code at build time but reads .golangci.yaml
    # at run time, so config-only changes do not require a rebuild.
    sources:
      - .custom-gcl.yml
      - gorules/**/*.go
      - gorules/go.mod
      - gorules/go.sum
    generates:
      - ./bin/custom-gcl
    cmds:
      - "{{.GO_TOOL_LINT}} golangci-lint custom"

  lint:proto:
    desc: Lint protobuf definitions (matches CI's Buf Lint check)
    cmds:
      - buf lint
      - buf format --diff --exit-code

  lint:markdown:
    desc: Lint Markdown files
    cmds:
      - rumdl check --exclude 'site,.git,.beads,.serena,.claude' .
      - rumdl check --config site/.rumdl.toml site/

  lint:yaml:
    desc: Check YAML formatting
    cmds:
      - "{{.GO_TOOL_LINT}} yamlfmt -lint ."

  lint:actions:
    desc: Lint GitHub Actions workflows
    cmds:
      - "{{.GO_TOOL_LINT}} actionlint -config-file .github/actionlint.yaml .github/workflows/*"

  lint:access-migration:
    desc: Verify no legacy AccessControl.Check() calls remain
    cmds:
      - |
        set -euo pipefail
        LEGACY_CALLS=$(grep -rn --include="*.go" --exclude="*_test.go" --exclude="*.pb.go" \
          -E 'AccessControl\.Check\(ctx,' internal/ pkg/ 2>/dev/null | grep -v '^\s*//' || true)
        if [ -n "$LEGACY_CALLS" ]; then
          echo "ERROR: Found legacy AccessControl.Check() calls:"
          echo "$LEGACY_CALLS"
          exit 1
        fi
        CHAR_PREFIX=$(grep -rn --include="*.go" --exclude="*_test.go" --exclude="*.pb.go" \
          -E '"char:' internal/ pkg/ 2>/dev/null | grep -v '^\s*//' | grep -v '"character:' || true)
        if [ -n "$CHAR_PREFIX" ]; then
          echo "ERROR: Found legacy \"char:\" prefix:"
          echo "$CHAR_PREFIX"
          exit 1
        fi

  lint:test-helpers:
    desc: Verify no test helper imports in production code
    cmds:
      - |
        set -euo pipefail
        IMPORTS=$(grep -rn --include="*.go" --exclude="*_test.go" --exclude="*.pb.go" \
          -E '(import|").*policytest' internal/ pkg/ 2>/dev/null | grep -v '^\s*//' | grep -v '/testutil/' || true)
        if [ -n "$IMPORTS" ]; then
          echo "ERROR: Found test helper imports in production code:"
          echo "$IMPORTS"
          exit 1
        fi

  lint:plugin-manifests:
    desc: Lint plugin.yaml manifests for actor_kinds_claimable coverage (spec ec22.1).
    cmds:
      - go run ./cmd/lint-plugin-manifests

  lint:docs-paths-sync:
    desc: Verify DOCS_ONLY_PATHS is byte-identical across Taskfile.yaml, ci.yaml, ci-docs-skip.yaml.
    cmds:
      - bash scripts/lint-docs-paths-sync.sh

  lint:docs-symmetry:
    desc: Verify AGENTS.md is a symlink to CLAUDE.md (single source of truth — drift structurally impossible).
    cmds:
      - |
        set -euo pipefail
        if [ ! -f CLAUDE.md ]; then
          echo "ERROR: CLAUDE.md is missing (this is the source-of-truth file)"; exit 1
        fi
        if [ ! -L AGENTS.md ]; then
          echo "ERROR: AGENTS.md is not a symlink — it MUST be a relative symlink to CLAUDE.md (holomush-f7t2)."
          echo "Fix: rm AGENTS.md && ln -s CLAUDE.md AGENTS.md"
          exit 1
        fi
        target=$(readlink AGENTS.md)
        if [ "$target" != "CLAUDE.md" ]; then
          echo "ERROR: AGENTS.md symlinks to '$target', expected 'CLAUDE.md' (relative, same directory)."
          exit 1
        fi
        echo "AGENTS.md → CLAUDE.md symlink intact."

  lint:no-unixnano-in-repos:
    desc: "Reject UnixNano() / time.Unix(0, ...) in repo packages outside pgnanos (INV-TS-2)"
    cmds:
      - |
        set -euo pipefail
        # Repo packages MUST route timestamps through internal/pgnanos.Time
        # as the scan/insert seam (ADR holomush-rbw6). Raw UnixNano() or
        # time.Unix(0, ns) bypasses the seam and risks inconsistency.
        # Escape hatch: '// pgnanos-exempt: <reason>' on the same line.
        if rg -n "UnixNano\(\)|time\.Unix\(0," \
             internal/auth/postgres/ internal/world/postgres/ internal/totp/ \
             internal/eventbus/history/ plugins/*/ \
             --type=go \
             -g '!*_test.go' -g '!internal/pgnanos/**' \
             | rg -v "pgnanos-exempt:" ; then
          echo "FAIL: raw UnixNano() / time.Unix(0, ...) in repo code. Use internal/pgnanos.Time as the scan/insert seam."
          echo "If unavoidable, annotate with '// pgnanos-exempt: <reason>' on the same line."
          exit 1
        fi

  lint:no-microsecond-truncate:
    desc: "Reject .Truncate(time.Microsecond) in Go code (INV-TS-3)"
    cmds:
      - |
        set -euo pipefail
        # Persistent timestamps are BIGINT-ns post-gfo6; .Truncate(time.Microsecond)
        # is no longer needed. Escape hatch: '// pgnanos-exempt: <reason>' on the
        # same line for external systems that legitimately require microsecond
        # granularity (none currently expected).
        #
        # The explicit {{.ROOT_DIR}} path is load-bearing: rg defaults to
        # scanning cwd ONLY when stdin is a TTY. Under a non-TTY stdin (CI
        # wires run-steps to /dev/null; agents may attach an idle pipe) a
        # path-less rg reads stdin instead — matching nothing in CI
        # (false-clean no-op) or blocking forever on a pipe. An explicit
        # path forces a repo walk regardless of stdin. {{.ROOT_DIR}} (the
        # root Taskfile's dir) is used over '.' so the scan stays anchored
        # to the repo root even if this task ever gains a `dir:` override
        # (holomush-vpvu5).
        if rg -n "Truncate\(time\.Microsecond\)" --type=go {{.ROOT_DIR}} \
             | rg -v "pgnanos-exempt:" ; then
          echo "FAIL: .Truncate(time.Microsecond) found. Persistent timestamps are BIGINT-ns; truncation is no longer needed."
          echo "If you have a non-PG external system that requires µs, annotate with '// pgnanos-exempt: <reason>' on the same line."
          exit 1
        fi

  lint:no-timestamptz:
    desc: "Reject new TIMESTAMPTZ/TIMESTAMP columns in post-gfo6 migrations (INV-TS-1)"
    cmds:
      - |
        set -euo pipefail
        # Historic migrations (those landing before holomush-gfo6) legitimately
        # contain TIMESTAMPTZ literals — both the pre-conversion baseline and
        # each Phase N ALTER COLUMN ... TYPE BIGINT USING ... migration. Only
        # catch NEW migrations adding TIMESTAMPTZ columns post-cutoff.
        # Escape hatch: append "-- pgnanos-exempt: <reason>" on the same line.
        host_cutoff=$(cat internal/store/migrations/.gfo6-cutoff 2>/dev/null || echo "000000")

        violations=0
        for f in internal/store/migrations/*.up.sql; do
          num=$(basename "$f" | rg -o "^[0-9]+")
          if [[ "$num" > "$host_cutoff" ]]; then
            if rg -n "TIMESTAMPTZ|TIMESTAMP WITH TIME ZONE|\bTIMESTAMP\b" "$f" | rg -v "pgnanos-exempt:" ; then
              violations=$((violations + 1))
            fi
          fi
        done
        for f in plugins/*/migrations/*.up.sql; do
          num=$(basename "$f" | rg -o "^[0-9]+")
          dir=$(dirname "$f")
          this_cutoff=$(cat "$dir/.gfo6-cutoff" 2>/dev/null || echo "000000")
          if [[ "$num" > "$this_cutoff" ]]; then
            if rg -n "TIMESTAMPTZ|TIMESTAMP WITH TIME ZONE|\bTIMESTAMP\b" "$f" | rg -v "pgnanos-exempt:" ; then
              violations=$((violations + 1))
            fi
          fi
        done
        if [[ "$violations" -gt 0 ]]; then
          echo "FAIL: $violations TIMESTAMPTZ/TIMESTAMP violations in post-gfo6 migrations. Use BIGINT (epoch ns)."
          echo "If unavoidable, annotate with '-- pgnanos-exempt: <reason>' on the same line."
          exit 1
        fi

  # ──────────────────────────────────────────
  # Formatters (called by `task fmt`)
  # ──────────────────────────────────────────

  fmt:go:
    desc: Format Go code
    cmds:
      - "{{.GO_TOOL}} gofumpt -w ."

  fmt:markdown:
    desc: Format Markdown files
    cmds:
      - rumdl fmt --exclude 'site,.git,.beads,.serena,.claude' .
      - rumdl fmt --config site/.rumdl.toml site/

  fmt:yaml:
    desc: Format YAML files
    cmds:
      - "{{.GO_TOOL_LINT}} yamlfmt ."

  fmt:dprint:
    desc: Format with dprint
    cmds:
      - dprint fmt

  fmt:check:
    desc: Check formatting without modifying
    cmds:
      - dprint check
      - rumdl fmt --check --exclude 'site,.git,.beads,.serena,.claude' .
      - rumdl fmt --check --config site/.rumdl.toml site/
      # gofumpt is run via the same pinned go-tool version as fmt:go, so this
      # gate can never disagree with `task fmt` (no local-vs-CI skew). Lists
      # offending files and fails; `task fmt` fixes them.
      - |
        drift=$({{.GO_TOOL}} gofumpt -l .)
        if [ -n "$drift" ]; then
          echo "gofumpt formatting drift in:" >&2
          echo "$drift" >&2
          echo "Run 'task fmt' to fix." >&2
          exit 1
        fi

  # ──────────────────────────────────────────
  # License headers
  # ──────────────────────────────────────────

  license:check:
    desc: Check SPDX license headers (code + functional markdown)
    cmds:
      - command -v license-eye >/dev/null 2>&1 || go install github.com/apache/skywalking-eyes/cmd/license-eye@{{.LICENSE_EYE_VERSION}}
      - license-eye header check

  license:add:
    desc: Add missing SPDX license headers (code + functional markdown)
    cmds:
      - command -v license-eye >/dev/null 2>&1 || go install github.com/apache/skywalking-eyes/cmd/license-eye@{{.LICENSE_EYE_VERSION}}
      - license-eye header fix

  # ──────────────────────────────────────────
  # PR preparation (mirrors CI Lint job)
  # ──────────────────────────────────────────

  pr-prep:
    desc: Fast pre-push gate (schema/license/lint/fmt/unit/build/bats; no Docker, no concurrency lock). Mandatory before push.
      Use 'pr-prep:full' for int+e2e.
    cmds:
      - cmd: |
          set -euo pipefail
          # Delegate to the full lane BEFORE any fast-lane result-path setup,
          # so a force-full run never prints a stale 'pr-prep result:' path
          # that the fast lane won't write (the full lane emits its own).
          if [ "${HOLOMUSH_PR_PREP_FORCE_FULL:-}" = "1" ]; then
            exec task pr-prep:full
          fi
          LOCK_DIR="${TMPDIR:-/tmp}/holomush-pr-prep"
          RUN_DIR="$LOCK_DIR/runs"
          mkdir -p "$RUN_DIR"
          RESULT="$RUN_DIR/$(date -u +%Y%m%dT%H%M%SZ)-$$.result"
          printf '▸ pr-prep result: %s\n' "$RESULT"
          write_result() {
            printf 'status=%s\nlane=%s\nexit=%s\nfinished_at=%s\n' \
              "$1" "$2" "$3" "$(date -u +%FT%TZ)" > "$RESULT"
          }
          timeout 5 git fetch -q origin main 2>/dev/null || true
          CHANGED=$(timeout 5 git diff --name-only origin/main...HEAD 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            DOCS_REGEX=$(bash scripts/docs-paths-regex.sh)
            if ! printf '%s\n' "$CHANGED" | grep -vE "$DOCS_REGEX" >/dev/null; then
              echo "▸ docs-only diff detected; running pr-prep:docs"
              drc=0; task pr-prep:docs || drc=$?
              if [ "$drc" -eq 0 ]; then write_result pass docs 0; else write_result fail docs "$drc"; fi
              exit "$drc"
            fi
          fi
          rc=0; task pr-prep:fast:run || rc=$?
          if [ "$rc" -eq 0 ]; then write_result pass fast 0; else write_result fail fast "$rc"; fi
          exit "$rc"

  pr-prep:fast:run:
    desc: Inner body of the fast lane (no result file; called by pr-prep).
    cmds:
      - echo "▸ Running bats shell tests..."
      - task: test:bats
      - echo "▸ Verifying schema is current..."
      - cmd: |
          SCHEMA=schemas/plugin.schema.json
          BEFORE=$(sha256sum "$SCHEMA" | cut -d' ' -f1)
          go generate ./internal/plugin/
          AFTER=$(sha256sum "$SCHEMA" | cut -d' ' -f1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "ERROR: Schema out of sync with Go types. Run 'task generate:schema' and commit."
            exit 1
          fi
      - echo "▸ Checking license headers..."
      - task: license:check
      - echo "▸ Building binary plugins..."
      - task: plugin:build-all
      - echo "▸ Running linters..."
      - task: lint
      - echo "▸ Checking formatting..."
      - task: fmt:check
      - echo "▸ Running unit tests..."
      - task: test
      - echo "▸ Building..."
      - task: build
      - echo "✓ Fast PR checks passed (run 'task pr-prep:full' for integration + E2E)."

  pr-prep:full:
    desc: Run all CI checks locally before pushing (mirrors ALL CI jobs) [serialized via flock; auto-selects docs lane on
      docs-only diffs]
    preconditions:
      - sh: command -v flock >/dev/null 2>&1
        msg: "flock(1) is required. Install with 'brew install flock' (macOS) or 'apt install util-linux' (Linux)."
    cmds:
      - cmd: |
          set -euo pipefail

          # ─────────────────────────────────────────────────────────────
          # Result artifact (spec I-11). go-task collapses every non-zero
          # exit to 201, so callers cannot tell lock-contention from a real
          # gate failure by exit code — each run writes a machine-readable
          # result file and prints its path; automation reads that instead
          # of grepping stdout (which trips on pr-prep-lock.bats' own
          # "another pr-prep is running" assertion string).
          # ─────────────────────────────────────────────────────────────
          LOCK_DIR="${TMPDIR:-/tmp}/holomush-pr-prep"
          RUN_DIR="$LOCK_DIR/runs"
          mkdir -p "$RUN_DIR"
          RESULT="$RUN_DIR/$(date -u +%Y%m%dT%H%M%SZ)-$$.result"
          printf '▸ pr-prep result: %s\n' "$RESULT"
          write_result() {
            printf 'status=%s\nlane=%s\nexit=%s\nfinished_at=%s\n' \
              "$1" "$2" "$3" "$(date -u +%FT%TZ)" > "$RESULT"
          }

          # ─────────────────────────────────────────────────────────────
          # Docs-only detection. MUST live in this same `- cmd:` block as
          # the flock body below — go-task spawns each `- cmd:` in its own
          # subshell, so the `exit` short-circuit only works within this shell.
          # Spec §4.3.1.
          # ─────────────────────────────────────────────────────────────
          if [ "${HOLOMUSH_PR_PREP_FORCE_FULL:-}" != "1" ]; then
            timeout 5 git fetch -q origin main 2>/dev/null || true
            CHANGED=$(timeout 5 git diff --name-only origin/main...HEAD 2>/dev/null || true)
            if [ -n "$CHANGED" ]; then
              DOCS_REGEX=$(bash scripts/docs-paths-regex.sh)
              if ! printf '%s\n' "$CHANGED" | grep -vE "$DOCS_REGEX" >/dev/null; then
                echo "▸ docs-only diff detected; running pr-prep:docs"
                drc=0
                task pr-prep:docs || drc=$?
                if [ "$drc" -eq 0 ]; then write_result pass docs 0; else write_result fail docs "$drc"; fi
                exit "$drc"
              fi
            fi
          fi

          LOCK="$LOCK_DIR/lock"
          INFO="$LOCK_DIR/info"
          rc=0
          flock -n -E 75 "$LOCK" sh -c '
            export HOLOMUSH_PR_PREP_BYPASS_LOCK=1
            printf "pid=%s\nworkspace=%s\nstarted_at=%s\n" \
              "$$" "$2" "$(date -u +%FT%TZ)" > "$1"
            exec task pr-prep:run
          ' _ "$INFO" "$PWD" || rc=$?
          if [ "$rc" -eq 75 ]; then
            {
              echo "ERROR: another pr-prep is running on this machine."
              if [ -s "$INFO" ]; then
                echo
                sed 's/^/  /' "$INFO"
              fi
              echo
              echo "  Lock file: $LOCK"
              echo "  Wait for it to finish, or kill the holder PID if wedged."
            } >&2
            write_result contention full 75
            exit 1
          fi
          if [ "$rc" -ne 0 ]; then
            # rc is non-zero and not 75: on a successful lock acquire flock
            # returns the inner lane's exit code, so this is usually a real
            # gate failure (go-task wraps it to 201); it can also be a flock
            # error such as EACCES on the lockfile. Either way: status=fail.
            write_result fail full "$rc"
            echo "ERROR: pr-prep failed (rc=$rc) — a check failed (see output above) or the lock could not be acquired (e.g. flock EACCES)." >&2
            exit "$rc"
          fi
          write_result pass full 0

  pr-prep:run:
    cmds:
      - cmd: |
          if [ "${HOLOMUSH_PR_PREP_BYPASS_LOCK:-}" != "1" ]; then
            echo "ERROR: pr-prep:run is the unlocked inner body of pr-prep." >&2
            echo "       Do NOT invoke it directly — it skips the concurrency lock and" >&2
            echo "       will race with any other pr-prep on this machine." >&2
            echo "       Use 'task pr-prep' instead." >&2
            echo "       To intentionally bypass (e.g. CI, debugging), set" >&2
            echo "       HOLOMUSH_PR_PREP_BYPASS_LOCK=1." >&2
            exit 1
          fi
      - echo "▸ Running bats shell tests..."
      - task: test:bats
      - echo "▸ Verifying schema is current..."
      - cmd: |
          SCHEMA=schemas/plugin.schema.json
          BEFORE=$(sha256sum "$SCHEMA" | cut -d' ' -f1)
          go generate ./internal/plugin/
          AFTER=$(sha256sum "$SCHEMA" | cut -d' ' -f1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "ERROR: Schema out of sync with Go types. Run 'task generate:schema' and commit."
            exit 1
          fi
      - echo "▸ Verifying EBNF + railroad are current..."
      - task: generate:ebnf:check
      - echo "▸ Verifying jxo8.5 bead description (sub-epic B)..."
      - bash scripts/check-bead-jxo8-5.sh
      - echo "▸ Checking license headers..."
      - task: license:check
      - echo "▸ Building binary plugins..."
      - task: plugin:build-all
      - echo "▸ Running linters..."
      - task: lint
      - echo "▸ Checking formatting..."
      - task: fmt:check
      - echo "▸ Running unit tests..."
      - task: test
      - echo "▸ Running integration tests..."
      - task: test:int
      - echo "▸ Running E2E tests..."
      - task: test:e2e
      - echo "✓ All PR checks passed."

  pr-prep:docs:
    desc: Docs-only fast lane (auto-selected by pr-prep on docs-only diffs; also run by ci-docs-skip.yaml's Lint job so docs
      PRs are linted in CI — holomush-3zrvh).
    cmds:
      - echo "▸ Running docs-only fast lane"
      - task: lint:markdown
      - task: lint:yaml
      - task: lint:docs-symmetry
      - task: lint:adr
      - task: fmt:check
      - task: license:check
      - task: lint:docs-paths-sync
      - echo "✓ Docs lane passed."

  # ──────────────────────────────────────────
  # Setup (run once)
  # ──────────────────────────────────────────

  setup:
    desc: Install all dev tools
    cmds:
      # golangci-lint, actionlint, yamlfmt, gotestsum, gofumpt are pinned in
      # the go.tool*.mod modules and run via `go tool` (see GO_TOOL vars) — no
      # brew install needed. yq stays: shell scripts call it on PATH directly.
      - brew install go-task goreleaser dprint cocogitto rumdl binaryen flock bats-core yq
      - brew install steveyegge/beads/bd
      - go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
      - go install github.com/apache/skywalking-eyes/cmd/license-eye@{{.LICENSE_EYE_VERSION}}
      - bd hooks install --chain
      - echo "✓ Dev environment ready. Run 'task dev' to start."

  deps:
    desc: Download and tidy Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  workspace:new:
    desc: |
      Create a fresh jj workspace at <repo-parent>/.worktrees/<name>, fetching
      main@origin first so it's current. Idempotent: if the workspace already
      exists, prints its absolute path and exits 0. Works from any cwd inside
      the repo or any worktree.

      Usage: task workspace:new -- <name>
    cmds:
      - |
        set -euo pipefail
        WS_ROOT="$(jj workspace root)"   # fail-fast if not in a jj repo
        # The helper resolves .jj/repo from cwd, so we must cd to WS_ROOT first
        # before sourcing — otherwise the task fails when invoked from any
        # subdirectory of the workspace (e.g., from internal/, scripts/, etc).
        cd "$WS_ROOT"
        # shellcheck source=scripts/jj-main-repo.sh
        . "$WS_ROOT/scripts/jj-main-repo.sh"

        NAME="{{.CLI_ARGS}}"
        [ -n "$NAME" ] || { echo "ERROR: usage: task workspace:new -- <name>" >&2; exit 1; }
        # Validate name: single token, no path separators or relative parts,
        # so $NAME can't escape $WORKTREES via "../foo" or "/abs/foo".
        case "$NAME" in
          *[!A-Za-z0-9._-]*|.|..|*..*|*/*) echo "ERROR: name must match [A-Za-z0-9._-]+ (no slashes, no '..')" >&2; exit 1 ;;
        esac

        TARGET="$WORKTREES/$NAME"

        # Create the workspace if it doesn't exist. The redirect-file step
        # below runs unconditionally so older workspaces self-heal when
        # task workspace:new is re-invoked for them.
        if [ ! -d "$TARGET" ]; then
          jj git fetch >&2
          jj workspace add "$TARGET" --name "$NAME" -r main@origin >&2
        fi

        # Point bd at the main repo's .beads/. Each jj workspace
        # materialises an empty .beads/ (only tracked config + .gitignore;
        # the Dolt DB lives in the main repo's .beads/dolt/), so bd run
        # from the workspace would fail with "no beads database found".
        # `.beads/redirect` is bd's documented per-worktree override and
        # is already in .beads/.gitignore, so it never gets committed
        # (holomush-k98d). Don't overwrite an existing redirect — a user
        # may have repointed it at a federation peer or alternate DB.
        mkdir -p "$TARGET/.beads"
        if [ ! -f "$TARGET/.beads/redirect" ]; then
          printf '%s\n' "$MAIN_REPO/.beads" > "$TARGET/.beads/redirect"
        fi

        echo "$TARGET"

  # ──────────────────────────────────────────
  # Database migrations
  # ──────────────────────────────────────────

  migrate:up:
    desc: Apply all pending migrations
    cmds:
      - go run {{.MAIN_PKG}} migrate up

  migrate:down:
    desc: Rollback one migration
    cmds:
      - go run {{.MAIN_PKG}} migrate down

  migrate:status:
    desc: Show migration status
    cmds:
      - go run {{.MAIN_PKG}} migrate status

  migrate:create:
    desc: 'Create a new migration (usage: task migrate:create -- name)'
    cmds:
      - migrate create -ext sql -dir {{.MIGRATIONS_DIR}} -seq {{.CLI_ARGS}}
    preconditions:
      - sh: command -v migrate
        msg: "migrate CLI not found. Install with: go install -tags 'pgx5' github.com/golang-migrate/migrate/v4/cmd/migrate@latest"

  migrate:force:
    desc: 'Force set migration version (usage: task migrate:force -- VERSION)'
    cmds:
      - go run {{.MAIN_PKG}} migrate force {{.CLI_ARGS}}

  migrate:plugin-actors-cutover:
    desc: One-time cutover for holomush-w9ml (TRUNCATE events_audit + JS PurgeStream)
    cmds:
      - go run ./cmd/holomush-cutover

  # ──────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────

  release:check:
    desc: Validate goreleaser config
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Build snapshot locally (no publish)
    cmds:
      - goreleaser build --snapshot --clean --single-target

  release:cut:
    desc: "Cut a release via GitHub Actions (cog derives version + tag). Args: increment=auto|major|minor|patch"
    cmds:
      - gh workflow run release.yaml -f expected_increment={{.increment | default "auto"}}

  release:deploy:
    desc: "Deploy a released tag to the sandbox. Required: tag=vX.Y.Z"
    preconditions:
      - sh: 'printf "%s" "{{.tag}}" | grep -qE "^v[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "tag must be a v-prefixed semver, e.g. task release:deploy tag=v0.2.0"
    cmds:
      - gh workflow run deploy.yaml -f tag={{.tag}}

  # ──────────────────────────────────────────
  # Documentation site
  # ──────────────────────────────────────────

  docs:setup:
    desc: Set up documentation dev environment
    dir: site
    cmds:
      - bun install # fallback order bun → pnpm → npm per ADR holomush-qf2oo

  docs:gen-events:
    desc: "Regenerate site/docs/reference/events/<plugin>.md from plugin manifests"
    cmds:
      - ./scripts/gen-event-docs.sh
    sources:
      - scripts/gen-event-docs.sh
      - plugins/*/plugin.yaml
    generates:
      - site/docs/reference/events/*.md
      - site/docs/reference/events.md

  docs:build:
    desc: Build documentation site
    deps: ['docs:gen-events']
    dir: site
    cmds:
      - bunx astro build

  docs:serve:
    desc: Start documentation dev server
    dir: site
    cmds:
      - bunx astro dev

  docs:proto:
    desc: Generate gRPC API reference from proto files
    vars:
      PROTOC_INCLUDE:
        sh: echo "$(dirname $(which protoc) 2>/dev/null)/../include" 2>/dev/null || echo "/usr/local/include"
    cmds:
      - >-
        protoc --doc_out=site/docs/reference --doc_opt=markdown,grpc-api.md --proto_path=api/proto --proto_path={{.PROTOC_INCLUDE}}
        api/proto/holomush/core/v1/core.proto api/proto/holomush/web/v1/web.proto api/proto/holomush/control/v1/control.proto
        api/proto/holomush/plugin/v1/plugin.proto api/proto/holomush/plugin/v1/hostfunc.proto
      # Fix well-known type links to point to official protobuf docs (handles any google.protobuf.* type)
      - >-
        perl -pi -e 's|\[google\.protobuf\.([A-Za-z]+)\]\(#google-protobuf-[A-Za-z]+\)|"[google.protobuf.$1](https://protobuf.dev/reference/protobuf/google.protobuf/#"
        . lc($1) . ")"|ge' site/docs/reference/grpc-api.md
    sources:
      - api/proto/holomush/*/v1/*.proto
    generates:
      - site/docs/reference/grpc-api.md

  # ──────────────────────────────────────────
  # Cleanup
  # ──────────────────────────────────────────

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/
      - rm -rf build/
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html
      - rm -rf web/build
      - rm -rf internal/web/dist
