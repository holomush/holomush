codecov:
  notify:
    # Wait for coverage uploads to merge before posting status checks and
    # PR comments. Without this, codecov evaluates on the first upload
    # (unit only) and reports a stale failure even if integration/e2e
    # uploads would push the patch above target.
    #
    # We upload three coverage files (unit, integration via flag, e2e via
    # flag) but codecov de-duplicates to two sessions — the unflagged unit
    # session and one merged flagged session covering integration+e2e.
    # Setting after_n_builds: 2 matches that session count; 3 would block
    # codecov from ever notifying.
    #
    # Note: per-status-target after_n_builds is rejected by codecov's
    # validator as an unknown field — the top-level codecov.notify.* is
    # the only supported location.
    after_n_builds: 2
    wait_for_ci: true

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

ignore:
  # Generated protobuf Go code (buf generate). Use the global glob so
  # internal-module .pb.go files (e.g. internal/eventbus/cursor/cursorv1/)
  # are also excluded — not just pkg/proto/.
  - "**/*.pb.go"
  - "pkg/proto/**"
  # Generated ConnectRPC TypeScript clients (buf generate)
  - "web/src/lib/connect/**"
  # Embedded SvelteKit production build (task web:embed)
  - "internal/web/dist/**"
  # Test helpers and mocks
  - "**/*_test.go"
  - "**/mocks/**"
  - "**/mock_*.go"
  # Binary plugin entry points — go-plugin runs these in a subprocess
  # so coverage instrumentation in the test process cannot observe them.
  # E2E tests exercise them end-to-end but the coverage doesn't flow
  # back across the process boundary.
  - "plugins/*/main.go"
  # The holomush server's runCoreWithDeps is production-only wiring.
  # E2E tests boot the binary and exercise it end-to-end, but the unit
  # coverage profile doesn't see init-path statements (orchestrator
  # wiring, subsystem registration). Same rationale as plugins/*/main.go.
  - "cmd/holomush/core.go"
  # The gRPC/history subsystem wiring (history-auth-guard, FallbackResolver,
  # PluginDowngradeFence assembly). Same production-only-wiring class as
  # core.go above — E2E boots and exercises it, but the unit coverage profile
  # can't see the construction-failure WarnContext branches. (holomush-hz0v4.14.26)
  - "cmd/holomush/sub_grpc.go"
  # Metric stub hooks — intentionally unused no-op call-site anchors
  # awaiting future instrumentation. They exist so future metric wiring
  # has a stable call site; there is no behavior to test.
  - "plugins/*/metrics.go"
  # Prometheus instrument constructors — pure declarative wiring; the
  # logic worth testing lives in the methods that READ from these
  # instruments (and is exercised via the carrying subsystem's tests).
  # Same rationale as plugins/*/metrics.go.
  - "internal/cluster/metrics.go"
  - "internal/eventbus/crypto/invalidation/metrics.go"
  # Test harnesses — non-_test.go files whose sole purpose is to
  # support tests in other packages. Same intent as **/mocks/**, but
  # under a directory name (clustertest, eventbustest) rather than a
  # filename suffix.
  - "internal/cluster/clustertest/**"
  - "internal/eventbus/eventbustest/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true
