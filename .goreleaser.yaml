# goreleaser configuration
# https://goreleaser.com

version: 2

project_name: holomush

before:
  hooks:
    - go mod tidy
    # Compile the binary plugins (host + linux amd64/arm64) into build/plugins/.
    # The Dockerfile COPYs build/plugins/ (see dockers.extra_files below); the
    # plugin loader resolves the right per-arch binary at runtime. Running it as
    # a goreleaser before-hook means `task release:snapshot` and the real
    # release both produce the plugins identically.
    - task plugin:build-all

builds:
  - id: holomush
    main: ./cmd/holomush
    binary: holomush
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # -tags realweb selects internal/web/static_realweb.go which embeds
    # the real SvelteKit bundle from internal/web/dist/. The release
    # workflow (release.yaml) populates dist/ via `task web:embed`
    # before invoking goreleaser; without the tag we would ship a binary
    # embedding only the internal/web/placeholder/ stub.
    flags:
      - -tags=realweb
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# SBOM generation - separate entries for each format (syft generates one format per run)
sboms:
  - id: binary-sbom-cyclonedx
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.cyclonedx.json"
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

  - id: binary-sbom-spdx
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.spdx.json"
    args: ["$artifact", "--output", "spdx-json=$document"]

  - id: source-sbom-cyclonedx
    artifacts: source
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_source.sbom.cyclonedx.json"
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

  - id: source-sbom-spdx
    artifacts: source
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_source.sbom.spdx.json"
    args: ["$artifact", "--output", "spdx-json=$document"]

# Keyless signing with Cosign (uses GitHub Actions OIDC)
# Signing happens BEFORE release publication - artifacts are never published unsigned
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    # cosign v3 consolidates the separate signature + certificate files into a
    # single sigstore bundle (.sigstore.json) via --bundle. See
    # https://goreleaser.com/blog/cosign-v3. The verify-release job consumes
    # this bundle with `cosign verify-blob --bundle`.
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

# Sign container images with Cosign keyless signing
docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "${artifact}"
      - "--yes"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

dockers:
  - image_templates:
      - "ghcr.io/holomush/holomush:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    # The Dockerfile COPYs plugins/ (Lua + manifests) and build/plugins/
    # (compiled binary plugins, all arches). goreleaser's docker build context
    # is a temp dir containing only the binary + Dockerfile, so these must be
    # listed as extra_files to land in the context.
    extra_files:
      - plugins
      - build/plugins

  - image_templates:
      - "ghcr.io/holomush/holomush:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    dockerfile: Dockerfile
    goos: linux
    goarch: arm64
    extra_files:
      - plugins
      - build/plugins

docker_manifests:
  - name_template: "ghcr.io/holomush/holomush:{{ .Version }}"
    image_templates:
      - "ghcr.io/holomush/holomush:{{ .Version }}-amd64"
      - "ghcr.io/holomush/holomush:{{ .Version }}-arm64"

  - name_template: "ghcr.io/holomush/holomush:latest"
    image_templates:
      - "ghcr.io/holomush/holomush:{{ .Version }}-amd64"
      - "ghcr.io/holomush/holomush:{{ .Version }}-arm64"

release:
  github:
    owner: holomush
    name: holomush
  draft: false
  prerelease: auto
  # The release workflow creates the v* tag LOCALLY (cog bump --disable-bump-commit)
  # and does NOT push it before running goreleaser. target_commitish tells the
  # GitHub Releases API which commit to create the tag from, so goreleaser creates
  # the remote tag as part of publishing the Release — atomically. Without this,
  # `goreleaser release` against a local-only tag fails at the API call. See spec
  # INV-8 and https://goreleaser.com/customization/release/.
  target_commitish: "{{ .Commit }}"
