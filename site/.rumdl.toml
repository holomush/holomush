# rumdl configuration for documentation site (Starlight)
# Extends root rules with Starlight-specific adjustments
#
# NOTE: MD040 (fenced-code-language) and MD041 (first-line-h1) are enabled by
# default in rumdl. All rules are enabled unless explicitly disabled below.

[global]
flavor = "commonmark"

disable = [
  "MD013", # Line length - disabled for prose
  "MD030", # List marker spacing (needed for MkDocs grid cards)
  "MD033", # Inline HTML
  "MD034", # Bare URLs
  "MD036", # Emphasis as pseudo-headings
  "MD044", # Proper names capitalization (too noisy)
  "MD057", # Relative link validation (TODO: re-enable after fixing broken links)
  "MD060", # Table column alignment
]

exclude = [
  ".git",
  "node_modules",
  "dist",
  # grpc-api.md is generated by `task docs:proto` (protoc-gen-doc); not hand-linted.
  # rumdl resolves exclude paths relative to its cwd, which differs by platform:
  # config-dir-relative locally (macOS), repo-root-relative in CI (linux). Both
  # forms are listed so the exclude matches in either environment (holomush-cwnu0).
  "src/content/docs/reference/grpc-api.md",
  "site/src/content/docs/reference/grpc-api.md",
]

respect-gitignore = true

[MD029]
style = "ordered"

[MD026]
punctuation = ".,;:!。，；：！"

[MD048]
style = "backtick"
