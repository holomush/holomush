#
# E2E test overlay. Adds a Playwright container that runs tests against
# the gateway over the internal Docker network — no host port mapping needed.
#
# Usage: task test:e2e

services:
  postgres:
    environment:
      POSTGRES_DB: holomush_test

  core:
    command: ["core", "--log-format", "text", "--grpc-addr", "0.0.0.0:9000", "--metrics-addr", "0.0.0.0:9100", "--auto-gen-kek"]
    environment:
      DATABASE_URL: postgres://holomush:holomush@postgres:5432/holomush_test?sslmode=disable
      # KEK is required to boot. --auto-gen-kek mints a fresh ephemeral keyfile
      # each E2E run (the container is recreated); a fixed test passphrase is
      # sufficient because the keyfile does not leave the container.
      HOLOMUSH_KEK_FILE: /home/holomush/.config/holomush/certs/master.key.enc
      HOLOMUSH_KEK_PASSPHRASE: e2e-test-passphrase
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/healthz/readiness || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  gateway:
    ports: !reset []
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948
    working_dir: /work
    volumes:
      - ./web:/work
    environment:
      PLAYWRIGHT_BASE_URL: http://gateway:8080
      E2E_DATABASE_URL: postgres://holomush:holomush@postgres:5432/holomush_test?sslmode=disable
    networks:
      - frontend
      - backend
    depends_on:
      gateway:
        condition: service_healthy
    profiles: ["test"]
