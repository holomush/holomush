name: core-help
version: 1.0.0
type: lua
load_priority: -1000
events: []
lua-plugin:
  entry: main.lua
commands:
  - name: help
    capabilities: []
    help: "Display help for commands"
    usage: "help [command|search <term>]"
    helpText: |-
      ## Help

      Display help information about available commands.

      ### Usage

      - `help` - List all available commands
      - `help <command>` - Show detailed help for a specific command
      - `help search <term>` - Search commands by keyword

      ### Examples

      - `help` - Lists all commands you can use
      - `help say` - Shows detailed help for the say command
      - `help search build` - Finds commands related to building

policies:
  - name: execute-help
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { resource.command.name == "help" };
