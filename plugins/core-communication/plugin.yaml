name: core-communication
version: 1.0.0
type: lua
lua-plugin:
  entry: main.lua
requires:
  - capability: session
emits: [location, character]
history_scope: grid
actor_kinds_claimable: [plugin, character]
commands:
  - name: say
    aliases:
      - '"'
    capabilities:
      - action: emit
        resource: stream
        scope: local
    help: "Say something to the location"
    usage: "say <message>"
    helpText: |
      ## Say

      Say something aloud to everyone in your current location.

      ### Usage

      - `say <message>` - Speak the message aloud

      ### Examples

      - `say Hello, everyone!`
      - `say How are you?`

  - name: pose
    aliases:
      - ":"
      - ";"
    capabilities:
      - action: emit
        resource: stream
        scope: local
    help: "Perform an action"
    usage: "pose <action>"
    helpText: |
      ## Pose

      Describe an action your character performs, visible to everyone in your
      current location.

      ### Usage

      - `pose <action>` - Perform the action
      - `:<action>` - Shorthand for pose

      ### Examples

      - `pose waves hello` - Shows "CharName waves hello"
      - `:waves hello` - Same as above

  - name: page
    aliases:
      - "p"
    capabilities:
      - action: emit
        resource: stream
        scope: local
    help: "Send a private message"
    usage: "page <name>=<message>"
    helpText: |
      ## Page

      Send an OOC private message to another connected character.

      ### Usage

      - `page <name>=<message>` - Send a private message
      - `page <message>` - Page your last-paged character
      - `page <name>=:<action>` - Pose-page (shows "From afar, ...")
      - `page <name>=;<action>` - No-space pose-page

      ### Examples

      - `page Alex=Hey, are you around?`
      - `page How's it going?` - Pages last-paged character
      - `page Alex=:waves hello.` - Pose-page

  - name: whisper
    aliases:
      - "w"
    capabilities:
      - action: emit
        resource: stream
        scope: local
    help: "Whisper to someone in your location"
    usage: "whisper <name>=<message>"
    helpText: |
      ## Whisper

      Send a private message to someone in the same location. Others see
      that you whispered but not the content.

      ### Usage

      - `whisper <name>=<message>` - Whisper to someone
      - `whisper <name>=:<action>` - Whisper-pose
      - `whisper <name>=;<action>` - No-space whisper-pose

      ### Examples

      - `whisper Alex=Let's get out of here`
      - `whisper Alex=:nods meaningfully.`

  - name: ooc
    help: "Say or pose something out of character"
    usage: "ooc <message>"
    helpText: |
      ## OOC

      Speak out of character to everyone in your current location.

      ### Usage

      - `ooc <message>` - Say something OOC
      - `ooc :<action>` - Pose something OOC
      - `ooc ;<action>` - Semipose something OOC

      ### Examples

      - `ooc brb` - [OOC] Sean says, "brb"
      - `ooc :laughs` - [OOC] Sean laughs
      - `ooc ;'s phone rings` - [OOC] Sean's phone rings

  - name: pemit
    capabilities:
      - action: emit
        resource: stream
        scope: global
    help: "Send a private narration to a specific character"
    usage: "pemit <character>=<message>"
    helpText: |
      ## Pemit

      Send a private narration to a specific character. Used by GMs and
      storytellers to describe what only one character sees or experiences.

      ### Usage

      - `pemit <character>=<message>` - Send private narration to character

      ### Examples

      - `pemit Sean=You feel a chill run down your spine.`
      - `pemit Alex=A figure in the shadows beckons to you.`

      ### Notes

      - Does not require sender and target to be in the same location
      - Target sees the raw message with no prefix
      - Sender receives a confirmation message

      ### Permissions

      Requires emit access to the stream resource at global scope.

  - name: emit
    capabilities:
      - action: emit
        resource: stream
        scope: local
    help: "Emit a message to the location"
    usage: "emit <message>"
    helpText: |
      ## Emit

      Emit arbitrary text to everyone in your current location.
      Unlike say or pose, the text appears exactly as typed with
      no character name prefix.

      ### Usage

      - `emit <message>` - Emit the message

      ### Examples

      - `emit The ground shakes violently.`
      - `emit A cold wind blows through the room.`

  - name: wall
    capabilities:
      - action: emit
        resource: stream
        scope: global
    help: "Broadcast a message to all players"
    usage: "wall [urgency] <message>"
    helpText: |-
      ## Wall

      Send a broadcast message to all connected players.

      ### Usage

      - `wall <message>` - Send an info-level announcement
      - `wall info <message>` - Same as above (explicit)
      - `wall warning <message>` - Send a warning message
      - `wall critical <message>` - Send a critical alert

      ### Urgency Levels

      - `info` - Normal announcements (default)
      - `warning` - Important notices
      - `critical` - Urgent alerts

      ### Examples

      - `wall Server restart in 10 minutes`
      - `wall warning Database maintenance starting soon`

      ### Permissions

      Requires emit access to the stream resource at global scope.

policies:
  - name: execute-communication
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { resource.command.name in ["say", "pose",
      "page", "whisper", "emit", "ooc", "wall"] };
  - name: execute-pemit
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { principal.character.roles.containsAny(["storyteller",
      "admin"]) && resource.command.name == "pemit" };

verbs:
  - type: core-communication:say
    category: communication
    format: speech
    label: says
    display_target: terminal
  - type: core-communication:pose
    category: communication
    format: action
    display_target: terminal
  - type: core-communication:page
    category: communication
    format: speech
    label: pages
    display_target: terminal
  - type: core-communication:whisper
    category: communication
    format: speech
    label: whispers
    display_target: terminal
  - type: core-communication:whisper_notice
    category: communication
    format: action
    display_target: terminal
  - type: core-communication:ooc
    category: communication
    format: action
    display_target: terminal
  - type: core-communication:emit
    category: communication
    format: action
    display_target: terminal
  - type: core-communication:pemit
    category: command
    format: narrative
    display_target: terminal

crypto:
  emits:
    - event_type: say
      sensitivity: never
      description: "Speech in the current location, visible to everyone present."
    - event_type: pose
      sensitivity: never
      description: "Action description in the current location."
    - event_type: ooc
      sensitivity: never
      description: "Out-of-character speech in the current location."
    - event_type: emit
      sensitivity: never
      description: "Generic emit to the current location."
    # event_type is the BARE verb. The host fence (LookupEmitSensitivity)
    # composes this plugin's own "<name>:" prefix onto the bare entry when
    # matching the emitted wire type, so a plugin that emits plugin-qualified
    # wire types (core-communication:page) still resolves to this bare entry.
    # (Other consumers differ: another plugin's requests_decryption names this
    # event with a fully-qualified "<plugin>:<verb>" ref matched by equality.)
    # See holomush-50zqs.
    - event_type: page
      sensitivity: always
      description: "OOC private message between two characters; participants only."
    - event_type: whisper
      sensitivity: always
      description: "In-character private message between two characters in the same location."
    - event_type: pemit
      sensitivity: always
      description: "Storyteller-issued private narration to a single character."
    - event_type: whisper_notice
      sensitivity: never
      description: "Public notice that a whisper occurred (no content), visible in the location."
