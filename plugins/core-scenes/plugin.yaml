name: core-scenes
version: 1.0.0
type: binary
resource_types: [scene]

requires:
  - holomush.world.v1.WorldService
  # Host capabilities core-scenes invokes through its SDK clients (eykuh.3
  # least-privilege). The host capability interceptor default-denies any
  # host.v1 capability a manifest does not declare, so each client call below
  # must have a matching declaration. `emit` is self-gated by the emit fence
  # (declarationExemptCapabilities) and is intentionally NOT declared here.
  - capability: focus # FocusService: JoinFocus/AutoFocusOnJoin/... (commands.go)
    access: write
  - capability: eval # EvalService.Evaluate — admin-gated scene commands
    access: read
  - capability: settings # SettingsService.GetSetting — content-warning taxonomy
    access: read
  - capability: stream.history # StreamHistoryService.QueryStreamHistory
    access: read
  - capability: audit # AuditService.DecryptOwnAuditRows — publish/export snapshot read-back
    access: read

provides:
  - holomush.scene.v1.SceneService
  - holomush.plugin.v1.PluginAuditService
emits: [scene]
history_scope: scene
actor_kinds_claimable: [plugin, character]

# Runtime config (plugin-owned, opaque to the host). The host validates the
# generic types + merges any server override over these defaults; core-scenes
# decodes them via pluginsdk.DecodeConfig at Init. See holomush-yzt86.
config:
  vote_window:
    type: duration
    default: 168h
    description: "How long a publish-vote attempt collects votes before timeout."
  cooloff_window:
    type: duration
    default: 30m
    description: "Delay between unanimous-yes resolution and PUBLISHED."
  scheduler_interval:
    type: duration
    default: 30s
    description: "How often the publish scheduler sweeps for expired attempts."

# Audit ownership (F5): core-scenes owns all events.*.scene.> subjects.
# The host audit projection ack-and-skips these; deliveries are forwarded
# to this plugin's PluginAuditService.AuditEvent RPC, which persists into
# plugin_core_scenes.scene_log. QueryHistory for scene subjects routes to
# this plugin's PluginAuditService.QueryHistory.
audit:
  - subjects: ["events.*.scene.>"]
    schema: plugin_core_scenes
    table: scene_log
# Note: holomush.plugin.v1.AttributeResolverService is intentionally NOT
# declared in provides. The host auto-registers it via the plugin's
# RegisterAttributeResolver method (AttributeResolverProvider interface),
# and the per-plugin attribute resolver client is accessed via
# host.AttributeResolverClient(<plugin name>) — not via the service registry.
# Declaring it in provides causes a SERVICE_ALREADY_REGISTERED conflict
# with any other plugin (e.g. test-abac-widget) that also provides it,
# because the registry treats service names as singletons.

actions:
  # Public board discovery (Task iokti.14): a DISTINCT browse action on the
  # scene resource, deliberately separate from the membership-gated "read" so
  # the open-board grant cannot widen `scene info`. MUST be declared here so
  # CollectActions admits it to knownActions during plugin load — the `scenes`
  # board command capability and the browse-open-scenes-board policy use it.
  - browse
  - extend_publish_attempts

storage: postgres

verbs:
  # IC content types (sensitivity: always per crypto.emits)
  - type: core-scenes:scene_pose
    category: communication
    format: action
    display_target: terminal
  - type: core-scenes:scene_say
    category: communication
    format: speech
    label: says
    display_target: terminal
  - type: core-scenes:scene_emit
    category: communication
    format: action
    display_target: terminal
  - type: core-scenes:scene_ooc
    category: communication
    format: action
    display_target: terminal

  # Notice types (sensitivity: never per crypto.emits)
  - type: core-scenes:scene_join_ic
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_leave_ic
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_pose_order_changed_ic
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_idle_nudge
    category: system
    format: notification
    display_target: terminal

  # Publication notice types (sensitivity: never per crypto.emits)
  - type: core-scenes:scene_publish_started
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_publish_vote_cast
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_publish_cooloff_started
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_publish_resolved
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_publish_withdrawn
    category: system
    format: notification
    display_target: terminal
  - type: core-scenes:scene_publish_vote_attempts_extended
    category: system
    format: notification
    display_target: terminal

crypto:
  emits:
    # Content events (sensitivity: always) — participant-only IC/OOC RP
    # content. Privacy boundary is the participant list per INV-SCENE-60, NOT
    # the location. Analog to whisper/page in core-communication, not
    # to say/pose (which are location-bounded). See ADR holomush-sb3n.
    - event_type: scene_pose
      sensitivity: always
      readback: true
      description: "IC pose by a scene participant; visible to all participants in the scene's IC stream."
    - event_type: scene_say
      sensitivity: always
      readback: true
      description: "IC speech by a scene participant; visible to all participants in the scene's IC stream."
    - event_type: scene_emit
      sensitivity: always
      readback: true
      description: "IC generic emit by a scene participant; visible to all participants in the scene's IC stream."
    - event_type: scene_ooc
      sensitivity: always
      description: "OOC chatter in scene context; participant-only despite never being archived in the published scene log."

    # Notice events (sensitivity: never) — operational metadata, no RP
    # content. Visible to scene participants but plaintext at rest.
    - event_type: scene_join_ic
      sensitivity: never
      description: "Notice that a character joined the scene; name only, no content."
    - event_type: scene_leave_ic
      sensitivity: never
      description: "Notice that a character left or was kicked from the scene; name + reason discriminator, no content."
    - event_type: scene_pose_order_changed_ic
      sensitivity: never
      description: "Notice that the scene owner changed the pose-order mode; mode strings + actor, no content."
    - event_type: scene_idle_nudge
      sensitivity: never
      description: "Notice that the next-up character has been idle past the configured threshold; name + duration, no content.
        Trigger implementation deferred to follow-up bead holomush-fux3."

    # Publish-vote notice events (sensitivity: never) — Phase 6 operational
    # metadata for the publication state machine; no IC content. See spec §7.
    - event_type: scene_publish_started
      sensitivity: never
      description: "Notice that a scene publish-vote attempt has started; emit time + roster, no content."
    - event_type: scene_publish_vote_cast
      sensitivity: never
      description: "Notice that a roster member cast or changed a vote; character + vote + is_change, no content."
    - event_type: scene_publish_cooloff_started
      sensitivity: never
      description: "Notice that all roster members have voted yes and the cool-off window has begun; ends_at timestamp, no
        content."
    - event_type: scene_publish_resolved
      sensitivity: never
      description: "Notice of terminal transition (PUBLISHED or ATTEMPT_FAILED) with outcome + reason + tally summary, no
        IC content."
    - event_type: scene_publish_withdrawn
      sensitivity: never
      description: "Notice that the scene owner withdrew the active publish attempt; emitted alongside scene_publish_resolved."
    - event_type: scene_publish_vote_attempts_extended
      sensitivity: never
      description: "Notice that an admin extended the per-scene publish-attempts budget; new_max + admin_id, no content."

binary-plugin:
  executable: core-scenes

# Focus-routed input (holomush-g1qcw): a scene-focused connection's top-level
# ambient verbs redirect to this plugin's `scene` command, which re-derives the
# exact scene from the connection's focus. The host dispatcher consults this
# generically; it hardcodes no scene knowledge.
focus_redirects:
  - focus_kind: scene
    verbs: [pose, say, ooc, emit]
    target_command: scene

commands:
  - name: scene
    capabilities:
      - action: write
        resource: scene
        scope: local
    help: "Manage RP scenes"
    usage: "scene <subcommand> [args]"
  - name: scenes
    # Layer-2 capability: public board discovery requires no per-resource
    # ownership or membership gate — the board returns only visibility='open'
    # scenes that any character may browse. We use a DISTINCT "browse" action
    # (not "read") so this public-board grant does NOT widen the per-scene
    # "read" action used by `scene info` (which stays membership-gated via
    # read-scene-as-participant). The browse-open-scenes-board policy below
    # permits it; the Layer-2 pre-flight fires on this declared capability.
    capabilities:
      - action: browse
        resource: scene
        scope: global
    help: "Browse the open scene board"
    usage: "scenes [tag:<t>] [hide:<cw>]"

policies:
  # ─── Layer 1: command execution gate ─────────────────────────────────
  # Scenes are registered-player-only (a guest is ephemeral, not a scene
  # participant), so this permit excludes guests: `is_guest == false` is
  # fail-CLOSED — a missing is_guest attribute (guest-lookup unconfigured or
  # erroring) makes the comparison false, so the permit does not fire and the
  # command default-denies. The character namespace carries is_guest because
  # command dispatch evaluates a character: principal, which never resolves the
  # player: namespace (the guest bit is keyed off the character's owning player
  # via the host's PlayerKindLookup). Per holomush-5rh.23 (INV-SCENE-64 enforces
  # the same guest exclusion on the web scene-access facade).
  - name: execute-scene-commands
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { resource.command.name in ["scene",
      "scenes"] && principal.character.is_guest == false };

  # ─── Per-action authorization gates ───────────────────────────────────
  # These policies gate WHO (ownership / participation). Scene STATE validity
  # is enforced by the store/service layer with specific business errors
  # (e.g. ending an already-ended scene yields "Failed to end scene: scene
  # transition forbidden", not a generic authz denial). Keeping state checks
  # out of ABAC policies prevents the gate from intercepting invalid-state
  # operations before the handler can surface a clear message to the player.
  #
  # EXCEPTION: invite-to-scene and kick-from-scene retain their state clauses
  # because the real InviteParticipant / KickParticipant store methods do NOT
  # enforce scene state independently — removing the state clause would allow
  # inviting/kicking on ended/archived scenes with no handler rejection.

  # ─── Owner-only lifecycle operations ──────────────────────────────────
  - name: end-own-scene
    dsl: >-
      permit(principal is character, action in ["end"], resource is scene) when { resource.scene.owner == principal.id };
  - name: pause-own-scene
    dsl: >-
      permit(principal is character, action in ["pause"], resource is scene) when { resource.scene.owner == principal.id };
  - name: update-own-scene
    dsl: >-
      permit(principal is character, action in ["update"], resource is scene) when { resource.scene.owner == principal.id
      };

  # ─── Member-based read/write/resume ───────────────────────────────────
  - name: read-scene-as-participant
    dsl: >-
      permit(principal is character, action in ["read"], resource is scene) when { principal.id in resource.scene.participants
      };
  # State validity for write is enforced implicitly by handleEmit's
  # resolveSingleSceneMembership → ListScenesForCharacter, which filters
  # `state IN ('active','paused')` (ended scenes are invisible to membership
  # inference). If that filter is ever relaxed, re-add a `resource.scene.state`
  # clause here to keep write fail-closed on state.
  - name: write-scene-as-participant
    dsl: >-
      permit(principal is character, action in ["write"], resource is scene) when { principal.id in resource.scene.participants
      };
  - name: resume-scene-as-participant
    dsl: >-
      permit(principal is character, action in ["resume"], resource is scene) when { principal.id in resource.scene.participants
      };

  # ─── Membership operations ────────────────────────────────────────────
  # NOTE: join-open-scene and join-private-scene-as-invitee document the
  # intended join semantics but are NOT consulted by the current command path.
  # Join authorization is enforced substrate-side: classifyJoinMiss in the
  # store layer checks scene state, visibility, and invitation status before
  # admitting a joiner. An engine gate cannot express open-scene admission
  # (which admits non-members by definition). These policies are kept for
  # documentation and future reference if join is ever moved through the engine.
  - name: join-open-scene
    dsl: >-
      permit(principal is character, action in ["join"], resource is scene) when { resource.scene.visibility == "open" &&
      resource.scene.state in ["active", "paused"] };
  - name: join-private-scene-as-invitee
    dsl: >-
      permit(principal is character, action in ["join"], resource is scene) when { resource.scene.visibility == "private"
      && principal.id in resource.scene.invitees && resource.scene.state in ["active", "paused"] };
  # spectate gates WatchScene's observer auto-join. The visibility clause is
  # deliberate defense-in-depth behind the plugin-code gate (INV-SCENE-61):
  # service.go::WatchScene rejects non-open scenes BEFORE consulting ABAC,
  # and the store re-checks in-tx — this policy is the third layer.
  - name: spectate-open-scene
    dsl: >-
      permit(principal is character, action in ["spectate"], resource is scene) when { resource.scene.visibility == "open"
      };
  - name: leave-scene
    dsl: >-
      permit(principal is character, action in ["leave"], resource is scene) when { principal.id in resource.scene.participants
      };
  - name: invite-to-scene
    dsl: >-
      permit(principal is character, action in ["invite"], resource is scene) when { principal.id in resource.scene.participants
      && resource.scene.state in ["active", "paused"] };
  - name: kick-from-scene
    dsl: >-
      permit(principal is character, action in ["kick"], resource is scene) when { resource.scene.owner == principal.id &&
      resource.scene.state in ["active", "paused"] };
  - name: transfer-ownership
    dsl: >-
      permit(principal is character, action in ["transfer-ownership"], resource is scene) when { resource.scene.owner == principal.id
      };

  # ─── Phase 6: publication (Task B2) ───────────────────────────────────
  - name: start-publish-as-participant
    dsl: >-
      permit(principal is character, action in ["publish"], resource is scene) when { principal.id in resource.scene.participants
      && resource.scene.state == "ended" };

  # ─── Admin-only operations ────────────────────────────────────────────
  - name: admin-extend-publish-attempts
    dsl: >-
      permit(principal is character, action in ["extend_publish_attempts"], resource is scene) when { "admin" in principal.character.roles
      };

  # ─── Phase 6: owner withdraws publication attempt (Task B4) ───────────
  - name: withdraw-publish-as-owner
    dsl: >-
      permit(principal is character, action in ["withdraw_publish"], resource is scene) when { resource.scene.owner == principal.id
      };

  # ─── Phase 8: public board discovery (Task iokti.14) ─────────────────
  # ANY authenticated character may browse the open-scene board. The board
  # returns only visibility='open' scenes; the distinct "browse" action on the
  # scene resource type is scoped globally (not per-resource) since the board
  # is a list query, not a per-scene read. Using "browse" (not "read") keeps
  # this grant from widening `scene info`'s membership-gated "read" action. The
  # membership-gated read-scene-as-participant policy does NOT cover this case.
  - name: browse-open-scenes-board
    dsl: >-
      permit(principal is character, action in ["browse"], resource is scene) when { resource.scene.visibility == "open" };
