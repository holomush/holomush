name: core-objects
version: 0.1.0
type: lua
lua-plugin:
  entry: main.lua
requires:
  - capability: property
  - capability: world.query
commands:
  - name: describe
    aliases:
      - "desc"
    capabilities:
      - action: write
        resource: object
        scope: local
    help: "Set a description"
    usage: "describe me <text> | describe here <text> | describe <target>=<text>"
    helpText: |
      ## Describe

      Set the description of yourself, your current location, or a named object.

      ### Usage

      - `describe me <text>` - Set your character's description
      - `describe here <text>` - Set the current location's description
      - `describe <target>=<text>` - Set a named target's description

      ### Examples

      - `describe me A tall figure in a dark cloak.`
      - `describe here A dusty chamber lit by a single torch.`
      - `describe #01ABCDEF=A gleaming blade.`
  - name: examine
    capabilities:
      - action: read
        resource: object
        scope: local
    help: "Inspect an object, location, or character"
    usage: "examine [target]"
    helpText: |
      ## Examine

      Inspect an object, location, or character in detail. Shows more information
      than look, filtered by your access level.

      ### Usage

      - `examine` - Examine current location
      - `examine here` - Examine current location (explicit)
      - `examine <target>` - Examine a named target

      ### Access Tiers

      - **Player:** Name, description, public properties
      - **Owner:** Above plus private properties, exit destinations
      - **Builder:** Above plus owner, type, creation date, restricted properties
      - **Admin:** Above plus ULID, all property visibility levels

      ### Examples

      - `examine` - Inspect the current location
      - `examine sword` - Inspect an object named "sword"
      - `examine Gandalf` - Inspect a character
  - name: create
    capabilities:
      - action: write
        resource: object
        scope: local
    help: "Create a new object or location"
    usage: 'create <type> "<name>"'
    helpText: |
      ## Create

      Create a new object or location with the specified name.

      ### Usage

      - `create <type> "<name>"` - Create an object or location (name must be quoted)

      ### Types

      - `object` - A portable object
      - `location` - A room or area

      ### Examples

      - `create object "Enchanted Sword"` - Create a new object
      - `create location "The Library"` - Create a new location

      ### Permissions

      Requires write access to the object resource.
  - name: set
    capabilities:
      - action: write
        resource: property
        scope: local
    help: "Set a property on an object"
    usage: "set <property> of <target> to <value>"
    helpText: |-
      ## Set

      Modify a property on an object, location, or character.

      ### Usage

      - `set <property> of <target> to <value>`

      The property name supports prefix matching (e.g., "desc" matches "description").

      ### Examples

      - `set description of here to "A dusty room"` - Set location description
      - `set description of sword to "A gleaming blade"` - Set object description
      - `set desc of #123 to "A mysterious place"` - Use prefix matching

      ### Permissions

      Requires write access to the property resource.

policies:
  - name: execute-objects-player
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { resource.command.name in ["examine",
      "set"] };
  - name: execute-objects-builder
    dsl: >-
      permit(principal is character, action in ["execute"], resource is command) when { "builder" in principal.character.roles
      && resource.command.name in ["create", "describe"] };

verbs:
  - type: core-objects:object_create
    category: state
    format: delta
    display_target: state
  - type: core-objects:object_destroy
    category: state
    format: delta
    display_target: state
  - type: core-objects:object_use
    category: command
    format: narrative
    display_target: terminal
  - type: core-objects:object_examine
    category: command
    format: narrative
    display_target: terminal
  - type: core-objects:object_give
    category: command
    format: narrative
    display_target: terminal

crypto:
  emits:
    - event_type: object_create
      sensitivity: never
      description: "An object came into existence."
    - event_type: object_destroy
      sensitivity: never
      description: "An object was destroyed."
    - event_type: object_use
      sensitivity: never
      description: "An object was used or activated."
    - event_type: object_examine
      sensitivity: never
      description: "An object was examined."
    - event_type: object_give
      sensitivity: never
      description: "An object changed possession."
