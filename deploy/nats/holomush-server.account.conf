#
# holomush-server.account.conf — NATS single-principal subject-scoping template
# for HoloMUSH external mode (CLUSTER-02, phase3d-grounding Decision 4).
#
# Game-topic NATS subjects are single-principal BY DESIGN: only the holomush
# server connects on events.>, audit.>, internal.>. This template grants the
# `holomush-server` account publish+subscribe on EXACTLY those three prefixes
# plus `_INBOX.>` (the reply inboxes the crypto cache-invalidation coordinator
# needs for request-reply — NewRespInbox, coordinator.go:253) and NOTHING else.
# `internal.>` covers the DLQ subject `internal.<game_id>.audit.dlq.>` (D-12).
#
# Any principal that is NOT holomush-server is denied on the three game-topic
# prefixes (the HOLOMUSH_VERIFY identity below proves the denial). Enforcement
# is at the NATS account layer — the server never runs app-level ACL checks; it
# only self-verifies it is not over-scoped at boot (see internal/eventbus/
# scopecheck.go).
#
# Two ways to use this file:
#   1. Static accounts (simple deploys / this CI proof):
#        nats-server -c holomush-server.account.conf
#      Replace the placeholder passwords below before any real deployment.
#   2. Decentralized JWT auth (recommended for production): translate the grant
#      list to an nsc operator/account/user — see README.md. The permission
#      allow-lists are identical; only the auth mechanism differs.
#
# A read-only operator account (holomush-operator-read, subscribe events.> only)
# is a DEFERRED future option (holomush-s5ts) — intentionally NOT shipped here.

accounts {
  # The single application principal. All HoloMUSH replicas authenticate as
  # this account; per-replica connections are distinct but share this identity.
  HOLOMUSH_SERVER {
    users = [
      {
        user: holomush-server
        # PLACEHOLDER — replace before deploying, or use nsc/JWT (README.md).
        password: holomush-server-CHANGEME
        permissions {
          publish {
            allow: ["events.>", "audit.>", "internal.>", "_INBOX.>"]
          }
          subscribe {
            allow: ["events.>", "audit.>", "internal.>", "_INBOX.>"]
          }
        }
      }
    ]
  }

  # Verification identity — NOT an application principal. Used only by
  # verify-scoping.sh and the CI scoping proof to demonstrate that a non-server
  # credential is DENIED on the game-topic prefixes. It is granted only its own
  # reply inboxes so it can connect and run request-reply for the probe; it has
  # NO game-topic permission, so any publish/subscribe on events.>/audit.>/
  # internal.> yields a permissions violation. Do NOT deploy this as a real
  # principal.
  HOLOMUSH_VERIFY {
    users = [
      {
        user: holomush-verify
        # PLACEHOLDER — this identity is for scoping verification only.
        password: holomush-verify-CHANGEME
        permissions {
          publish   { allow: ["_INBOX.>"] }
          subscribe { allow: ["_INBOX.>"] }
        }
      }
    ]
  }
}
