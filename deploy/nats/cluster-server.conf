#
# NATS server config for the compose cluster overlay (compose.cluster.yaml,
# D-14). It combines two things the two-replica external topology needs:
#
#   1. JetStream (file storage under /data) so the EVENTS stream lives on the
#      external server instead of an embedded in-process one.
#   2. A single-principal, subject-scoped HOLOMUSH_SERVER account so each core
#      replica's boot-time over-scope self-check (internal/eventbus/scopecheck.go,
#      CLUSTER-02) PASSES: the account can reach only the game-topic prefixes
#      plus the JetStream API, and is DENIED everything else (e.g. the
#      forbidden.scopecheck.<nonce> probe), so core does not refuse to boot.
#
# This is the operational sibling of deploy/nats/holomush-server.account.conf
# (the accounts-only scoping *proof* template, which has no JetStream). Both
# grant the same game-topic prefixes; this file adds the JetStream enablement +
# $JS.API/$JS.ACK grants the server actually needs to declare and drain the
# EVENTS stream. The password below is a smoke/dev placeholder — a real deploy
# uses nsc/JWT (see deploy/nats/README.md).

jetstream {
  store_dir: /data
}

accounts {
  HOLOMUSH_SERVER {
    jetstream: enabled
    users = [
      {
        user: holomush-server
        # PLACEHOLDER — smoke/dev only. Replace or use nsc/JWT before deploying.
        password: holomush-server-smoke
        permissions {
          # events.>/audit.>/internal.>/_INBOX.> are the single-principal
          # game-topic grants (CLUSTER-02); $JS.API.>/$JS.ACK.> are the
          # JetStream control + ack subjects the server needs to own the EVENTS
          # stream. forbidden.> (and everything else) stays denied, so the boot
          # self-check confirms the account is not over-scoped.
          publish {
            allow: ["events.>", "audit.>", "internal.>", "_INBOX.>", "$JS.API.>", "$JS.ACK.>"]
          }
          subscribe {
            allow: ["events.>", "audit.>", "internal.>", "_INBOX.>", "$JS.API.>", "$JS.ACK.>"]
          }
        }
      }
    ]
  }
}
